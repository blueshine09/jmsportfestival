    function applyWinners() {
      const getRowName = (row) => String(row?.querySelector('input')?.value || '').trim();
      const setRowName = (row, value, placeholder = 'TBD') => {
        if (!row) return;
        const input = row.querySelector('input');
        if (!input) return;
        const prevValue = String(input.value || '').trim();
        const nextValue = String(value || '').trim();
        input.value = nextValue;
        input.placeholder = nextValue ? '' : placeholder;

        row.classList.remove('advance-enter');
        if (nextValue && nextValue !== prevValue) {
          void row.offsetWidth;
          row.classList.add('advance-enter');
          window.setTimeout(() => row.classList.remove('advance-enter'), 900);
        }
      };
      const clearWinnerStyles = (root) => {
        root.querySelectorAll('.team-row').forEach(row => {
          row.classList.remove('winner', 'final-winner');
        });
      };
      const resolveWinnerRow = (rows) => {
        if (!rows.length) return null;
        if (rows.length === 1) return rows[0];

        const s1 = parseFloat(rows[0].querySelector('.score')?.textContent);
        const s2 = parseFloat(rows[1].querySelector('.score')?.textContent);
        const pk1 = parseFloat(rows[0].querySelector('.score')?.dataset.pk) || 0;
        const pk2 = parseFloat(rows[1].querySelector('.score')?.dataset.pk) || 0;

        if (Number.isFinite(s1) && Number.isFinite(s2)) {
          if (s1 > s2) return rows[0];
          if (s2 > s1) return rows[1];
          if (pk1 > pk2) return rows[0];
          if (pk2 > pk1) return rows[1];
        }
        return null;
      };

      document.querySelectorAll('.bracket').forEach(bracket => {
        clearWinnerStyles(bracket);

        const rounds = Array.from(bracket.querySelectorAll('.round'));
        if (rounds.length < 3) return;

        const firstRoundUnits = Array.from(rounds[0].querySelectorAll('.match-unit'));
        const secondRoundRows = Array.from(rounds[1].querySelectorAll('.team-row:not(.bye-win)'));
        const finalRows = Array.from(rounds[2].querySelectorAll('.team-row:not(.bye-win)'));
        const championNode = rounds[2].querySelector('.champ-team-name');
        const championArea = rounds[2].querySelector('.champ-area');

        const firstRoundWinners = firstRoundUnits.map(unit => {
          const rows = Array.from(unit.querySelectorAll('.team-row'));
          const winnerRow = resolveWinnerRow(rows);
          if (winnerRow) {
            winnerRow.classList.add(winnerRow.dataset.type === 'final' ? 'final-winner' : 'winner');
            return getRowName(winnerRow);
          }
          return '';
        });

        setRowName(secondRoundRows[0], firstRoundWinners[0] || '', '준결승1');
        setRowName(secondRoundRows[1], firstRoundWinners[1] || '', '준결승2');
        setRowName(secondRoundRows[2], firstRoundWinners[2] || '', '준결승3');
        setRowName(secondRoundRows[3], firstRoundWinners[3] || '', '준결승4');

        const secondRoundUnits = Array.from(rounds[1].querySelectorAll('.match-unit'));
        const secondRoundWinners = secondRoundUnits.map(unit => {
          const rows = Array.from(unit.querySelectorAll('.team-row:not(.bye-win)'));
          const winnerRow = resolveWinnerRow(rows);
          if (winnerRow) {
            winnerRow.classList.add('winner');
            return getRowName(winnerRow);
          }
          return '';
        });

        setRowName(finalRows[0], secondRoundWinners[0] || '', '결승1');
        setRowName(finalRows[1], secondRoundWinners[1] || '', '결승2');

        const finalWinnerRow = resolveWinnerRow(finalRows);
        if (finalWinnerRow) {
          finalWinnerRow.classList.add('final-winner');
        }

        if (championNode) {
          const championName = finalWinnerRow ? getRowName(finalWinnerRow) : '';
          championNode.textContent = championName || '대기중';
          if (championArea) championArea.classList.toggle('pending', !championName);
        }
      });

      document.querySelectorAll('.champ-team-name').forEach(node => {
        const value = String(node.textContent || '').trim();
        node.closest('.champ-area')?.classList.toggle('pending', !value || value === '대기중');
      });
    }

    async function openScoreGuideModal() {

      }
    }

    async function loadRealtimeScore(tabName, isSilent = false) {
      if (!isSilent) showState('loader');

      try {
        const data = await fetchTabData(tabName, { force: isSilent });
        if (!data || data.length < 2) return showState('empty-box');

        const headerVals = Object.values(data[0] || {});
        const totalRow = data[9] || {};
        const totalVals = Object.values(totalRow);

        let rankings = headerVals
          .map((rawName, colIndex) => {

    function parseScheduleStartMinutes(value = '') {
      const text = String(value || '').trim();
      const match = text.match(/(\d{1,2})\s*[:.]\s*(\d{2})/);
      if (!match) return Number.MAX_SAFE_INTEGER;
      return parseInt(match[1], 10) * 60 + parseInt(match[2], 10);
    }

      if (!item || typeof item !== 'object') return false;
      const time = String(item.col2 || '').trim();
      const match = String(item.col3 || '').trim();
      const location = String(item.col4 || '').trim();
      const referee = String(item.col5 || '').trim();
      const stage = String(item.col7 || '').trim();

      const hasTimePattern = /\d{1,2}\s*[:.]\s*\d{2}/.test(time);
      const hasMeaningfulMeta = [match, location, referee, stage].some(value => {
        const normalized = String(value || '').replace(/\s+/g, ' ').trim();
        if (!normalized) return false;
        return !/^\d+$/.test(normalized);
      });

      return hasTimePattern && hasMeaningfulMeta;
    }

      try {

    function getScheduleMinuteRange(value = '') {
      const text = String(value || '').trim();
      if (!text) return { start: Number.MAX_SAFE_INTEGER, end: Number.MAX_SAFE_INTEGER };
      const parts = text.split('-');
      const start = parseScheduleStartMinutes(parts[0] || text);
      const end = parseScheduleStartMinutes(parts[1] || text);
      return {
        start,
        end: end === Number.MAX_SAFE_INTEGER ? start : end
      };
    }

    function formatMinuteDiff(diffMinutes = 0) {
      const safe = Math.max(0, diffMinutes);
      const hours = Math.floor(safe / 60);
      const minutes = safe % 60;
      if (hours > 0) return `${hours}시간 ${minutes}분`;
      return `${minutes}분`;
    }

    function matchesFavoriteSport(row, favoriteSport = '') {
      const keyword = String(favoriteSport || '').trim();
      if (!keyword) return true;
      const haystack = [row?.col1, row?.col3, row?.col4, row?.col7].map(v => String(v || '')).join(' ');
      return haystack.includes(keyword);
    }

    function extractFavoriteSportCandidates(rows = []) {
      const set = new Set();
      (rows || []).forEach(row => {
        [row?.col1, row?.col3].forEach(value => {
          const text = String(value || '').trim();
          if (!text) return;
          const matches = text.match(/[가-힣A-Za-z0-9]+/g) || [];
          matches.forEach(token => {
            if (token.length < 2) return;
            if (/\d/.test(token) && token.length < 3) return;
            if (['집합','점심','폐회식','개회식','응원','시상','정리','준비','이동','휴식','조회','전체','미리보기'].includes(token)) return;
            set.add(token);
          });
        });
      });
      return Array.from(set).slice(0, 20);
    }

    function getFestivalScheduleSummary(rows = [], label = '', favoriteSport = '') {
      const validRows = (rows || []).filter(item => (String(item.col2 || '').trim() || String(item.col3 || '').trim()) && matchesFavoriteSport(item, favoriteSport));
      if (!validRows.length) {
        return {
          title: favoriteSport ? `${label} · ${favoriteSport} 일정 없음` : `${label} 일정 준비 중`,
          desc: favoriteSport ? '선택한 종목과 맞는 일정이 아직 없습니다.' : '표시할 일정 데이터가 아직 없습니다.',
          meta: '',
          isLive: false,
          countdownText: '',
          favoriteSport,
          stageInfo: null,
          nextLabel: '',
          targetRow: null,
          nextRow: null
        };
      }
      const nowMinutes = new Date().getHours() * 60 + new Date().getMinutes();
      const sorted = [...validRows].sort((a, b) => parseScheduleStartMinutes(a.col2) - parseScheduleStartMinutes(b.col2));
      const currentIndex = sorted.findIndex(item => {
        const range = getScheduleMinuteRange(item.col2);
        return range.start <= nowMinutes && (range.end === Number.MAX_SAFE_INTEGER || nowMinutes <= range.end);
      });
      const current = currentIndex >= 0 ? sorted[currentIndex] : null;
      const next = current ? (sorted[currentIndex + 1] || null) : (sorted.find(item => parseScheduleStartMinutes(item.col2) > nowMinutes) || sorted[0] || null);
      const target = current || next || sorted[0];
      const targetIndex = sorted.indexOf(target);
      const followUp = current ? (sorted[targetIndex + 1] || null) : (sorted[targetIndex + 1] || sorted[0] || null);
      const range = getScheduleMinuteRange(target.col2);
      const countdownText = current
        ? `종료까지 ${formatMinuteDiff(range.end - nowMinutes)}`
        : `시작까지 ${formatMinuteDiff(range.start - nowMinutes)}`;
      return {
        title: '',
        desc: `${target.col2 || '시간미정'} · ${target.col3 || '일정명 미정'}`,
        meta: target.col4 || '',
        isLive: !!current,
        countdownText,
        favoriteSport,
        stageInfo: getScheduleStageInfo(target.col7, target.col3),
        nextLabel: followUp ? `${followUp.col2 || '시간미정'} · ${followUp.col3 || '다음 일정 확인'}` : '',
        targetRow: target,
        nextRow: followUp
      };
    }

<script id="logic-stability-v25-patch">
(function(){
  const __memo = {
    tab: Object.create(null),

  };

  function asText(value){
    return String(value ?? '').replace(/\u00a0/g, ' ').trim();
  }

  function normalizeCell(value){
    return asText(typeof stripTrueFalseText === 'function' ? stripTrueFalseText(value) : value);
  }

  function isMeaningfulRow(row){
    if (!row || typeof row !== 'object') return false;
    const keys = ['col1','col2','col3','col4','col5','col6','col7','col8'];
    return keys.some((key) => {
      const value = normalizeCell(row[key]);
      return !!value && value !== '-' && value !== '—';
    });
  }

  function uniqueRows(rows){
    const seen = new Set();
    return (Array.isArray(rows) ? rows : []).filter((row) => {
      if (!isMeaningfulRow(row)) return false;
      const sig = ['col1','col2','col3','col4','col5','col6','col7','col8'].map((key) => normalizeCell(row[key])).join('|');
      if (!sig || seen.has(sig)) return false;
      seen.add(sig);
      return true;
    });
  }

  function sanitizeTableData(data){
    if (!Array.isArray(data)) return [];
    if (!data.length) return [];
    const [head, ...rest] = data;
    return [head, ...uniqueRows(rest)];
  }

  function getTabData(tabName){
    const key = String(tabName || '').trim();
    if (!key) return Promise.resolve([]);
    if (__memo.tab[key]) return __memo.tab[key];
    __memo.tab[key] = Promise.resolve(
      typeof fetchTabData === 'function' ? fetchTabData(key) : []
    ).then((data) => {
      const safe = sanitizeTableData(data);
      __memo.normalized[key] = safe;
      return safe;

    return __memo.tab[key];

  const CARD_SELECTOR = '.hero-card, .schedule-card, .roster-card, .unified-info-card, .rule-section-card, .summary-mini-card, .menu-card, .quick-action-card, .teacher-section-card, .teacher-map-photo-card, .teacher-map-card, .referee-line-card, .data-card, .card, .overview-timeline-card, .detail-group-card, .round-card, .race-stage-card, .race-team-card, .notice-item-card, .modal-body';
  const PRESS_SELECTOR = '.header-icon-btn, .filter-btn, .inline-btn, .close-btn, .seat-layout-btn, .seat-link-btn, .schedule-day-btn, .grade-btn, .schedule-grade-btn, .relay-segment-btn, .menu-card, .quick-action-card, button, [role="button"]';
  const reduceMotion = () => window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function initUiEnhancements(root=document){
    if (!(root instanceof Element || root === document)) return;
    root.querySelectorAll(PRESS_SELECTOR).forEach((el) => {
      if (el.dataset.iosBound === '1') return;
      el.dataset.iosBound = '1';
      const on = () => el.classList.add('is-pressing');
      const off = () => el.classList.remove('is-pressing');
      el.addEventListener('pointerdown', on, {passive:true});
      el.addEventListener('pointerup', off, {passive:true});
      el.addEventListener('pointercancel', off, {passive:true});
      el.addEventListener('pointerleave', off, {passive:true});
    });
    root.querySelectorAll(CARD_SELECTOR).forEach((el, idx) => {
      if (el.dataset.iosAnimated !== '1') {
        el.dataset.iosAnimated = '1';
        el.style.animationDelay = Math.min(idx * 28, 180) + 'ms';
      }
      if (el.dataset.ios17GlassBound !== '1') {
        el.dataset.ios17GlassBound = '1';
        el.addEventListener('pointermove', (e) => {
          if (reduceMotion()) return;
          const r = el.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width;
          const y = (e.clientY - r.top) / r.height;
          el.style.setProperty('--glass-x', (x * 100).toFixed(1) + '%');
          el.style.setProperty('--glass-y', (y * 100).toFixed(1) + '%');
        }, {passive:true});
      }
    });
  }

  let enhanceQueued = false;
  const enhanceTargets = new Set();
  function queueEnhancement(target){
    if (target) enhanceTargets.add(target);
    if (enhanceQueued) return;
    enhanceQueued = true;
    const flush = () => {
      enhanceQueued = false;
      const targets = enhanceTargets.size ? Array.from(enhanceTargets) : [document];
      enhanceTargets.clear();
      targets.forEach((node) => initUiEnhancements(node));
    };
    if (window.requestAnimationFrame) window.requestAnimationFrame(flush);
    else setTimeout(flush, 16);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => queueEnhancement(document), {once:true});
  } else {
    queueEnhancement(document);
  }

  if (document.body && !window.__unifiedUiObserverBound__) {
    window.__unifiedUiObserverBound__ = true;
    const mo = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        mutation.addedNodes.forEach((node) => {
          if (node instanceof HTMLElement) queueEnhancement(node);
        });
      }
    });
    mo.observe(document.body, { childList: true, subtree: true });
  }

  scheduleMicrotask(() => {
    requestIconRefresh();
    if (typeof currentActiveMainTab !== 'undefined' && currentActiveMainTab === '홈') {
      try { window.renderHomeMenu(); } catch (_) {}
    }
    window.primeNoticeFeed?.().catch?.(() => {});
  });
})();
</script>


<script>
(function(){
  if (window.__firstPassBracketCleanupApplied__) return;
  window.__firstPassBracketCleanupApplied__ = true;

  function txt(v){ return String(v == null ? '' : v).trim(); }
  function esc(v){ return txt(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function norm(v){ return txt(v).replace(/\s+/g,''); }
  function setHtmlIfChanged(el, html){ if (!el) return false; if (el.innerHTML === html) return false; el.innerHTML = html; return true; }

  function resultSortValue(raw, sport){
    const t = txt(raw);
    const s = txt(sport);
    if (!t) return s.includes('미션달리기') ? Number.POSITIVE_INFINITY : Number.NEGATIVE_INFINITY;
    if (s.includes('미션달리기')) {
      const rank = t.match(/(\d+)\s*위/);
      return rank ? Number(rank[1]) : Number.POSITIVE_INFINITY;
    }
    const num = t.replace(/,/g,'').match(/-?\d+(?:\.\d+)?/);
    if (num) return Number(num[0]);
    const rank = t.match(/(\d+)\s*위/);
    return rank ? Number(rank[1]) : Number.NEGATIVE_INFINITY;
  }

  async function getBracketRows(targetKey){
    let data = [];
    if (typeof window.getTabData === 'function') {
      data = await window.getTabData('대진표');
    } else if (typeof window.fetchTabDataCached === 'function') {
      data = await window.fetchTabDataCached('대진표');
    }
    const target = norm(targetKey);
    return (Array.isArray(data) ? data : []).filter((row) => norm(row && row.col1) === target);
  }

  function normalizeResultText(v){
    return txt(v).replace(/[​-‍﻿]/g, '').replace(/\s+/g, ' ').trim();
  }

  function buildResultOnlyBoard(rows, sportLabel){
    const sport = txt(sportLabel);
    const isMission = sport.includes('미션달리기');
    const isJump = sport.includes('8자 줄넘기') || sport.includes('단체줄넘기');
    const entries = (Array.isArray(rows) ? rows : [])
      .map((row, idx) => {
        const team = normalizeResultText(row && row.col2);
        const value = normalizeResultText(row && row.col3);
        const detail = normalizeResultText(row && row.col4);
        const hasMeaningfulData = Boolean(team || value || detail);
        if (!hasMeaningfulData) return null;
        return {
          team: team || `팀 ${idx + 1}`,
          value: value || '기록 미입력',
          detail,
          idx,
          score: resultSortValue(value, sport)
        };
      })
      .filter(Boolean);

    entries.sort((a, b) => {
      const av = a.score;
      const bv = b.score;
      if (isMission) {
        if (Number.isFinite(av) && Number.isFinite(bv)) return av - bv || a.idx - b.idx;
        if (Number.isFinite(av)) return -1;
        if (Number.isFinite(bv)) return 1;
        return a.idx - b.idx;
      }
      if (Number.isFinite(av) && Number.isFinite(bv)) return bv - av || a.idx - b.idx;
      if (Number.isFinite(av)) return -1;
      if (Number.isFinite(bv)) return 1;
      return a.idx - b.idx;
    });

    const compactEntries = entries.filter((entry) => normalizeResultText(entry.team));
    const hasActualResult = compactEntries.some((entry) => {
      const rawValue = normalizeResultText(entry.value);
      return Boolean(rawValue && !/^(?:기록\s*미입력|미입력|경기전)$/u.test(rawValue));
    });
    const badge = isJump ? '최고 기록 우승' : '1위 우승';
    const valueLabel = isJump ? '기록' : '순위';
    const champion = hasActualResult && compactEntries[0] ? compactEntries[0].team : '결과 입력 대기';
    const stageTitleHTML = (isMission || isJump) ? '' : `<div class="race-stage-title">${esc(sport)}</div>`;
    const valueHTML = (entry) => isMission
      ? ''
      : `<span class="race-team-sub" style="margin:0;white-space:nowrap;">${esc(`${valueLabel} ${entry.value || '미입력'}`)}</span>`;

    if (!compactEntries.length) {
      return `<div class="bracket-panel"><div class="race-bracket-board"><div class="race-stage-card final"><div class="race-stage-head"><div><div class="race-stage-kicker">RESULT</div>${stageTitleHTML || `<div class="race-stage-title">${esc(sport)}</div>`}</div><span class="race-stage-badge">${esc(badge)}</span></div><div class="race-stage-desc">결과 데이터가 아직 없습니다.</div></div></div></div>`;
    }

    return `<div class="bracket-panel${isJump ? ' jump-result-panel compact-winner-panel' : ''}${(isJump || isMission) ? ' gold-winner-panel' : ''}"><div class="race-bracket-board"><div class="race-stage-card final"><div class="race-stage-head"><div><div class="race-stage-kicker">RESULT</div>${stageTitleHTML}</div><span class="race-stage-badge">${esc(badge)}</span></div><div class="champ-area" style="margin:0 0 18px;"><span class="champ-label"><span class="trophy-icon" aria-hidden="true"></span>우승</span><span class="champ-team-name">${esc(champion)}</span></div><div class="race-team-stack">${compactEntries.map((entry, index) => {
      const rank = index + 1;
      const statusText = hasActualResult ? (rank === 1 ? '우승' : `${rank}위`) : '경기전';
      const rankClasses = hasActualResult ? (rank === 1 ? ' champion final-rank-1' : rank === 2 ? ' final-rank-2' : rank === 3 ? ' final-rank-3' : '') : '';
      return `<div class="race-team-card${rankClasses}${isJump ? ' jump-record-card' : ''}" style="display:flex;align-items:center;gap:14px;justify-content:space-between;"><div style="display:flex;align-items:center;gap:14px;min-width:0;flex:1;"><div class="race-rank-chip">${rank}</div><div class="race-team-name" style="margin:0;white-space:nowrap;">${esc(entry.team)}</div></div><div style="display:flex;align-items:center;gap:16px;justify-content:flex-end;flex-wrap:nowrap;white-space:nowrap;margin-left:12px;">${isJump ? `<span class="jump-record-badge"><span class="jump-record-badge-label">${esc(valueLabel)}</span><span class="jump-record-badge-value">${esc(entry.value || '미입력')}</span></span>` : valueHTML(entry)}${entry.detail ? `<span class="race-team-sub" style="margin:0;white-space:nowrap;">${esc(entry.detail)}</span>` : ''}<span class="race-status-badge${hasActualResult && rank === 1 ? ' is-qualified' : ''}">${esc(statusText)}</span></div></div>`;
    }).join('')}</div></div></div></div>`;
  }

  function normalizeRenderedResultCards(container){
    if (!container) return;
    const stack = container.querySelector('.race-team-stack');
    if (!stack) return;
    const cards = Array.from(stack.querySelectorAll('.race-team-card'));
    const validCards = cards.filter((card) => normalizeResultText(card.querySelector('.race-team-name')?.textContent));
    cards.forEach((card) => {
      if (!validCards.includes(card)) card.remove();
    });
    validCards.forEach((card, index) => {
      const rank = index + 1;
      const chip = card.querySelector('.race-rank-chip');
      const status = card.querySelector('.race-status-badge, .race-team-status');
      if (chip) chip.textContent = String(rank);
      const hasActualResult = validCards.some((item) => {
        const badgeValue = normalizeResultText(item.querySelector('.jump-record-badge-value')?.textContent || '');
        const subText = normalizeResultText(item.querySelector('.race-team-sub')?.textContent || '');
        const combined = `${badgeValue} ${subText}`.trim();
        return Boolean(combined && !/^(?:기록\s*미입력|미입력|순위\s*미입력|경기전)$/u.test(combined));
      });
      if (status) status.textContent = hasActualResult ? (rank === 1 ? '우승' : `${rank}위`) : '경기전';
      card.classList.remove('final-rank-1','final-rank-2','final-rank-3','champion');
      if (hasActualResult && rank === 1) card.classList.add('champion','final-rank-1');
      else if (hasActualResult && rank === 2) card.classList.add('final-rank-2');
      else if (hasActualResult && rank === 3) card.classList.add('final-rank-3');
    });
  }

  async function renderResultOnly(container, targetKey, label){
    if (!container) return;
    setHtmlIfChanged(container, '<div class="loader">대진표 로딩중...</div>');
    try {
      const rows = await getBracketRows(targetKey);
      if (!rows.length) {
        const emptyHtml = (typeof window.createEmptyGuideHTML === 'function')
          ? window.createEmptyGuideHTML('대진표 정보가 없습니다.', `${label} 결과가 아직 등록되지 않았습니다.`)
          : '<div class="loader">대진표 정보가 없습니다.</div>';
        setHtmlIfChanged(container, emptyHtml);
        return;
      }
      setHtmlIfChanged(container, buildResultOnlyBoard(rows, label));
      normalizeRenderedResultCards(container);
    } catch (error) {
      console.error('result-only bracket render error', error, targetKey, label);
      setHtmlIfChanged(container, '<div class="loader">⚠️ 데이터 오류</div>');
    }
  }

  const originalLoadBracketDataToContainer = window.loadBracketDataToContainer;
  window.loadBracketDataToContainer = async function firstPassLoadBracketDataToContainer(container, targetKey, sportLabel = '') {
    const normalizedTarget = norm(targetKey);
    const isResultOnly = normalizedTarget.startsWith(norm('대진_미션달리기'))
      || normalizedTarget.startsWith(norm('대진_8자 줄넘기'))
      || normalizedTarget.startsWith(norm('대진_단체줄넘기'));

    if (!isResultOnly) {
      return originalLoadBracketDataToContainer ? originalLoadBracketDataToContainer.apply(this, arguments) : undefined;
    }

    return renderResultOnly(container, targetKey, sportLabel || targetKey);
  };
  loadBracketDataToContainer = window.loadBracketDataToContainer;

  const originalHandleSportFilterClick = window.handleSportFilterClick;
  window.handleSportFilterClick = async function firstPassHandleSportFilterClick(btn, targetTab, sport, isPlayerGrid=false, isScheduleView=false, mode='default'){
    if (mode === 'bracket' && (sport === '미션달리기' || sport === '단체줄넘기')) {
      const container = document.getElementById('sport-common-detail');
      if (!container) return;
      const isAlreadyActive = !!(btn && btn.classList.contains('active'));
      document.querySelectorAll('#sport-filter-group .filter-btn').forEach((item) => item.classList.remove('active'));
      if (isAlreadyActive) {
        if (typeof window.resetSportDetailArea === 'function') {
          window.resetSportDetailArea(targetTab, isPlayerGrid, isScheduleView, mode);
        }
        return;
      }
      if (typeof window.updateSportSelectGuideVisibility === 'function') window.updateSportSelectGuideVisibility(false);
      if (btn) btn.classList.add('active');
      const bracketKey = sport === '단체줄넘기' ? '대진_단체줄넘기' : '대진_미션달리기';
      await renderResultOnly(container, bracketKey, sport);
      return;
    }
    return originalHandleSportFilterClick ? originalHandleSportFilterClick.apply(this, arguments) : undefined;
  };
  handleSportFilterClick = window.handleSportFilterClick;

  const originalLoadBracketByGrade = window.loadBracketByGrade;
  window.loadBracketByGrade = async function firstPassLoadBracketByGrade(sport, grade, btn=null){
    if (txt(sport) === '8자 줄넘기' || txt(sport) === '단체줄넘기') {
      if (btn) {
        document.querySelectorAll('#bracket-grade-tabs .grade-btn').forEach((item) => item.classList.remove('active'));
        btn.classList.add('active');
      }
      const container = document.getElementById('bracket-grade-container');
      if (!container) return;
      await renderResultOnly(container, `대진_${txt(sport)}_${txt(grade)}`, `${txt(sport)} ${txt(grade)}`);
      return;
    }
    return originalLoadBracketByGrade ? originalLoadBracketByGrade.apply(this, arguments) : undefined;
  };
  loadBracketByGrade = window.loadBracketByGrade;
})();
</script>

<script>
(function(){
  function rxText(v){ return String(v == null ? '' : v).replace(/\s+/g,' ').trim(); }
  function rxKey(v){ return rxText(v); }
  function rxEsc(v){
    const s = String(v == null ? '' : v);
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function rxStage(v){
    const t = rxText(v);
    if (/^결승$/u.test(t)) return '결승';
    if (/^(?:예선|준결승)$/u.test(t)) return '예선';
    return '';
  }
  function rxRank(v){
    const t = rxText(v);
    if (!t) return '';
    if (/^\d+$/.test(t)) return t + '위';
    const m = t.match(/(\d+)\s*위/u);
    if (m) return m[1] + '위';
    if (/^우승$/u.test(t)) return '1위';
    if (/^준우승$/u.test(t)) return '2위';
    return '';
  }
  function rxStatus(v){
    const t = rxText(v);
    if (/결승\s*진출/u.test(t)) return '결승 진출';
    if (/예선\s*종료/u.test(t)) return '예선 종료';
    return '';
  }
  function rxMeta(item){
    const parts = [item && item.col3, item && item.col4].map(rxText).filter(Boolean);
    let rankText = '';
    let statusText = '';
    const detail = [];
    parts.forEach((part) => {
      const r = rxRank(part);
      if (!rankText && r) { rankText = r; return; }
      const s = rxStatus(part);
      if (!statusText && s) { statusText = s; return; }
      detail.push(part);
    });
    return { rankText, statusText, detail: detail.join(' · ') };
  }
  function rxRankNum(item){
    const rankText = rxMeta(item).rankText;
    const m = rankText.match(/(\d+)/);
    return m ? parseInt(m[1],10) : 999;
  }
  function rxEmpty(title, desc){
    if (typeof window.createEmptyGuideHTML === 'function') return window.createEmptyGuideHTML(title, desc);
    return '<div class="loader">'+ rxEsc(title || '대진표 정보가 없습니다.') +'</div>';
  }
  function rxHeatCard(team, idx){
    const meta = rxMeta(team);
    const status = meta.statusText || '경기전';
    const isAdvance = status === '결승 진출';
    return `
      <div class="race-team-card ${isAdvance ? 'advance' : ''}">
        <div class="race-rank-chip">${idx + 1}</div>
        <div class="race-team-main">
          <div class="race-team-name">${rxEsc(rxText(team && team.col2) || `팀 ${idx + 1}`)}</div>
          ${meta.detail ? `<div class="race-team-note">${rxEsc(meta.detail)}</div>` : ''}
        </div>
        <div class="race-team-status-group">
          <div class="race-team-status ${isAdvance ? 'advance' : ''}">${rxEsc(status)}</div>
          ${meta.rankText ? `<div class="race-rank-side-badge">${rxEsc(meta.rankText)}</div>` : ''}
        </div>
      </div>`;
  }
  function rxFinalCard(team, idx){
    const meta = rxMeta(team);
    const rawRank = rxText(team && team.col4);
    const hasRank = /^\d+$/.test(rawRank);
    const labels = ['우승','준우승','3위','4위'];
    const status = hasRank ? (labels[idx] || `${idx+1}위`) : '경기전';
    const rankClass = hasRank && idx < 3 ? `final-rank-${idx+1}` : '';
    const statusClass = hasRank && idx === 0 ? 'champion' : '';
    return `
      <div class="race-team-card ${rankClass}">
        <div class="race-rank-chip">${idx + 1}</div>
        <div class="race-team-main">
          <div class="race-team-name">${rxEsc(rxText(team && team.col2) || `결승팀 ${idx+1}`)}</div>
          ${meta.detail ? `<div class="race-team-note">${rxEsc(meta.detail)}</div>` : ''}
        </div>
        <div class="race-team-status-group">
          <div class="race-team-status ${statusClass}">${rxEsc(status)}</div>
          ${hasRank && meta.rankText ? `<div class="race-rank-side-badge">${rxEsc(meta.rankText)}</div>` : ''}
        </div>
      </div>`;
  }
  function renderRelay(rows){
    const teamRows = (Array.isArray(rows) ? rows : []).filter(r => rxText(r && r.col2));
    const hasStage = teamRows.some(r => rxStage(r && r.col5));
    const prelimRows = hasStage ? teamRows.filter(r => rxStage(r && r.col5) === '예선') : teamRows;
    const manualFinalRows = hasStage ? teamRows.filter(r => rxStage(r && r.col5) === '결승') : [];
    const heat1 = prelimRows.slice(0, Math.min(4, prelimRows.length));
    const heat2 = prelimRows.slice(Math.min(4, prelimRows.length));
    const heats = [heat1, heat2].filter(arr => arr.length);

<script id="feedback-fab-script-v1">
(function(){
  const SCRIPT = (typeof FEEDBACK_SCRIPT_URL !== 'undefined' && FEEDBACK_SCRIPT_URL) ? FEEDBACK_SCRIPT_URL : ((typeof SCRIPT_URL !== 'undefined' && SCRIPT_URL) ? SCRIPT_URL : '');
  function el(id){ return document.getElementById(id); }
  function openFeedbackModal(){ const m=el('feedback-modal'); if(m){ m.classList.add('open'); m.setAttribute('aria-hidden','false'); } }
  function closeFeedbackModal(){ const m=el('feedback-modal'); if(m){ m.classList.remove('open'); m.setAttribute('aria-hidden','true'); } }
  function setStatus(msg, isError){ const s=el('feedback-status'); if(s){ s.textContent=msg||''; s.style.color=isError?'#b91c1c':'#475569'; } }
  function bindSheetSwipeClose(){
    const modal = el('feedback-modal');
    const sheet = modal?.querySelector('.feedback-sheet');
    const handle = modal?.querySelector('.feedback-top');
    if(!modal || !sheet || !handle || modal.dataset.swipeBound === '1') return;
    modal.dataset.swipeBound = '1';
    let startY = 0;
    let currentY = 0;
    let dragging = false;
    let pointerId = null;
    const CLOSE_DISTANCE = 90;
    const RESISTANCE = 0.96;

    const resetSheet = () => {
      sheet.classList.remove('is-dragging');
      sheet.style.transform = '';
      modal.style.background = '';
    };

    const onPointerMove = (e) => {
      if(!dragging || (pointerId !== null && e.pointerId !== pointerId)) return;
      currentY = Math.max(0, e.clientY - startY);
      const offset = Math.max(0, currentY * RESISTANCE);
      sheet.style.transform = `translateY(${offset}px)`;
      modal.style.background = `rgba(17,24,39,${Math.max(0.12, 0.42 - Math.min(offset / 420, 0.22)).toFixed(3)})`;
      if(offset > 0) e.preventDefault();
    };

    const endDrag = () => {
      if(!dragging) return;
      dragging = false;
      pointerId = null;
      sheet.classList.remove('is-dragging');
      const moved = currentY;
      currentY = 0;
      if(moved > CLOSE_DISTANCE){
        resetSheet();
        closeFeedbackModal();
      } else {
        resetSheet();
      }
    };

    handle.addEventListener('pointerdown', (e) => {
      if(e.pointerType === 'mouse' && e.button !== 0) return;
      if(sheet.scrollTop > 4) return;
      dragging = true;
      pointerId = e.pointerId;
      startY = e.clientY;
      currentY = 0;
      sheet.classList.add('is-dragging');
      handle.setPointerCapture?.(e.pointerId);
    });

    handle.addEventListener('pointermove', onPointerMove, { passive:false });
    handle.addEventListener('pointerup', endDrag);
    handle.addEventListener('pointercancel', endDrag);
    modal.addEventListener('transitionend', () => { if(!dragging) resetSheet(); });
  }
  async function submitFeedback(){
    const payload = {
      action:'submitFeedback',
      name:(el('feedback-name')?.value||'').trim(),
      className:(el('feedback-class')?.value||'').trim(),
      type:(el('feedback-type')?.value||'기타').trim(),
      message:(el('feedback-message')?.value||'').trim(),
      page:location.href,
      referrer:document.referrer || '',
      userAgent:navigator.userAgent || ''
    };
    if(!payload.message){ setStatus('의견 내용을 입력해 주세요.', true); return; }
    if(!SCRIPT){ setStatus('SCRIPT_URL이 설정되지 않아 전송할 수 없습니다.', true); return; }
    const submitBtn = el('feedback-submit');
    if(submitBtn) submitBtn.disabled = true;
    setStatus('전송 중...', false);
    try{
      const res = await fetch(SCRIPT, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if(result && result.ok){
        setStatus('의견이 저장되었습니다.', false);
        if(el('feedback-name')) el('feedback-name').value='';
        if(el('feedback-class')) el('feedback-class').value='';
        if(el('feedback-message')) el('feedback-message').value='';
      } else {
        setStatus((result && result.message) || '저장에 실패했습니다.', true);
      }
    }catch(err){
      setStatus('전송 중 오류가 발생했습니다.', true);
    } finally {
      if(submitBtn) submitBtn.disabled = false;
    }
  }
  function bindFeedbackModal(){
    const btn = el('feedback-fab-btn');
    const cancel = el('feedback-cancel');
    const modal = el('feedback-modal');
    const submit = el('feedback-submit');
    if(btn && btn.dataset.boundFeedback !== '1'){
      btn.dataset.boundFeedback = '1';
      btn.addEventListener('click', openFeedbackModal);
    }
    if(cancel && cancel.dataset.boundFeedback !== '1'){
      cancel.dataset.boundFeedback = '1';
      cancel.addEventListener('click', closeFeedbackModal);
    }
    if(submit && submit.dataset.boundFeedback !== '1'){
      submit.dataset.boundFeedback = '1';
      submit.addEventListener('click', submitFeedback);
    }
    if(modal && modal.dataset.boundFeedback !== '1'){
      modal.dataset.boundFeedback = '1';
      modal.addEventListener('click', function(e){ if(e.target === modal) closeFeedbackModal(); });
    }
    bindSheetSwipeClose();
  }
  window.openFeedbackModal = openFeedbackModal;
  window.closeFeedbackModal = closeFeedbackModal;
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', bindFeedbackModal, { once:true });
  } else {
    bindFeedbackModal();
  }
})();
</script>

    const day1Html = typeof renderScheduleCards === 'function' ? renderScheduleCards(day1Data, '1일차') : '';
    const day2Html = typeof renderScheduleCards === 'function' ? renderScheduleCards(day2Data, '2일차') : '';
    return `
      <div class="schedule-day-tabs">
        <button type="button" class="schedule-day-btn ${day1Active}" data-day="1" data-inline-click="switchScheduleDay('1', this)">1일차</button>
        <button type="button" class="schedule-day-btn ${day2Active}" data-day="2" data-inline-click="switchScheduleDay('2', this)">2일차</button>
      </div>
      <div class="schedule-day-panel ${day1PanelActive}" data-schedule-day="1">${day1Html}</div>
      <div class="schedule-day-panel ${day2PanelActive}" data-schedule-day="2">${day2Html}</div>
    `;
  }

  function getDetailCacheKey(targetTab, sport, isPlayerGrid, isScheduleView, mode){
    return [targetTab, sport, isPlayerGrid ? 'player' : 'basic', isScheduleView ? 'schedule' : 'normal', mode || 'default'].join('::');
  }

  async function renderDetailToCache(targetTab, sport, isPlayerGrid, isScheduleView, mode){
    const cacheKey = getDetailCacheKey(targetTab, sport, isPlayerGrid, isScheduleView, mode);
    if (cache.detailViews[cacheKey]) return cache.detailViews[cacheKey];
    if (cache.pending[cacheKey]) return cache.pending[cacheKey];

    cache.pending[cacheKey] = (async () => {
      const sandbox = getSandbox();
      const host = document.createElement('div');
      host.setAttribute('data-cache-key', cacheKey);
      sandbox.appendChild(host);
      try {
        if (mode === 'bracket') {
          const gradeSports = ['풋살','빅발리볼','8자 줄넘기','단체줄넘기','팔씨름'];
          if (sport === '이어달리기') {
            host.innerHTML = '<div id="sport-common-detail"></div>';
            await loadRelayBracket('학급');
            const target = host.querySelector('#sport-common-detail') || host;
            const html = target.innerHTML || '';
            cache.detailViews[cacheKey] = html;
            return html;
          }
          if (gradeSports.includes(sport)) {
            host.innerHTML = `
              <div class="player-grade-tabs" id="bracket-grade-tabs">
                <button class="grade-btn active" data-sport="${sport}" data-inline-click="loadBracketByGrade('${sport}','1학년', this)">1학년</button>
                <button class="grade-btn" data-sport="${sport}" data-inline-click="loadBracketByGrade('${sport}','2학년', this)">2학년</button>
                <button class="grade-btn" data-sport="${sport}" data-inline-click="loadBracketByGrade('${sport}','3학년', this)">3학년</button>
              </div>
              <div id="bracket-grade-container"><div class="loader">대진표 로딩중...</div></div>
            `;
            await loadBracketByGrade(sport, '1학년');
            const html = host.innerHTML || '';
            cache.detailViews[cacheKey] = html;
            return html;
          }
          const bracketKey = `대진_${sport.replace(/\(|\)/g, '')}`;
          await loadBracketDataToContainer(host, bracketKey, sport);
          const html = host.innerHTML || '';
          cache.detailViews[cacheKey] = html;
          return html;
        }

        const allData = await window.fetchTabDataCached(targetTab);
        const filtered = isPlayerGrid
          ? dedupeRosterRows(allData.filter(item => sportEquals(item.col1 || '', sport)))
          : allData.filter(item => sportEquals(item.col1 || '', sport));

        if (isScheduleView) {
          if (isGradeFilterSport(sport)) {
            renderScheduleGradeFilter(host, filtered, sport);
          } else {
            renderScheduleList(host, filtered, sport);
          }
        } else if (mode === 'rule') {
          renderRuleList(host, filtered, sport);
        } else if (isPlayerGrid && isGradeFilterSport(sport)) {
          renderGradeFilterAndList(host, allData, sport);
        } else if (isPlayerGrid) {
          renderClassCards(host, filtered, sport, false);
        } else {
          renderSubList(host, filtered, sport, targetTab);
        }

        const html = host.innerHTML || '';
        cache.detailViews[cacheKey] = html;
        return html;
      } catch (_) {
        cache.detailViews[cacheKey] = '';
        return '';
      } finally {
        host.remove();
        delete cache.pending[cacheKey];
      }
    })();

    return cache.pending[cacheKey];
  }

  async function warmTeacherGuide(){
    if (cache.teacherReady && cache.initialViews['교사업무분장']) return;
    let rows = TEACHER_GUIDE_FALLBACK_ROWS;
    try {
      const remoteRows = await fetchTabData(TEACHER_GUIDE_SHEET_TAB);
      const normalizedRemoteRows = normalizeTeacherGuideRows(remoteRows);
      if (normalizedRemoteRows.length) rows = normalizedRemoteRows;
    } catch (_) {}
    cache.teacherRows = rows;
    cache.teacherReady = true;
    cache.initialViews['교사업무분장'] = renderTeacherGuideFromRows(rows);
  }

  async function warmScheduleOverview(){
    if (cache.scheduleOverviewReady && cache.initialViews['일정_전체일정']) return;
    try {
      const [day1Data, day2Data] = await Promise.all([
        fetchTabData('전체일정_1일차'),
        fetchTabData('전체일정_2일차')
      ]);
      cache.initialViews['일정_전체일정'] = buildScheduleOverviewHTML(day1Data, day2Data);
      cache.scheduleOverviewReady = true;
    } catch (_) {}
  }

  async function warmDetailScheduleGuide(){
    if (window.currentDetailScheduleGuideHtmlCache) return;
    try {
      const rows = await fetchTabDataCached('세부경기일정');
      window.currentDetailScheduleGuideMeta = extractDetailScheduleGuideMeta(Array.isArray(rows) ? rows : []);
      window.currentDetailScheduleGuideGallery = window.currentDetailScheduleGuideMeta?.images || [];
      window.currentDetailScheduleGuideHtmlCache = buildDetailScheduleGuideHtml(window.currentDetailScheduleGuideGallery);
      (window.currentDetailScheduleGuideGallery || []).slice(0, 6).forEach(item => {
        if (!item?.url) return;
        const img = new Image();
        img.decoding = 'async';
        img.loading = 'lazy';
        img.fetchPriority = 'low';
        img.src = item.url;
      });
    } catch (_) {
      window.currentDetailScheduleGuideHtmlCache = buildDetailScheduleGuideHtml([]);
    }
  }

  function seedInitialRoots(){
    cache.initialViews['경기규칙'] = makeInitialRootHTML('경기규칙', false, false, 'rule');
    cache.initialViews['대진표'] = makeInitialRootHTML('대진표', false, false, 'bracket');
    cache.initialViews['선수단'] = makeInitialRootHTML('선수단', true, false, 'default');
    cache.initialViews['심판'] = makeInitialRootHTML('심판', false, false, 'default');
    cache.initialViews['일정_세부일정'] = makeInitialRootHTML('세부경기일정', false, true, 'default');
  }

  async function warmAll(){
    if (cache.started) return;
    cache.started = true;
    seedInitialRoots();

    if (!shouldSkipWarmup()) {
      for (let i = 0; i < warmupTabs.length; i += 1) {
        if (document.hidden) break;
        await warmTab(warmupTabs[i]);
        await wait(i < 2 ? 180 : 320);
      }
    }

    for (const tabName of renderPreloadTabs) {
      try { await window.fetchTabDataCached(tabName); } catch (_) {}
      await wait(120);
    }

    await warmTeacherGuide();
    await wait(100);
    await warmScheduleOverview();
    await wait(100);
    await warmDetailScheduleGuide();
    await wait(100);

    if (typeof window.preloadCriticalMapImages === 'function' && !shouldSkipWarmup()) {
      idle(() => { try { window.preloadCriticalMapImages(); } catch (_) {} }, 2500);
    }

    if (shouldSkipWarmup()) return;

    const warmSpecs = [];
    for (const sport of SPORTS_LIST) {
      warmSpecs.push(['경기규칙', sport, false, false, 'rule']);
      warmSpecs.push(['심판', sport, false, false, 'default']);
      warmSpecs.push(['세부경기일정', sport, false, true, 'default']);
      warmSpecs.push(['선수단', sport, true, false, 'default']);
    }

    for (const spec of warmSpecs) {
      try { await renderDetailToCache(...spec); } catch (_) {}
      await wait(90);
    }
  }

  const originalRenderTeacherGuide = window.renderTeacherGuide;
  window.renderTeacherGuide = async function patchedRenderTeacherGuide(){
    if (cache.initialViews['교사업무분장']) {
      els.dataList.innerHTML = cache.initialViews['교사업무분장'];
      showState('data-list');
      refreshDynamicUI(els.dataList);
      return;
    }
    return originalRenderTeacherGuide.apply(this, arguments);
  };
  renderTeacherGuide = window.renderTeacherGuide;

  const originalLoadScheduleOverview = window.loadScheduleOverview;
  window.loadScheduleOverview = async function patchedLoadScheduleOverview(){
    if (cache.initialViews['일정_전체일정']) {
      els.dataList.innerHTML = cache.initialViews['일정_전체일정'];
      showState('data-list');
      refreshDynamicUI(els.dataList);
      return;
    }
    return originalLoadScheduleOverview.apply(this, arguments);
  };
  loadScheduleOverview = window.loadScheduleOverview;

  const originalActivateMainTab = window.activateMainTab;
  window.activateMainTab = function patchedActivateMainTab(key, updateHash = true){
    const result = originalActivateMainTab.apply(this, arguments);
    if (key === '경기규칙' && cache.initialViews['경기규칙']) {
      applyCachedHTML(els.dataList, cache.initialViews['경기규칙']);
      showState('data-list');
    } else if (key === '대진표' && cache.initialViews['대진표']) {
      applyCachedHTML(els.dataList, cache.initialViews['대진표']);
      showState('data-list');
    }
    return result;
  };
  activateMainTab = window.activateMainTab;

  const originalHandleSportFilterClick = window.handleSportFilterClick;
  window.handleSportFilterClick = async function patchedHandleSportFilterClick(btn, targetTab, sport, isPlayerGrid = false, isScheduleView = false, mode = 'default'){
    const container = document.getElementById('sport-common-detail');
    if (!container) return originalHandleSportFilterClick.apply(this, arguments);

    if (mode === 'bracket' || targetTab === '대진표') {
      return originalHandleSportFilterClick.apply(this, arguments);
    }

    const isAlreadyActive = btn.classList.contains('active');
    document.querySelectorAll('#sport-filter-group .filter-btn').forEach(b => b.classList.remove('active'));

    if (isScheduleView && window.currentDetailScheduleMode === 'timeline') {
      window.currentDetailScheduleMode = 'sport';
      const sportFilterGroup = document.getElementById('sport-filter-group');
      if (sportFilterGroup) sportFilterGroup.classList.remove('is-hidden');
      document.querySelectorAll('.schedule-view-toggle-btn').forEach(button => {
        button.classList.toggle('active', button.dataset.mode === 'sport');
      });
    }

    if (isAlreadyActive) {
      return originalHandleSportFilterClick.apply(this, arguments);
    }

    const cacheKey = getDetailCacheKey(targetTab, sport, isPlayerGrid, isScheduleView, mode);
    const cachedHtml = cache.detailViews[cacheKey];
    if (cachedHtml) {
      btn.classList.add('active');
      if (isScheduleView) {
        document.getElementById('sport-filter-group')?.classList.add('schedule-hidden-after-select');
      }
      applyCachedHTML(container, cachedHtml);
      return;
    }

    return originalHandleSportFilterClick.apply(this, arguments);
  };
  handleSportFilterClick = window.handleSportFilterClick;

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', reprioritizeImages, { once:true });
    window.addEventListener('DOMContentLoaded', () => idle(() => { warmAll().catch(() => {}); }, 1200), { once:true });
  } else {
    reprioritizeImages();
    idle(() => { warmAll().catch(() => {}); }, 1200);
  }
})();
</script></script>

          <button class="schedule-day-btn ${defaultDay === 'day2' ? 'active' : ''}" type="button" data-day="day2" data-inline-click="switchScheduleOverviewDay('day2')">2일차</button>
        </div>
        <div class="section-empty-guide schedule-overview-empty-guide ${defaultDay ? 'is-hidden' : ''}">
          <strong style="font-size:1.365rem !important; line-height:1.15;">일차를 선택해 주세요.</strong>
          <span>상단에서 1일차 또는 2일차를 누르면 아래에 전체일정이 열립니다.</span>
        </div>
        ${renderPanel('day1', '1일차 전체일정', '4월 2일 · 운동장 및 체육관', day1Rows, day1ImageMeta)}
        ${renderPanel('day2', '2일차 전체일정', '4월 3일 · 마동근린공원', day2Rows, day2ImageMeta)}
      </div>`;
  }

  function writeFreshCaches(html){
    try {
      const cacheStore = window.__fullRenderCacheStore__ || window.__festivalRenderCache__;
      if (cacheStore && cacheStore.initialViews) {
        cacheStore.initialViews['일정_전체일정'] = html;
        cacheStore.scheduleOverviewReady = true;
      }
    } catch(_) {}
    try {
      localStorage.setItem(HTML_CACHE_KEY, JSON.stringify({ savedAt: Date.now(), html }));
    } catch(_) {}
  }

  window.loadScheduleOverview = async function loadScheduleOverviewStableV23(){
    const target = (typeof els !== 'undefined' && els && els.dataList) ? els.dataList : document.getElementById('data-list');
    if (typeof showState === 'function') showState('loader');
    try {
      const fetcher = (typeof fetchTabDataCached === 'function') ? fetchTabDataCached : fetchTabData;
      const [day1Data, day2Data] = await Promise.all([
        fetcher('전체일정_1일차'),
        fetcher('전체일정_2일차')
      ]);
      const html = buildOverviewHtml(day1Data, day2Data);
      if (!html) {
        if (typeof showState === 'function') showState('empty-box');
        return '';
      }
      if (target) target.innerHTML = html;
      writeFreshCaches(html);
      if (typeof showState === 'function') showState('data-list');
      if (typeof refreshDynamicUI === 'function' && target) refreshDynamicUI(target);
      return html;
    } catch (error) {
      if (typeof showState === 'function') showState('error-box');
      return '';
    }
  };

  try { loadScheduleOverview = window.loadScheduleOverview; } catch(_) {}
})();
</script>
