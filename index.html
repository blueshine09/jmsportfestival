<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f2f2f7" />
  <meta name="color-scheme" content="light" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="dns-prefetch" href="https://script.google.com" />
  <title>2026 중마스포츠축제</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <style>
    :root {
      --primary: #007aff;
      --dark: #111827;
      --gray: #f2f2f7;
      --text-main: #1c1c1e;
      --text-sub: #6e6e73;
      --white: #ffffff;
      --accent: #ef4444;
      --border: #d1d1d6;
      --border-soft: #e5e5ea;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-soft: 0 10px 24px rgba(0, 0, 0, 0.06);
      --skeleton: #e5e5ea;
      --table-header: #f2f2f7;
      --winner-gold: #f59e0b;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      margin: 0;
      background-color: var(--gray);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app-container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border-left: 1px solid #e5e5ea;
      border-right: 1px solid #e5e5ea;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(249, 249, 251, 0.92);
      backdrop-filter: blur(20px) saturate(1.2);
      border-bottom: 1px solid var(--border-soft);
      width: 100%;
    }

    header {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
    }

    .header-icon-btn {
      cursor: pointer;
      padding: 4px;
      border: none;
      background: transparent;
      color: var(--text-main);
    }
    
    .nav-tabs {
      display: flex;
      overflow-x: auto;
      padding: 0 5px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .nav-tabs::-webkit-scrollbar {
      display: none;
    }

    .tab-item {
      padding: 12px 10px;
      font-size: 0.85rem;
      color: var(--text-sub);
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
      border: none;
      border-bottom: 3px solid transparent;
      background: transparent;
      transition: 0.2s;
      flex-shrink: 0;
    }

    .tab-item.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 800;
    }

    .main-content {
      padding: 12px;
      flex: 1;
      background-color: var(--gray);
      width: 100%;
    }

    .page-intro h2 {
      font-size: 1.2rem;
      font-weight: 800;
      margin: 0 0 10px 0;
      color: var(--dark);
    }

    .page-intro.hidden {
      display: none;
    }

    .page-image {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 8px;
      object-fit: cover;
      aspect-ratio: 2.5 / 1;
      background-color: var(--skeleton);
      box-shadow: var(--shadow-soft);
    }
    

    .sport-select-guide {
      width: 100%;
      margin-top: 12px;
      padding: 28px 20px;
      border-radius: 36px;
      border: 2px dashed #d1d1d6;
      background: #f2f2f7;
      text-align: center;
    }

    .sport-select-guide.hidden {
      display: none;
    }

    .sport-select-guide-title {
      margin: 0;
      font-size: 1.365rem;
      font-weight: 900;
      line-height: 1.28;
      letter-spacing: -0.04em;
      color: #1c1c1e;
      word-break: keep-all;
    }

    .sport-select-guide-desc {
      margin: 22px 0 0;
      font-size: 1.27rem;
      line-height: 1.7;
      letter-spacing: -0.03em;
      color: #6e6e73;
      word-break: keep-all;
    }

    .teacher-link-card {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin: 0 0 14px 0;
      padding: 14px 16px;
      border: 1px solid #e5e5ea;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(242,242,247,0.96));
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
      cursor: pointer;
      text-align: left;
    }
    .teacher-link-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #007aff;
      background: linear-gradient(135deg, #f2f2f7, #ffffff);
      flex-shrink: 0;
    }
    .teacher-link-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .teacher-link-title {
      font-size: 0.98rem;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.02em;
    }
    .teacher-link-sub {
      font-size: 0.78rem;
      color: var(--text-sub);
      line-height: 1.45;
    }
    .info-notice-box {
      background: #fff9e8;
      border: 1px solid #ffd60a;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .info-notice-text {
      font-size: 0.82rem;
      color: #8e6b00;
      line-height: 1.5;
      font-weight: 600;
      margin: 0;
      text-align: justify;
      word-break: keep-all;
    }
    
    .day-info-tag {
      display: inline-flex;
      align-items: center;
      background: #eaf2ff;
      color: var(--primary);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 10px;
      border: 1px solid #c7ddff;
    }


    .day-tag-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .day-tag-row .day-info-tag {
      margin-bottom: 0;
    }

    .seat-layout-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #c7ddff;
      background: linear-gradient(135deg, #f7f8fa 0%, #ffffff 100%);
      color: #007aff;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.76rem;
      font-weight: 800;
      box-shadow: 0 6px 18px rgba(0, 122, 255, 0.10);
      cursor: pointer;
      white-space: nowrap;
    }

    .seat-layout-btn i {
      width: 15px;
      height: 15px;
    }

    .seat-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid #c7ddff;
      border-radius: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #f2f7ff 100%);
      color: #007aff;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      box-shadow: 0 10px 24px rgba(0, 122, 255, 0.10);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .seat-link-btn:active {
      transform: scale(0.98);
    }

    .seat-link-btn:hover {
      border-color: #b9d4ff;
      box-shadow: 0 12px 28px rgba(0, 122, 255, 0.12);
    }

    .seat-link-btn i {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .image-viewer-modal {
      position: fixed;
      inset: 0;
      background: rgba(28, 28, 30, 0.46);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 18px;
    }

    .image-viewer-dialog {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
    }

    .image-viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-soft);
      gap: 12px;
    }

    .image-viewer-title {
      font-size: 0.665rem !important;
      font-weight: 800;
      color: var(--dark);
    }

    .image-viewer-close {
      border: none;
      background: #f2f2f7;
      color: var(--text-main);
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .image-viewer-body {
      padding: 12px;
      background: #f2f2f7;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .image-viewer-body img {
      display: block;
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 18px;
      background: #ffffff;
      transform-origin: center center;
      transition: transform 120ms ease-out;
      will-change: transform;
      touch-action: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 공통 Hero 카드 */
    .hero-card {
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 14px;
      border: 1px solid transparent;
      background: linear-gradient(135deg, #f8fbff 0%, #ffffff 80%);
    }

    .hero-card.tone-blue {
      background: linear-gradient(135deg, #f8fbff 0%, #ffffff 80%);
      border-color: #e6eefc;
    }

    .hero-card.tone-purple {
      background: linear-gradient(135deg, #f5f5f7 0%, #ffffff 80%);
      border-color: #e5e5ea;
    }

    .hero-card.tone-green {
      background: linear-gradient(135deg, #f5f5f7 0%, #ffffff 80%);
      border-color: #e5e5ea;
    }

    .hero-card.tone-orange {
      background: linear-gradient(135deg, #f7f8fa 0%, #ffffff 80%);
      border-color: #e5e5ea;
    }

    .hero-card.tone-indigo {
      background: linear-gradient(135deg, #f5f5f7 0%, #ffffff 80%);
      border-color: #e5e5ea;
    }

    .hero-card.tone-pink {
      background: linear-gradient(135deg, #f7f8fa 0%, #ffffff 80%);
      border-color: #e5e5ea;
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .hero-copy {
      min-width: 0;
      flex: 1;
    }

    .hero-title {
      font-size: 1.04rem;
      font-weight: 900;
      color: var(--dark);
      margin-bottom: 6px;
      word-break: keep-all;
    }

    .hero-desc {
      font-size: 0.88rem;
      line-height: 1.58;
      color: var(--text-sub);
      word-break: keep-all;
    }

    .hero-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.74rem;
      font-weight: 900;
      padding: 7px 11px;
      border-radius: 999px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .hero-badge.tone-blue {
      background: #eaf2ff;
      color: var(--primary);
      border-color: #dbeafe;
    }

    .hero-badge.tone-purple {
      background: #f2f2f7;
      color: #5856d6;
      border-color: #d9d7ff;
    }

    .hero-badge.tone-green {
      background: #eafaf1;
      color: #34c759;
      border-color: #ccefd7;
    }

    .hero-badge.tone-orange {
      background: #fff4e8;
      color: #ff9500;
      border-color: #ffd7a1;
    }

    .hero-badge.tone-indigo {
      background: #eef0ff;
      color: #5856d6;
      border-color: #d9d7ff;
    }

    .hero-badge.tone-pink {
      background: #f2f2f7;
      color: #007aff;
      border-color: #e5e5ea;
    }

    /* 빈 상태 */
    .section-empty-guide {
      background: #ffffff;
      border: 1px dashed #dbe7de;
      border-radius: 18px;
      padding: 28px 18px;
      text-align: center;
      color: var(--text-sub);
    }

    .section-empty-guide strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.665rem !important;
      font-weight: 900;
      color: #1c1c1e;
    }

    .section-empty-guide span {
      display: block;
      font-size: 0.85rem;
      line-height: 1.6;
      word-break: keep-all;
    }

    /* 공통 칩 */
    .sub-tab-container,
    .filter-btn-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
      overflow: visible;
      padding-bottom: 2px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      align-items: stretch;
    }

    .sub-tab-container::-webkit-scrollbar,
    .filter-btn-grid::-webkit-scrollbar {
      display: none;
    }

    .sub-tab,
    .filter-btn {
      width: 100%;
      min-width: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid var(--border);
      font-size: 0.74rem;
      line-height: 1.2;
      font-weight: 800;
      color: var(--text-sub);
      text-align: center;
      cursor: pointer;
      padding: 10px 6px;
      box-shadow: var(--shadow);
      white-space: normal;
      word-break: keep-all;
      min-height: 42px;
    }

    .sub-tab.active,
    .filter-btn.active {
      background: linear-gradient(135deg, #0a84ff, #007aff);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 8px 20px rgba(0, 122, 255, 0.16);
    }

    .sub-tab-container.schedule-switcher {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      padding: 6px;
      margin-bottom: 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, #eef5ff 0%, #f7f8fa 100%);
      border: 1px solid #c7ddff;
      box-shadow: 0 10px 24px rgba(0, 122, 255, 0.08);
    }

    .sub-tab-container.schedule-switcher .sub-tab {
      min-height: 58px;
      padding: 10px 12px;
      border-radius: 16px;
      border: none;
      background: transparent;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 3px;
      text-align: left;
      color: #5b6b87;
    }

    .sub-tab-label {
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .sub-tab-meta {
      font-size: 0.68rem;
      font-weight: 700;
      line-height: 1.2;
      opacity: 0.88;
      word-break: keep-all;
    }

    .sub-tab-container.schedule-switcher .sub-tab.active {
      background: #ffffff;
      color: var(--primary);
      border: 1px solid #bfdbfe;
      box-shadow: 0 8px 18px rgba(59, 130, 246, 0.12);
    }

    .sport-detail-content {
      margin-top: 4px;
      margin-bottom: 24px;
    }

    /* 학년 탭 */
    .player-grade-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 8px;
      margin: 14px 0 12px;
      border-radius: 22px;
      background: linear-gradient(180deg, #f5f5f7 0%, #eef5ff 100%);
      border: 1px solid #e5e5ea;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.05);
    }

    .schedule-day-switcher {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px;
      margin: 14px 0 12px;
      border-radius: 22px;
      background: linear-gradient(180deg, #f5f5f7 0%, #eef5ff 100%);
      border: 1px solid #e5e5ea;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.05);
    }

    .schedule-day-btn {
      border: none;
      border-radius: 18px;
      background: transparent;
      color: #6b7280;
      font-weight: 800;
      font-size: 1rem;
      padding: 18px 12px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .schedule-day-btn.active {
      background: #ffffff;
      color: var(--dark);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
    }

    .schedule-day-panel { display: none; }
    .schedule-day-panel.active { display: block; }
    .schedule-overview-empty-guide.is-hidden { display: none !important; }
    .schedule-grade-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      padding: 4px;
      background: #eef5ff;
      border-radius: 999px;
      border: 1px solid #c7ddff;
    }

    .grade-btn,
    .schedule-grade-btn {
      flex: 1;
      width: 100%;
      min-width: 0;
      padding: 9px;
      border: none;
      background: transparent;
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text-sub);
      cursor: pointer;
      border-radius: 999px;
      white-space: nowrap;
    }

    .grade-btn.active,
    .schedule-grade-btn.active {
      background: #ffffff;
      color: var(--primary);
      box-shadow: var(--shadow);
    }

    /* 세부일정 - 두 줄 배치 */
    .schedule-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .schedule-card {
      background: #ffffff;
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: 10.5px 11px;
      box-shadow: var(--shadow);
    }

    .schedule-inline-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      min-width: 0;
    }

    .schedule-top-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .schedule-bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .schedule-bottom-left {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .schedule-time-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f2f2f7;
      color: #5856d6;
      border: 1px solid #ede9fe;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.92rem;
      font-weight: 900;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1;
    }

    .schedule-title-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1 1 auto;
      min-width: 0;
    }

    .schedule-match-title {
      font-size: 0.82rem;
      font-weight: 900;
      color: var(--dark);
      line-height: 1.2;
      flex: 1 1 auto;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .schedule-stage-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 0.67rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1;
      flex-shrink: 0;
      border: 1px solid transparent;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .schedule-stage-badge.prelim {
      background: #eaf4ff;
      color: #2f7edb;
      border-color: #d8e9ff;
    }

    .schedule-stage-badge.semi {
      background: #f1ecff;
      color: #7a5af8;
      border-color: #e4dbff;
    }

    .schedule-stage-badge.final {
      background: #fff1f3;
      color: #e64980;
      border-color: #ffd9e3;
    }

    .schedule-meta-row {
      display: flex;
      flex: 0 0 auto;
    }

    .schedule-action-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 0.66rem;
      font-weight: 800;
      white-space: nowrap;
      border: 1px solid var(--border);
      background: #f2f2f7;
      color: var(--text-sub);
      line-height: 1.1;
    }

    .meta-pill.location {
      background: #f2f2f7;
      color: #475569;
      border-color: #e2e8f0;
      max-width: 68px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .action-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 0.67rem;
      font-weight: 900;
      white-space: nowrap;
      cursor: pointer;

      background: linear-gradient(135deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0) 42%, rgba(245,158,11,0.06) 100%);
    }

    .bracket-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .bracket-title-stack {
      min-width: 0;
    }

    .bracket-kicker {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(245, 158, 11, 0.12);
      color: #b45309;
      font-size: 0.66rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }

    .bracket-title {
      font-size: 0.98rem;
      font-weight: 900;
      color: var(--dark);
      letter-spacing: -0.02em;
    }

    .bracket-subtitle {
      margin-top: 4px;
      font-size: 0.72rem;
      line-height: 1.45;
      color: var(--text-sub);
    }

    .bracket-round-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 62px;
      padding: 8px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255, 237, 213, 0.95);
      color: #c2410c;
      font-size: 0.72rem;
      font-weight: 900;
      box-shadow: 0 6px 16px rgba(249, 115, 22, 0.10);
    }

    .bracket.round-animated .round {
      opacity: 0;
      transform: translateY(14px) scale(0.985);
      animation: bracketRoundIn 0.5s ease forwards;
    }

    .bracket.round-animated .round:nth-child(1) { animation-delay: 0.02s; }
    .bracket.round-animated .round:nth-child(2) { animation-delay: 0.14s; }
    .bracket.round-animated .round:nth-child(3) { animation-delay: 0.26s; }

    .bracket.round-animated .match-unit {
      opacity: 0;
      transform: translateY(10px);
      animation: bracketMatchIn 0.38s ease forwards;
    }

    .bracket.round-animated .round:nth-child(1) .match-unit:nth-child(1) { animation-delay: 0.08s; }
    .bracket.round-animated .round:nth-child(1) .match-unit:nth-child(2) { animation-delay: 0.14s; }
    .bracket.round-animated .round:nth-child(1) .match-unit:nth-child(3) { animation-delay: 0.20s; }
    .bracket.round-animated .round:nth-child(1) .match-unit:nth-child(4) { animation-delay: 0.26s; }
    .bracket.round-animated .round:nth-child(2) .match-unit:nth-child(1) { animation-delay: 0.24s; }
    .bracket.round-animated .round:nth-child(2) .match-unit:nth-child(2) { animation-delay: 0.30s; }
    .bracket.round-animated .round:nth-child(3) .match-unit:nth-child(1) { animation-delay: 0.36s; }

    .team-row {
      transition: transform 0.22s ease, box-shadow 0.24s ease, border-color 0.22s ease, background-color 0.22s ease;
    }

    .team-row.winner,
    .team-row.bye-win {
      box-shadow: 0 10px 18px rgba(59, 130, 246, 0.14);
    }

    .team-row.final-winner {
      box-shadow: 0 14px 28px rgba(245, 158, 11, 0.26), 0 0 0 1px rgba(245, 158, 11, 0.22);
      transform: scale(1.03);
      border-color: rgba(245, 158, 11, 0.45);
      background: linear-gradient(180deg, rgba(255,251,235,0.98) 0%, rgba(255,255,255,0.98) 100%);
    }

    .team-row.final-winner .score {
      background: rgba(146, 64, 14, 0.16) !important;
      color: #fff !important;
      border-left: none;
    }

    .champ-area {
      position: relative;
      overflow: hidden;
      box-shadow: 0 18px 32px rgba(245, 158, 11, 0.16), 0 0 0 1px rgba(245, 158, 11, 0.18);
      animation: championPulse 2s ease-in-out infinite;
    }

    .champ-area::before {
      content: '';
      position: absolute;
      inset: -30% auto auto -10%;
      width: 60%;
      height: 180%;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.42) 50%, rgba(255,255,255,0) 100%);
      transform: rotate(18deg);
      animation: championShine 3.2s linear infinite;
      pointer-events: none;
    }

    .champ-label {
      letter-spacing: 0.04em;
    }

    .champ-team-name {
      position: relative;
      z-index: 1;
    }

    @keyframes relayChooserFade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bracketPanelIn {
      from { opacity: 0; transform: translateY(12px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes bracketRoundIn {
      from { opacity: 0; transform: translateY(14px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes bracketMatchIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes championPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 18px 32px rgba(245, 158, 11, 0.16); }
      50% { transform: scale(1.015); box-shadow: 0 22px 36px rgba(245, 158, 11, 0.24); }
    }

    @keyframes championShine {
      from { transform: translateX(-140%) rotate(18deg); }
      to { transform: translateX(260%) rotate(18deg); }
    }

    /* ===== 2026-03 mobile + iPhone-style refinement ===== */
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --home-card-min-h: 136px;
      --touch-size: 44px;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      padding-bottom: calc(var(--safe-bottom) + 10px);
    }

    .sticky-header {
      padding-top: var(--safe-top);
    }

    .header-icon-btn,
    .tab-item,
    .sub-tab,
    .filter-btn,
    .inline-btn,
    .close-btn {
      min-height: var(--touch-size);
    }

    .nav-tabs {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 4px;
      overflow: hidden;
      scroll-snap-type: none;
      -webkit-overflow-scrolling: auto;
      padding: 4px 8px 8px;
      margin: 0 8px 8px;
    }

    .tab-item {
      scroll-snap-align: none;
      min-width: 0;
      width: 100%;
      white-space: normal;
      word-break: keep-all;
      line-height: 1.15;
      font-size: 0.68rem;
      letter-spacing: -0.02em;
      padding: 9px 4px;
    }

    .quick-action-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .quick-action-card {
      min-height: 90px;
      height: 100%;
      padding: 14px 12px;
      align-items: flex-start;
      flex-direction: column;
      justify-content: flex-start;
      gap: 10px;
      border-radius: 22px;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    .quick-action-card:active,
    .menu-card:active,
    .home-mini-link:active {
      transform: scale(0.985);
    }

    .quick-action-icon,
    .icon-wrapper,
    .home-mini-link-icon {
      width: 44px;
      height: 44px;
      border-radius: 15px;
    }

    .quick-action-copy,
    .home-mini-link-copy {
      width: 100%;
    }

    .quick-action-title,
    .menu-label,
    .home-mini-link-title {
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      word-break: keep-all;
    }

    .home-menu-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: stretch;
      gap: 10px;
    }

    .menu-card,
    .home-mini-link {
      min-height: var(--home-card-min-h);
      height: 100%;
      padding: 16px 14px 14px;
      border-radius: 22px;
    }

    .menu-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 0;
    }

    .menu-desc {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.4em;
    }

    .menu-meta {
      margin-top: auto;

    .home-mini-link {

      align-items: flex-start;
      gap: 10px;

      width: 100%;

    }

      margin-top: auto;
      align-self: flex-end;
    }

    .main-content {
      padding-bottom: calc(20px + var(--safe-bottom));

    function stripTrueFalseText(value = '') {
      return String(value ?? '')
        .replace(/(^|[\s,\/|()\[\]{}<>-])(?:true|false)(?=$|[\s,\/|()\[\]{}<>-])/gi, '$1')
        .replace(/\s{2,}/g, ' ')
        .replace(/\n\s+/g, '\n')
        .replace(/[ ,]+\n/g, '\n')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }


    function sanitizeTabularData(data = []) {
      if (!Array.isArray(data)) return [];
      return data.map(row => {
        if (!row || typeof row !== 'object') return row;
        const nextRow = { ...row };
        Object.keys(nextRow).forEach(key => {
          const value = nextRow[key];
          if (typeof value === 'boolean') {
            nextRow[key] = '';
          } else if (typeof value === 'string') {
            nextRow[key] = stripTrueFalseText(value);
          }
        });
        return nextRow;
      });
    }


    function dedupeRosterRows(rows = []) {
      if (!Array.isArray(rows)) return [];
      const seen = new Set();
      return rows.filter(row => {
        if (!row || typeof row !== 'object') return false;
        const key = [row.col1 || '', row.col2 || '', row.col3 || '', row.col4 || '']
          .map(v => String(v).trim())
          .join('||');
        if (!key.replace(/\|/g, '').trim()) return false;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    const STORAGE_CACHE_PREFIX = 'sports-festival-cache-v26:';
    const STORAGE_CACHE_TTL_MS = 1000 * 60 * 3;

    function requestIdleTask(callback, timeout = 1200) {
      if (typeof window.requestIdleCallback === 'function') {
        return window.requestIdleCallback(callback, { timeout });
      }
      return setTimeout(callback, Math.min(timeout, 600));
    }

    function getStorageCacheKey(tabName) {
      return `${STORAGE_CACHE_PREFIX}${tabName}`;
    }

    function readPersistedTabCache(tabName) {
      try {
        const raw = localStorage.getItem(getStorageCacheKey(tabName));
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.data) || !parsed.savedAt) return null;
        if (Date.now() - parsed.savedAt > STORAGE_CACHE_TTL_MS) return null;
        return parsed.data;
      } catch (error) {
        return null;
      }
    }

    function writePersistedTabCache(tabName, data) {
      try {
        if (!Array.isArray(data)) return;
        localStorage.setItem(getStorageCacheKey(tabName), JSON.stringify({ savedAt: Date.now(), data }));
      } catch (error) {}
    }

    async function fetchTabData(tabName, { force = false } = {}) {
      if (!force && tabDataCache[tabName]) {
        return Promise.resolve(tabDataCache[tabName]);
      }

      if (!force) {
        const persisted = readPersistedTabCache(tabName);
        if (persisted) {
          tabDataCache[tabName] = persisted;
          requestIdleTask(() => {
            fetchTabData(tabName, { force: true }).catch(() => {});
          }, 900);
          return Promise.resolve(persisted);
        }
      }

      const request = fetch(`${SCRIPT_URL}?tab=${encodeURIComponent(tabName)}`, { cache: 'no-store' }).then(async (res) => {
        if (!res.ok) throw new Error('Network response was not ok');
        const json = await res.json();
        return sanitizeTabularData(json);
      });

      tabDataCache[tabName] = request;

      try {
        const data = await request;
        tabDataCache[tabName] = data;
        writePersistedTabCache(tabName, data);
        return data;
      } catch (error) {
        delete tabDataCache[tabName];
        throw error;
      }
    }

      let visibleCount = 0;

        const matched = searchText.includes(keyword);
        item.style.display = matched ? '' : 'none';
        if (matched) visibleCount += 1;
      });

        emptyBox.style.display = visibleCount === 0 ? 'block' : 'none';
      }
    }


    function parseTeacherShiftLines(value = '') {
      const lines = String(value || '')
        .split(/\n+/)
        .map(line => String(line || '').trim())
        .filter(Boolean);

      return lines.map(line => {
        const match = line.match(/^(오전|오후|종일)?\s*([0-9]{1,2}:[0-9]{2}\s*[~-]\s*[0-9]{1,2}:[0-9]{2})\s*[:：]\s*(.+)$/);
        if (!match) return null;
        const meridiem = String(match[1] || '').trim();
        const time = String(match[2] || '').replace(/\s*[~-]\s*/, ' ~ ').trim();
        const names = String(match[3] || '').trim();
        return {
          label: [meridiem, time].filter(Boolean).join(' '),
          names,
          raw: line
        };
      }).filter(Boolean);
    }

    function isProbablyImageUrl(value = '') {
      const text = String(value || '').trim();
      if (!text || !/^https?:\/\//i.test(text)) return false;
      return /\.(png|jpe?g|gif|webp|svg|bmp|avif)(\?.*)?$/i.test(text)
        || /drive\.google\.com/i.test(text)
        || /lh3\.googleusercontent\.com/i.test(text)
        || /googleusercontent\.com/i.test(text)
        || /i\.imgur\.com/i.test(text)
        || /^https?:\/\/imgur\.com\/[a-zA-Z0-9]+$/i.test(text)
        || /dropbox\.com/i.test(text)
        || /\/uc\?(?:[^#]*&)?id=/i.test(text)
        || /\/thumbnail\?id=/i.test(text);
    }

    function extractGoogleDriveFileId(url = '') {
      const value = String(url || '').trim();
      if (!value) return '';

      const patterns = [
        /drive\.google\.com\/file\/d\/([^/?#]+)/i,
        /drive\.google\.com\/open\?id=([^&#]+)/i,
        /[?&]id=([^&#]+)/i,
        /uc\?(?:[^#]*&)?id=([^&#]+)/i,
        /thumbnail\?id=([^&#]+)/i
      ];

      for (const pattern of patterns) {
        const match = value.match(pattern);
        if (match && match[1]) return match[1];
      }
      return '';
    }

    function normalizeImageUrl(url = '') {
      const value = String(url || '').trim();
      if (!value) return '';

      const driveId = extractGoogleDriveFileId(value);
      if (driveId) {
        return `https://drive.google.com/thumbnail?id=${driveId}&sz=w1600`;
      }

      if (/^[A-Za-z0-9_-]{20,}$/.test(value) && !/^https?:\/\//i.test(value)) {
        return `https://drive.google.com/thumbnail?id=${value}&sz=w1600`;
      }

      const imgurMatch = value.match(/^https?:\/\/imgur\.com\/([a-zA-Z0-9]+)$/i);
      if (imgurMatch) {
        return `https://i.imgur.com/${imgurMatch[1]}.jpg`;
      }

      if (/dropbox\.com/i.test(value)) {
        if (/[?&]raw=1/i.test(value)) return value;
        if (/[?&]dl=0/i.test(value)) return value.replace(/[?&]dl=0/i, '?raw=1');
        if (/[?&]dl=1/i.test(value)) return value.replace(/[?&]dl=1/i, '?raw=1');
        return `${value}${value.includes('?') ? '&' : '?'}raw=1`;
      }

      return value;
    }

    function isLikelyPlaceholderImageText(value = '') {
      const text = String(value || '').trim();
      if (!text) return true;
      if (isProbablyImageUrl(text) || /^[A-Za-z0-9_-]{20,}$/.test(text)) return false;
      return /(이미지를?\s*(넣|추가|등록|교체)|공유\s*링크|실제\s*(운동장|이동\s*동선|이미지)|이\s*위치에\s*넣|자리\s*배치\s*예시|seat\s*layout\s*example)/i.test(text);
    }

    function resolveDatasetValue(element, attrName = '') {
      if (!element || !attrName) return '';
      const kebab = attrName.includes('-') ? attrName : attrName.replace(/[A-Z]/g, (match) => `-${match.toLowerCase()}`);
      const camel = kebab.replace(/-([a-z])/g, (_, ch) => ch.toUpperCase());
      return element.getAttribute(`data-${kebab}`)
        || element.getAttribute(`data-${camel}`)
        || element.dataset?.[camel]
        || '';
    }

    function getTeacherMapImageMeta(row = {}) {

      const col6 = String(row.col6 || '').trim();

      const candidates = [col5, col6, col7].filter(Boolean);

      const imageSource = candidates.find(value => {
        const text = String(value || '').trim();
        return isProbablyImageUrl(text) || /^[A-Za-z0-9_-]{20,}$/.test(text);
      }) || '';

      const imageUrl = normalizeImageUrl(imageSource);
      const desc = [col5, col6, col7].filter(value => value && value !== imageSource).join(' ');
      return { imageUrl, desc, hasImage: !!imageUrl, sourceUrl: imageSource };
    }

    const imageViewerZoomState = {
      scale: 1,
      minScale: 1,
      maxScale: 4,
      x: 0,
      y: 0,
      startX: 0,
      startY: 0,
      baseDistance: 0,
      baseScale: 1,
      mode: '',
      rafId: 0
    };

    function getImageViewerElements() {
      return {
        modal: document.getElementById('image-viewer-modal'),
        body: document.getElementById('image-viewer-body'),
        img: document.getElementById('image-viewer-img')
      };
    }

    function getTouchDistance(t1, t2) {
      const dx = t2.clientX - t1.clientX;
      const dy = t2.clientY - t1.clientY;
      return Math.hypot(dx, dy);
    }

    function clampImageViewerPosition() {
      const { body, img } = getImageViewerElements();
      if (!body || !img) return;
      const rect = body.getBoundingClientRect();
      const scaledWidth = (img.clientWidth || rect.width || 1) * imageViewerZoomState.scale;
      const scaledHeight = (img.clientHeight || rect.height || 1) * imageViewerZoomState.scale;
      const maxX = Math.max(0, (scaledWidth - rect.width) / 2);
      const maxY = Math.max(0, (scaledHeight - rect.height) / 2);
      imageViewerZoomState.x = Math.max(-maxX, Math.min(maxX, imageViewerZoomState.x));
      imageViewerZoomState.y = Math.max(-maxY, Math.min(maxY, imageViewerZoomState.y));
    }

    function applyImageViewerTransform() {
      const { img } = getImageViewerElements();
      if (!img) return;
      clampImageViewerPosition();
      if (imageViewerZoomState.rafId) cancelAnimationFrame(imageViewerZoomState.rafId);
      imageViewerZoomState.rafId = requestAnimationFrame(() => {
        img.style.transform = `translate(${imageViewerZoomState.x}px, ${imageViewerZoomState.y}px) scale(${imageViewerZoomState.scale})`;
      });
    }

    function resetImageViewerZoom() {
      imageViewerZoomState.scale = 1;
      imageViewerZoomState.x = 0;
      imageViewerZoomState.y = 0;
      imageViewerZoomState.startX = 0;
      imageViewerZoomState.startY = 0;
      imageViewerZoomState.baseDistance = 0;
      imageViewerZoomState.baseScale = 1;
      imageViewerZoomState.mode = '';
      applyImageViewerTransform();
    }

    function primeImage(url = '') {
      const finalUrl = normalizeImageUrl(url);
      if (!finalUrl) return;
      const img = new Image();
      img.decoding = 'async';
      img.loading = 'eager';
      img.referrerPolicy = 'no-referrer';
      img.src = finalUrl;
    }

    function bindImageViewerGestures() {
      const { body } = getImageViewerElements();
      if (!body || body.dataset.zoomBound === 'true') return;
      body.dataset.zoomBound = 'true';

      body.addEventListener('touchstart', (event) => {
        if (!event.touches || !event.touches.length) return;
        if (event.touches.length >= 2) {
          imageViewerZoomState.mode = 'pinch';
          imageViewerZoomState.baseDistance = getTouchDistance(event.touches[0], event.touches[1]);
          imageViewerZoomState.baseScale = imageViewerZoomState.scale;
          return;
        }
        if (imageViewerZoomState.scale > 1) {
          imageViewerZoomState.mode = 'pan';
          imageViewerZoomState.startX = event.touches[0].clientX - imageViewerZoomState.x;
          imageViewerZoomState.startY = event.touches[0].clientY - imageViewerZoomState.y;
        }
      }, { passive: true });

      body.addEventListener('touchmove', (event) => {
        if (event.touches.length >= 2) {
          const distance = getTouchDistance(event.touches[0], event.touches[1]);
          if (!imageViewerZoomState.baseDistance) imageViewerZoomState.baseDistance = distance;
          const nextScale = imageViewerZoomState.baseScale * (distance / imageViewerZoomState.baseDistance);
          imageViewerZoomState.scale = Math.max(imageViewerZoomState.minScale, Math.min(imageViewerZoomState.maxScale, nextScale));
          applyImageViewerTransform();
          event.preventDefault();
          return;
        }
        if (imageViewerZoomState.mode === 'pan' && event.touches.length === 1 && imageViewerZoomState.scale > 1) {
          imageViewerZoomState.x = event.touches[0].clientX - imageViewerZoomState.startX;
          imageViewerZoomState.y = event.touches[0].clientY - imageViewerZoomState.startY;
          applyImageViewerTransform();
          event.preventDefault();
        }
      }, { passive: false });

      body.addEventListener('touchend', () => {
        if (imageViewerZoomState.scale <= 1.01) {
          resetImageViewerZoom();
        } else {
          imageViewerZoomState.mode = '';
          imageViewerZoomState.baseDistance = 0;
          imageViewerZoomState.baseScale = imageViewerZoomState.scale;
          applyImageViewerTransform();
        }
      }, { passive: true });

      body.addEventListener('dblclick', (event) => {
        event.preventDefault();
        if (imageViewerZoomState.scale > 1) {
          resetImageViewerZoom();
        } else {
          imageViewerZoomState.scale = 2;
          imageViewerZoomState.x = 0;
          imageViewerZoomState.y = 0;
          applyImageViewerTransform();
        }
      });
    }

      els.subTabArea.innerHTML = '';

      els.subTabArea.classList.toggle('score-switcher', config.key === '점수시상');
      els.subTabArea.style.display = config.subTabs ? 'grid' : 'none';

      if (!config.subTabs) {
        applyNotice({ key: config.key, hideNotice: config.hideNotice });
        loadData(config.key);
        return;
      }

      config.subTabs.forEach(st => {
        const btn = document.createElement('button');
        btn.className = 'sub-tab';
        btn.dataset.key = st.key;
        btn.innerHTML = config.key === '일정'
          ? `<span class="sub-tab-label">${st.label}</span><span class="sub-tab-meta">${st.meta || ''}</span>`
          : `<span class="sub-tab-label">${st.label}</span>`;
        btn.onclick = () => {
          clearScoreAutoRefresh();
          const isAlreadyActive = btn.classList.contains('active');
          document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));

          if (isAlreadyActive) {
            els.dataList.innerHTML = '';
            els.pageNoticeArea.innerHTML = '';
            els.dayTagArea.innerHTML = '';
            return;
          }

          btn.classList.add('active');

          const mergedNoticeConfig = {
            ...st,
            hideNotice: typeof st.hideNotice === 'boolean' ? st.hideNotice : !!config.hideNotice
          };
          applyNotice(mergedNoticeConfig);
          els.dataList.innerHTML = '';

          if (st.type === 'realtime_score') {
            loadRealtimeScore(st.key);
            scoreRefreshInterval = setInterval(() => loadRealtimeScore(st.key, true), 60000);
          } else if (st.type === 'award_plan') {

            renderSportGrid('선수단', true);
          } else if (st.type === 'referee_filter') {

          } else if (st.type === 'schedule_overview') {

          } else {

          }
        };

      const firstBtn = els.subTabArea.querySelector('.sub-tab');

    function escapeHtml(str = '') {
      return String(stripTrueFalseText(str))
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function nl2brSafe(str = '') {
      return escapeHtml(str).replace(/\r?\n/g, '<br>');
    }

    function utf8ToBase64(str = '') {
      const bytes = new TextEncoder().encode(String(str));
      let binary = '';
      bytes.forEach(byte => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary);
    }

    function base64ToUtf8(base64 = '') {
      try {
        const binary = atob(base64);
        const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      } catch (e) {
        return '';
      }
    }

    function normalizeSportName(name = '') {
      let value = String(name).trim();
      value = value.replace(/\s+/g, '');
      if (value === '팔시름') value = '팔씨름';
      return value;
    }

    function sportEquals(a = '', b = '') {
      return normalizeSportName(a) === normalizeSportName(b);
    }

    function isGradeFilterSport(sport = '') {
      return GRADE_FILTER_SPORTS.some(item => sportEquals(item, sport));
    }

    function detectGradeFromText(text = '') {
      const str = String(text || '').trim();
      if (/1학년/.test(str)) return '1학년';
      if (/2학년/.test(str)) return '2학년';
      if (/3학년/.test(str)) return '3학년';

      const match = str.match(/([123])-\d+/);
      if (match) return `${match[1]}학년`;

      return '';
    }

    function getScheduleGrade(item) {
      const candidates = [
        item.col6, item.col5, item.col4, item.col3, item.col2, item.col1
      ].filter(Boolean);

      for (const value of candidates) {
        const grade = detectGradeFromText(value);
        if (grade) return grade;
      }
      return '';
    }

    async function getGlobalSearchIndex(tabName, mode = 'player') {
      const cacheKey = `${tabName}-${mode}`;
      if (globalSearchIndexCache[cacheKey]) return globalSearchIndexCache[cacheKey];

      const allData = await fetchTabDataCached(tabName);
      const rows = Array.isArray(allData) ? allData.slice(1) : [];
      const indexedRows = rows.map(item => {
        const raw = mode === 'player'
          ? `${item.col1 || ''} ${item.col2 || ''} ${item.col3 || ''}`
          : `${item.col1 || ''} ${item.col2 || ''} ${item.col3 || ''} ${item.col4 || ''}`;
        return {
          item,
          searchText: normalizeSearchText(raw)
        };
      });

      globalSearchIndexCache[cacheKey] = indexedRows;
      return indexedRows;
    }

    async function handleGlobalSportSearch(contextKey) {
      if (!currentSportSearchContext || currentSportSearchContext.key !== contextKey) return;
      const input = document.getElementById(currentSportSearchContext.inputId);
      const resultBox = document.getElementById(currentSportSearchContext.resultId);
      const emptyBox = document.getElementById(`${currentSportSearchContext.inputId.replace(/-search$/, '')}-empty`);
      if (!input || !resultBox) return;

      const keyword = normalizeSearchText(input.value);
      if (emptyBox) emptyBox.style.display = 'none';

      if (!keyword) {
        resultBox.innerHTML = '';
        return;
      }

      resultBox.innerHTML = '<div class="loader" style="font-size:0.8rem; padding:20px;">검색 중...</div>';

      try {
        const tabName = currentSportSearchContext.mode === 'player' ? '선수단' : '심판';
        const indexedRows = await getGlobalSearchIndex(tabName, currentSportSearchContext.mode);
        const filtered = indexedRows
          .filter(entry => entry.searchText.includes(keyword))
          .map(entry => entry.item);

        if (currentSportSearchContext.mode === 'player') {
          renderGlobalPlayerSearchResults(resultBox, filtered, keyword);
        } else {
          renderGlobalRefereeSearchResults(resultBox, filtered, keyword);
        }
      } catch (e) {
        resultBox.innerHTML = '<div class="loader" style="font-size:0.8rem;">⚠️ 검색 결과를 불러올 수 없습니다.</div>';
      }
    }

    function initializeSportSearchContext(mode) {
      const prefix = createUID(`global-${mode}`);
      const searchSectionHTML = createSearchSectionHTML(mode, mode === 'player' ? '선수 이름을 검색해 주세요.' : '심판 이름 또는 역할을 검색해 주세요.');
      return {
        mode,
        html: searchSectionHTML,
        inputId: `${prefix}-search`,
        resultId: `${prefix}-results`,
        prefix
      };
    }

    function normalizeSearchText(value = '') {
      return stripTrueFalseText(String(value || '')).replace(/\s+/g, '').toLowerCase();
    }

    const searchFilterFrameMap = {};
    const searchFilterDebounceMap = {};

    function updateSearchInputState(targetId) {
      const input = document.getElementById(`${targetId}-search`);
      const wrap = document.getElementById(`${targetId}-search-wrap`);
      if (!input || !wrap) return;
      wrap.classList.toggle('has-value', !!input.value);
    }

    function closeMobileKeyboard(input) {
      if (!input || typeof input.blur !== 'function') return;
      input.blur();
      if (document.activeElement && typeof document.activeElement.blur === 'function') {
        document.activeElement.blur();
      }
    }

    function handleSearchInputSubmit(targetId) {
      const input = document.getElementById(`${targetId}-search`);
      if (!input) return;
      if (isGlobalSportSearchTarget(targetId)) {
        handleGlobalSportSearch(currentSportSearchContext.key);
      } else {
        filterSearchItems(targetId);
      }
      closeMobileKeyboard(input);
    }

    function handleSearchInputKeydown(event, targetId) {
      if (!event || event.key !== 'Enter') return;
      handleSearchInputSubmit(targetId);
    }

    function clearSearchInput(targetId) {
      const input = document.getElementById(`${targetId}-search`);
      if (!input) return;
      input.value = '';
      updateSearchInputState(targetId);
      if (isGlobalSportSearchTarget(targetId)) {
        const resultBox = document.getElementById(currentSportSearchContext.resultId);
        const emptyBox = document.getElementById(`${targetId}-empty`);
        if (resultBox) resultBox.innerHTML = '';
        if (emptyBox) emptyBox.style.display = 'none';
      } else {
        filterSearchItems(targetId);
      }
      input.focus();
    }

    function prepareSearchItems(targetId) {
      const wrapper = document.getElementById(targetId);
      if (!wrapper) return;
      const items = wrapper.querySelectorAll('[data-search-item="true"]');
      items.forEach(item => {
        if (!item.dataset.searchPrepared) {
          const rawText = item.dataset.searchText || item.textContent || '';
          item.dataset.searchText = normalizeSearchText(rawText);
          item.dataset.searchPrepared = 'true';
        }
      });
    }

    function isGlobalSportSearchTarget(targetId) {
      return !!(
        currentSportSearchContext &&
        currentSportSearchContext.inputId === `${targetId}-search`
      );
    }

    function scheduleFilterSearch(targetId) {
      updateSearchInputState(targetId);

      if (searchFilterFrameMap[targetId]) {
        cancelAnimationFrame(searchFilterFrameMap[targetId]);
        searchFilterFrameMap[targetId] = null;
      }

      if (searchFilterDebounceMap[targetId]) {
        clearTimeout(searchFilterDebounceMap[targetId]);
      }

      searchFilterDebounceMap[targetId] = setTimeout(() => {
        searchFilterFrameMap[targetId] = requestAnimationFrame(() => {
          if (isGlobalSportSearchTarget(targetId)) {
            handleGlobalSportSearch(currentSportSearchContext.key);
          } else {
            filterSearchItems(targetId);
          }
          searchFilterFrameMap[targetId] = null;
        });
        searchFilterDebounceMap[targetId] = null;
      }, 60);
    }

    function filterSearchItems(targetId) {
      const input = document.getElementById(`${targetId}-search`);
      const wrapper = document.getElementById(targetId);
      const emptyBox = document.getElementById(`${targetId}-empty`);
      if (!input || !wrapper) return;

      prepareSearchItems(targetId);
      updateSearchInputState(targetId);

      const keyword = normalizeSearchText(input.value);
      const items = wrapper.querySelectorAll('[data-search-item="true"]');
      let visibleCount = 0;

      items.forEach(item => {
        const searchText = item.dataset.searchText || '';
        const matched = !keyword || searchText.includes(keyword);
        item.style.display = matched ? '' : 'none';
        if (matched) visibleCount += 1;
      });

      if (emptyBox) {
        emptyBox.style.display = items.length > 0 && visibleCount === 0 ? 'block' : 'none';
      }
    }

    function getScheduleStageInfo(stageValue, matchInfo) {
      const stageText = String(stageValue || '').replace(/\s+/g, ' ').trim();

        return { label: '준결승', className: 'semi' };
      }
      if (text.includes('결승') || text.toLowerCase().includes('final')) {

      if (text.includes('예선') || text.toLowerCase().includes('prelim')) {

    /* 규칙 헬퍼 */
    function normalizeRuleType(value = '') {
      const v = String(value).trim().toLowerCase();
      if (!v) return '';
      if (['summary', 'sum', '요약', '핵심', '카드', 'info'].includes(v)) return 'summary';
      if (['section', 'setction', 'sectoin', 'detail', '상세', '규칙', '항목', '본문'].includes(v)) return 'section';
      if (['meta', '설명', '소개', '안내'].includes(v)) return 'meta';
      if (['warning', 'warnning', '주의', '경고'].includes(v)) return 'warning';
      return '';
    }

    function isRuleSummaryTitle(title = '') {
      const t = String(title).trim();
      return [
        '인원', '경기 인원', '참가 인원',
        '시간', '경기 시간',
        '승패', '승패 방식',
        '장소', '복장', '대상',
        '방식', '진행 방식', '진행방식'
      ].includes(t);
    }

    function isRuleMetaTitle(title = '') {
      const t = String(title).trim();
      return ['한줄요약', '핵심요약', '핵심', '요약', '안내'].includes(t);
    }

    function splitRuleText(text = '') {
      return String(text)
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/\r/g, '\n')
        .split(/\n+/)
        .map(line => line.replace(/^[•·\-※\s]+/, '').trim())
        .filter(Boolean);
    }

    function getDefaultRuleSectionTitle(type, tone = 'normal') {
      if (tone === 'warning' || type === 'warning') return '주의사항';
      if (type === 'section') return '경기 규칙';
      return '안내';
    }

    function buildRuleViewModel(filtered) {
      const rows = (filtered || []).map((item, index) => {
        const col2 = (item.col2 || '').trim();
        const col3 = (item.col3 || '').trim();
        const col4 = (item.col4 || '').trim();
        const col5 = (item.col5 || '').trim();
        const col6 = (item.col6 || '').trim();
        const col7 = (item.col7 || '').trim();

        const explicitType = normalizeRuleType(col2);

        let type = 'section';
        let title = '';
        let content = '';
        let badge = '';
        let tone = 'normal';
        let order = index;

        if (explicitType) {
          const isWarningType = explicitType === 'warning';
          type = isWarningType ? 'section' : explicitType;
          tone = (isWarningType || /warning|주의|경고/i.test(col6)) ? 'warning' : 'normal';
          badge = col5 || '';
          const parsedOrder = parseInt(col7, 10);
          order = Number.isNaN(parsedOrder) ? index : parsedOrder;

          if (explicitType === 'meta') {
            title = '한줄요약';
            content = col4 || col3 || '';
          } else if (explicitType === 'summary') {
            if (col4) {
              title = col3 || `항목 ${index + 1}`;
              content = col4;
            } else {
              const parts = col3.split(/[:：]/);
              if (parts.length >= 2) {
                title = parts.shift().trim() || `항목 ${index + 1}`;
                content = parts.join(':').trim();
              } else {
                title = `항목 ${index + 1}`;
                content = col3;
              }
            }
          } else {
            if (col4) {
              title = col3 || getDefaultRuleSectionTitle(explicitType, tone);
              content = col4;
            } else {
              title = getDefaultRuleSectionTitle(explicitType, tone);
              content = col3;
            }
          }
        } else {
          title = col2 || `규칙 ${index + 1}`;
          content = col3 || '';
          badge = '';
          order = index;

          if (isRuleMetaTitle(title)) type = 'meta';
          else if (isRuleSummaryTitle(title)) type = 'summary';
          else type = 'section';

          if (/주의|경고|실격|반칙|금지/.test(title)) tone = 'warning';
        }

        return { type, title, content, badge, tone, order };
      }).sort((a, b) => a.order - b.order);

      const summary = [];
      const sections = [];
      let description = '';
      let heroBadge = '';

      rows.forEach(row => {
        if (row.type === 'meta') {
          if (!description && row.content) description = row.content;
          if (!heroBadge && row.badge) heroBadge = row.badge;
          return;
        }

        if (row.type === 'summary') {
          if (row.content) {
            summary.push({
              label: row.title,
              value: row.content
            });
          }
          return;
        }

        let section = sections.find(item => item.title === row.title && item.tone === row.tone);

        if (!section) {
          section = {
            title: row.title || (row.tone === 'warning' ? '주의사항' : '경기 규칙'),
            tone: row.tone || 'normal',
            badge: row.badge || '',
            items: []
          };
          sections.push(section);
        }

        if (row.badge && !section.badge) {
          section.badge = row.badge;
        }

        const items = splitRuleText(row.content);
        if (items.length > 0) {
          section.items.push(...items);
        } else if (row.content) {
          section.items.push(row.content);
        }
      });

      return {
        description: description || '아래 핵심 규칙과 상세 내용을 순서대로 확인해 주세요.',
        heroBadge: heroBadge || `총 ${sections.length}개 항목`,
        summary: summary.slice(0, 4),
        sections
      };
    }

    function createRuleSummaryHTML(summary) {
      if (!summary || summary.length === 0) return '';
      return `
        <div class="rule-summary-grid">
          ${summary.map(item => `
            <div class="rule-summary-box">
              <span class="rule-summary-label">${escapeHtml(item.label)}</span>
              <strong class="rule-summary-value">${escapeHtml(item.value)}</strong>

    }

    async function openDetailInfo(type, sport, matchInfo = '') {
      const modal = document.getElementById('detail-modal');
      const title = document.getElementById('detail-modal-title');
      const content = document.getElementById('detail-modal-content');

      title.textContent = `${sport} ${type} 정보`;
      content.innerHTML = '<div class="loader">데이터를 불러오고 있습니다...</div>';
      modal.style.display = 'flex';

      try {
        const res = await fetch(`${SCRIPT_URL}?tab=${encodeURIComponent(type)}`);
        const data = await res.json();

        if (type === '선수단') {
          const classes = matchInfo.match(/\d+-\d+/g) || [];

          if (classes.length > 0) {
            const filtered = dedupeRosterRows(data.filter(item => {
              const itemSport = (item.col1 || '').trim();
              const itemClass = (item.col2 || '').trim();
              return sportEquals(itemSport, sport) && classes.some(cls => itemClass.includes(cls));
            }));
            renderClassCards(content, filtered, sport, false);
          } else if (isGradeFilterSport(sport)) {
            renderGradeFilterAndList(content, data, sport);
          } else {
            const filtered = dedupeRosterRows(data.filter(item => sportEquals(item.col1 || '', sport)));
            renderClassCards(content, filtered, sport, false);
          }
        } else {
          const filtered = data.filter(item => sportEquals(item.col1 || '', sport));
          renderSubList(content, filtered, sport, type);
        }
      } catch (e) {
        content.innerHTML = '<div class="loader">⚠️ 데이터를 불러오는데 실패했습니다.</div>';
      }
    }

    function getCachedPlayerRows(data, sport, grade = '') {
      const cacheKey = `${sport}__${grade || 'all'}`;
      if (playerGradeFilterCache[cacheKey]) return playerGradeFilterCache[cacheKey];

      const gradeDigit = grade ? grade.charAt(0) : '';
      const rows = dedupeRosterRows((data || []).filter(item => {
        const sportMatched = sportEquals(item.col1 || '', sport);
        if (!sportMatched) return false;
        if (!gradeDigit) return true;
        return String(item.col2 || '').startsWith(`${gradeDigit}-`);
      }));

      playerGradeFilterCache[cacheKey] = rows;
      return rows;
    }

    function extractScheduleImageMeta(data, fallbackTitle = '연합팀 좌석 배치') {
      if (!Array.isArray(data) || data.length <= 1) return null;

      const rows = data.slice(1);
      const findImageCandidate = (row = {}) => {
        const candidates = [row.col5, row.col6, row.col7]
          .map(value => String(value || '').trim())
          .filter(Boolean);
        return candidates.find(value => {
          if (!value || isLikelyPlaceholderImageText(value)) return false;
          return isProbablyImageUrl(value) || /^[A-Za-z0-9_-]{20,}$/.test(value);
        }) || '';
      };

      const imageRow = rows.find(item => !!findImageCandidate(item)) || null;
      if (!imageRow) return null;

      const rawUrl = findImageCandidate(imageRow);
      const normalizedUrl = normalizeImageUrl(rawUrl);
      if (!normalizedUrl) return null;

      return {
        title: String(imageRow.col6 || imageRow.col4 || imageRow.col3 || fallbackTitle || '연합팀 좌석 배치').trim(),
        url: normalizedUrl,
        sourceUrl: rawUrl
      };
    }

    function extractDetailScheduleGuideMeta(rows = [], fallbackTitle = '경기장 안내') {
      if (!Array.isArray(rows) || !rows.length) return null;

      const findImageCandidate = (row = {}) => {
        const raw = String(row.col8 || '').trim();
        if (!raw || isLikelyPlaceholderImageText(raw)) return '';
        if (isProbablyImageUrl(raw) || /^[A-Za-z0-9_-]{20,}$/.test(raw)) return raw;
        return '';
      };

      const images = rows
        .map((row, index) => {
          const rawUrl = findImageCandidate(row);
          if (!rawUrl) return null;
          const normalizedUrl = normalizeImageUrl(rawUrl);
          if (!normalizedUrl) return null;
          return {
            index,
            title: String(row.col9 || row.col3 || row.col1 || fallbackTitle || '경기장 안내').trim(),
            url: normalizedUrl,
            sourceUrl: rawUrl
          };
        })
        .filter(Boolean);

      if (!images.length) return null;

      return {
        title: fallbackTitle || '경기장 안내',
        url: images[0]?.url || '',
        sourceUrl: images[0]?.sourceUrl || '',
        images
      };
    }

    function buildRaceBracketHTML(filtered, sportTitle = '') {
      const isJump = false;
      const isCompactWinnerSport = String(sportTitle || '').includes('팔씨름');
      const rows = uniqueRows(filtered).filter((item) => normalizeCell(item?.col2));
      const stageText = (value) => String(value == null ? '' : value).replace(/\s+/g, ' ').trim();
      const rankNum = (item) => {
        const meta = extractRelayMeta(item);
        const raw = String(meta.rankText || '').replace(/\D/g, '');
        const n = parseInt(raw, 10);
        return Number.isFinite(n) ? n : 999;
      };
      const hasStageLabels = rows.some((item) => /^(?:예선|준결승|결승)$/u.test(stageText(item?.col5)));

      const prelimRows = hasStageLabels
        ? rows.filter((item) => /^(?:예선|준결승)$/u.test(stageText(item?.col5)))
        : rows.slice(0, 7);

      const manualFinalTeams = hasStageLabels
        ? rows.filter((item) => /^결승$/u.test(stageText(item?.col5)))
        : rows.slice(7, 11).filter((item) => normalizeCell(item?.col2));

      const heat1 = prelimRows.slice(0, Math.min(4, prelimRows.length));
      const heat2 = prelimRows.slice(Math.min(4, prelimRows.length));
      const heats = [
        { key: '', teams: heat1, badge: `${heat1.length}팀 경기` },
        { key: '', teams: heat2, badge: `${heat2.length}팀 경기` }
      ].filter((heat) => (heat.teams || []).length > 0);

      const autoFinalTeams = collectRelayAdvanceTeams(heats);
      const finalTeams = (manualFinalTeams.length ? manualFinalTeams : autoFinalTeams)
        .filter((item) => normalizeCell(item?.col2))
        .sort((a, b) => rankNum(a) - rankNum(b))
        .slice(0, 4);

      const champion = finalTeams.find((item) => rankNum(item) === 1)?.col2 || '결과 입력 대기';

      const heatCards = heats.map((heat, heatIndex) => `
        <div class="race-stage-card">
          <div class="race-stage-head">
            <div>
              <div class="race-stage-kicker">HEAT ${heatIndex + 1}</div>
              <div class="race-stage-title"></div>
            </div>
            <span class="race-stage-badge">${heat.badge}</span>
          </div>
          <div class="race-team-stack">
            ${heat.teams.map((team, idx) => createRaceHeatTeamHTML(team, idx)).join('')}
          </div>
          <div class="race-advance-note">각 조 상위 2팀 결승 진출</div>
        </div>
      `).join('');

      return `
        <div class="bracket-panel${isJump ? ' jump-result-panel' : ''}${isCompactWinnerSport ? ' compact-winner-bracket' : ''}">
          <div class="race-bracket-board">
            ${heatCards}
            <div class="race-stage-card final">
              <div class="race-stage-head">
                <div>
                  <div class="race-stage-kicker">FINAL</div>
                  <div class="race-stage-title">결승</div>
                </div>
                <span class="race-stage-badge">${finalTeams.length || 0}팀 결승</span>
              </div>
              <div class="race-team-stack">
                ${finalTeams.length ? finalTeams.map((team, idx) => createRaceFinalTeamHTML(team, idx)).join('') : '<div class="race-team-empty">결승 진출 팀이 아직 없습니다.</div>'}
              </div>
            </div>
            <div class="race-champion-banner${isCompactWinnerSport ? ' compact-winner-banner' : ''}">
              <div class="race-champion-copy">
                <div class="race-champion-label"><span class="trophy-icon" aria-hidden="true"></span>CHAMPION</div>
                <div class="race-champion-name">${escapeHtml(champion)}</div>
                <div class="race-champion-desc">결승 1위 팀을 우승팀으로 표시합니다.</div>
              </div>
              <div class="race-team-status champion">우승</div>
            </div>
          </div>
        </div>
      `;
    }


    function parseRankingNumber(value = '', sportTitle = '') {
      const raw = String(value || '').trim();
      if (!raw) return Number.POSITIVE_INFINITY;
      const sport = String(sportTitle || '').trim();
      if (sport.includes('미션달리기')) {
        const rankMatch = raw.match(/(\d+)\s*위/);
        if (rankMatch) return Number(rankMatch[1]);
      }
      const numeric = raw.replace(/,/g, '').match(/-?\d+(?:\.\d+)?/);
      if (numeric) return Number(numeric[0]);
      const rankMatch = raw.match(/(\d+)\s*위/);
      if (rankMatch) return Number(rankMatch[1]);
      return Number.POSITIVE_INFINITY;
    }

    function buildResultRankingHTML(filtered, sportTitle = '') {
      const sport = String(sportTitle || '').trim();
      const isJump = sport.includes('8자 줄넘기') || sport.includes('단체줄넘기');

      const rows = (filtered || []).filter((item) => normalizeCell(item?.col2));

        return {
          item,
          index,
          team: normalizeCell(item?.col2) || `팀 ${index + 1}`,
          resultText,
          detailText,
          sortValue: parseRankingNumber(resultText, sport),
        };
      });

      decorated.sort((a, b) => {
        const av = a.sortValue;
        const bv = b.sortValue;
        if (Number.isFinite(av) && Number.isFinite(bv)) {
          if (isMission) return av - bv || a.index - b.index;
          return bv - av || a.index - b.index;
        }
        if (Number.isFinite(av)) return -1;
        if (Number.isFinite(bv)) return 1;
        return a.index - b.index;
      });

      const champion = decorated.find((entry, idx) => {
        const raw = normalizeCell(entry.resultText);
        if (!raw || /^(?:기록\s*미입력|미입력|경기전)$/u.test(raw)) return false;
        return idx === 0;
      })?.team || '결과 입력 대기';
      const desc = isJump
        ? '입력된 기록이 가장 높은 학급을 우승팀으로 표시합니다.'
        : '입력된 순위가 1위인 학급을 우승팀으로 표시합니다.';
      const badge = isJump ? '최고 기록 우승' : '1위 우승';
      const valueLabel = isJump ? '기록' : '순위';

      return `
        <div class="bracket-panel${isJump ? ' compact-winner-panel' : ''}'>
          <div class="race-bracket-board">
            <div class="race-stage-card final">
              <div class="race-stage-head">
                <div>
                  <div class="race-stage-kicker">RESULT</div>
                  <div class="race-stage-title">${escapeHtml(sport)}</div>
                </div>
                <span class="race-stage-badge">${escapeHtml(badge)}</span>
              </div>
              <div class="race-team-stack">

    function normalizeRelayRankText(text) {
      const raw = text == null ? '' : String(text).trim();
      if (!raw) return '';
      if (/^(?:우승|준우승)$/u.test(raw)) return raw;
      const pureNum = raw.match(/^(\d+)$/);
      if (pureNum) return `${pureNum[1]}위`;
      const numRank = raw.match(/^(\d+)\s*위$/u);
      if (numRank) return `${numRank[1]}위`;
      return '';
    }

    function normalizeRelayStatusText(text) {
      const raw = text == null ? '' : String(text).trim();
      if (!raw) return '';
      if (/결승\s*진출/u.test(raw)) return '결승 진출';
      if (/예선\s*종료/u.test(raw)) return '예선 종료';
      return '';
    }

    function extractRelayMeta(item) {
      const parts = [item?.col3, item?.col4]
        .map(v => (v == null ? '' : String(v).trim()))
        .filter(Boolean);
      let rankText = '';
      let statusText = '';
      const details = [];

      parts.forEach((part) => {
        const normalizedRank = normalizeRelayRankText(part);
        if (!rankText && normalizedRank) {
          rankText = normalizedRank;
          return;
        }
        const normalizedStatus = normalizeRelayStatusText(part);
        if (!statusText && normalizedStatus) {
          statusText = normalizedStatus;
          return;
        }
        details.push(part);
      });

      return { rankText, statusText, detail: details.join(' · ') };
    }

    function extractRelayRankAndDetail(item) {
      const { rankText, detail } = extractRelayMeta(item);
      return { rankText, detail };
    }

          if (meta.statusText === '결승 진출' && normalizeCell(team?.col2)) {

      return explicit.slice(0, 4);

    function buildTimelineScheduleHTML(rows = []) {
      const validRows = Array.isArray(rows) ? rows.filter(isRenderableScheduleItem) : [];

        return createEmptyGuideHTML('조회된 일정이 없습니다.', '등록된 세부 일정 데이터를 다시 확인해 주세요.');
      }
      const sorted = [...validRows].sort((a, b) => {
        const diff = parseScheduleStartMinutes(a.col2) - parseScheduleStartMinutes(b.col2);
        if (diff !== 0) return diff;
        return String(a.col1 || '').localeCompare(String(b.col1 || ''), 'ko');
      });

      const groups = [];
      sorted.forEach(item => {
        const key = String(item.col2 || '시간미정').trim() || '시간미정';
        let group = groups.find(entry => entry.key === key);
        if (!group) {
          group = { key, items: [] };
          groups.push(group);
        }
        group.items.push(item);
      });

      return `
        <div class="timeline-stack" id="schedule-timeline-anchor">
          ${groups.map(group => `
            <section class="timeline-block">
              <div class="timeline-time-label">${escapeHtml(group.key)}</div>
              <div class="timeline-card-list">
                ${group.items.map(item => buildUnifiedScheduleCardHTML(item, item.col1 || '')).join('')}

        </div>
      `;

    function getFestivalSnapshotTargetDay() {
  const now = new Date();
  const month = now.getMonth() + 1;
  const date = now.getDate();
  if (month === 4 && date === 1) return 'preview1';
  if (month === 4 && date === 2) return 'day1';
  if (month === 4 && date === 3) return 'day2';
  return 'none';
}

    function setHomeFavoriteSport(value = '') {
      try {

    }

    function getScheduleMinuteRange(value = '') {
      const text = String(value || '').trim();
      if (!text) return { start: Number.MAX_SAFE_INTEGER, end: Number.MAX_SAFE_INTEGER };
      const parts = text.split('-');
      const start = parseScheduleStartMinutes(parts[0] || text);
      const end = parseScheduleStartMinutes(parts[1] || text);
      return {
        start,
        end: end === Number.MAX_SAFE_INTEGER ? start : end
      };
    }

    function formatMinuteDiff(diffMinutes = 0) {
      const safe = Math.max(0, diffMinutes);
      const hours = Math.floor(safe / 60);
      const minutes = safe % 60;
      if (hours > 0) return `${hours}시간 ${minutes}분`;
      return `${minutes}분`;
    }

    function matchesFavoriteSport(row, favoriteSport = '') {
      const keyword = String(favoriteSport || '').trim();
      if (!keyword) return true;
      const haystack = [row?.col1, row?.col3, row?.col4, row?.col7].map(v => String(v || '')).join(' ');
      return haystack.includes(keyword);
    }

    function extractFavoriteSportCandidates(rows = []) {
      const set = new Set();
      (rows || []).forEach(row => {
        [row?.col1, row?.col3].forEach(value => {
          const text = String(value || '').trim();
          if (!text) return;
          const matches = text.match(/[가-힣A-Za-z0-9]+/g) || [];
          matches.forEach(token => {
            if (token.length < 2) return;
            if (/\d/.test(token) && token.length < 3) return;
            if (['집합','점심','폐회식','개회식','응원','시상','정리','준비','이동','휴식','조회','전체','미리보기'].includes(token)) return;
            set.add(token);
          });
        });
      });
      return Array.from(set).slice(0, 20);
    }

    function getFestivalScheduleSummary(rows = [], label = '', favoriteSport = '') {
      const validRows = (rows || []).filter(item => (String(item.col2 || '').trim() || String(item.col3 || '').trim()) && matchesFavoriteSport(item, favoriteSport));
      if (!validRows.length) {
        return {
          title: favoriteSport ? `${label} · ${favoriteSport} 일정 없음` : `${label} 일정 준비 중`,
          desc: favoriteSport ? '선택한 종목과 맞는 일정이 아직 없습니다.' : '표시할 일정 데이터가 아직 없습니다.',
          meta: '',
          isLive: false,
          countdownText: '',
          favoriteSport,
          stageInfo: null,
          nextLabel: '',
          targetRow: null,
          nextRow: null
        };
      }
      const nowMinutes = new Date().getHours() * 60 + new Date().getMinutes();
      const sorted = [...validRows].sort((a, b) => parseScheduleStartMinutes(a.col2) - parseScheduleStartMinutes(b.col2));
      const currentIndex = sorted.findIndex(item => {
        const range = getScheduleMinuteRange(item.col2);
        return range.start <= nowMinutes && (range.end === Number.MAX_SAFE_INTEGER || nowMinutes <= range.end);
      });
      const current = currentIndex >= 0 ? sorted[currentIndex] : null;
      const next = current ? (sorted[currentIndex + 1] || null) : (sorted.find(item => parseScheduleStartMinutes(item.col2) > nowMinutes) || sorted[0] || null);
      const target = current || next || sorted[0];
      const targetIndex = sorted.indexOf(target);
      const followUp = current ? (sorted[targetIndex + 1] || null) : (sorted[targetIndex + 1] || sorted[0] || null);
      const range = getScheduleMinuteRange(target.col2);
      const countdownText = current
        ? `종료까지 ${formatMinuteDiff(range.end - nowMinutes)}`
        : `시작까지 ${formatMinuteDiff(range.start - nowMinutes)}`;
      return {
        title: '',
        desc: `${target.col2 || '시간미정'} · ${target.col3 || '일정명 미정'}`,
        meta: target.col4 || '',
        isLive: !!current,
        countdownText,
        favoriteSport,
        stageInfo: getScheduleStageInfo(target.col7, target.col3),
        nextLabel: followUp ? `${followUp.col2 || '시간미정'} · ${followUp.col3 || '다음 일정 확인'}` : '',
        targetRow: target,
        nextRow: followUp
      };
    }

    }

    window.addEventListener('scroll', updateFloatingAssistVisibility, { passive: true });

          }

  const PRESS_SELECTOR = '.header-icon-btn, .filter-btn, .inline-btn, .close-btn, .seat-layout-btn, .seat-link-btn, .schedule-day-btn, .grade-btn, .schedule-grade-btn, .relay-segment-btn, .menu-card, .quick-action-card, button, [role="button"]';
  const reduceMotion = () => window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function initUiEnhancements(root=document){
    if (!(root instanceof Element || root === document)) return;
    root.querySelectorAll(PRESS_SELECTOR).forEach((el) => {
      if (el.dataset.iosBound === '1') return;
      el.dataset.iosBound = '1';
      const on = () => el.classList.add('is-pressing');
      const off = () => el.classList.remove('is-pressing');
      el.addEventListener('pointerdown', on, {passive:true});
      el.addEventListener('pointerup', off, {passive:true});
      el.addEventListener('pointercancel', off, {passive:true});
      el.addEventListener('pointerleave', off, {passive:true});
    });
    root.querySelectorAll(CARD_SELECTOR).forEach((el, idx) => {
      if (el.dataset.iosAnimated !== '1') {
        el.dataset.iosAnimated = '1';
        el.style.animationDelay = Math.min(idx * 28, 180) + 'ms';
      }
      if (el.dataset.ios17GlassBound !== '1') {
        el.dataset.ios17GlassBound = '1';
        el.addEventListener('pointermove', (e) => {
          if (reduceMotion()) return;
          const r = el.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width;
          const y = (e.clientY - r.top) / r.height;
          el.style.setProperty('--glass-x', (x * 100).toFixed(1) + '%');
          el.style.setProperty('--glass-y', (y * 100).toFixed(1) + '%');
        }, {passive:true});
      }
    });

  let enhanceQueued = false;
  const enhanceTargets = new Set();
  function queueEnhancement(target){
    if (target) enhanceTargets.add(target);
    if (enhanceQueued) return;
    enhanceQueued = true;
    const flush = () => {
      enhanceQueued = false;
      const targets = enhanceTargets.size ? Array.from(enhanceTargets) : [document];
      enhanceTargets.clear();
      targets.forEach((node) => initUiEnhancements(node));
    };
    if (window.requestAnimationFrame) window.requestAnimationFrame(flush);
    else setTimeout(flush, 16);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => queueEnhancement(document), {once:true});
  } else {
    queueEnhancement(document);
  }

  if (document.body && !window.__unifiedUiObserverBound__) {

    const mo = new MutationObserver((mutations) => {
      for (const mutation of mutations) {

        });
      }
    });
    mo.observe(document.body, { childList: true, subtree: true });
