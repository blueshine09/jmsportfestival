<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fbf4f7" />
  <meta name="color-scheme" content="light" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="dns-prefetch" href="https://script.google.com" />
  <title>2026 중마스포츠축제</title>
  <!-- color-audit-v19: direct replacement of remaining non-sakura bg/button tones -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script src="https://unpkg.com/lucide@latest" defer></script>
<style id="safe-consolidated-styles">
:root {
      --primary: #d96b8b;
      --dark: #111827;
      --gray: #fbf4f7;
      --text-main: #1c1c1e;
      --text-sub: #8b6f79;
      --white: #ffffff;
      --accent: #f08aa6;
      --border: #e6d6de;
      --border-soft: #f0e3e9;
      --shadow: 0 4px 10px rgba(120, 88, 107, 0.045);
      --shadow-soft: 0 10px 22px rgba(120, 88, 107, 0.055);
      --skeleton: #f0e3e9;
      --table-header: #fbf4f7;
      --winner-gold: #d98a6b;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      margin: 0;
      background-color: var(--gray);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app-container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(255, 250, 252, 0.96);
      border-left: 1px solid rgba(244, 227, 233, 0.92);
      border-right: 1px solid rgba(244, 227, 233, 0.92);
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(252, 245, 248, 0.92);
      backdrop-filter: blur(22px) saturate(1.16);
      border-bottom: 1px solid var(--border-soft);
      width: 100%;
    }

    header {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
    }

    .header-icon-btn {
      cursor: pointer;
      padding: 4px;
      border: none;
      background: transparent;
      color: var(--text-main);
    }
    
    .nav-tabs {
      display: flex;
      overflow-x: auto;
      padding: 0 5px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .nav-tabs::-webkit-scrollbar {
      display: none;
    }

    .tab-item {
      padding: 12px 10px;
      font-size: 0.85rem;
      color: var(--text-sub);
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
      border: none;
      border-bottom: 3px solid transparent;
      background: transparent;
      transition: 0.2s;
      flex-shrink: 0;
    }

    .tab-item.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 800;
    }

    .main-content {
      padding: 12px;
      flex: 1;
      background: transparent;
      width: 100%;
    }

    .page-intro h2 {
      font-size: 1.2rem;
      font-weight: 800;
      margin: 0 0 10px 0;
      color: var(--dark);
    }

    .page-intro.hidden {
      display: none;
    }

    .page-image {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 8px;
      object-fit: cover;
      aspect-ratio: 2.5 / 1;
      background-color: var(--skeleton);
      box-shadow: var(--shadow-soft);
    }
    

    .sport-select-guide {
      width: 100%;
      margin-top: 12px;
      padding: 28px 20px;
      border-radius: 36px;
      border: 2px dashed #e6cfd8;
      background: rgba(255,255,255,0.66);
      text-align: center;
    }

    .sport-select-guide.hidden {
      display: none;
    }

    .sport-select-guide-title {
      margin: 0;
      font-size: 1.365rem;
      font-weight: 900;
      line-height: 1.28;
      letter-spacing: -0.04em;
      color: #1c1c1e;
      word-break: keep-all;
    }

    .sport-select-guide-desc {
      margin: 22px 0 0;
      font-size: 1.27rem;
      line-height: 1.7;
      letter-spacing: -0.03em;
      color: #6e6e73;
      word-break: keep-all;
    }

    .teacher-link-card {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin: 0 0 14px 0;
      padding: 14px 16px;
      border: 1px solid rgba(244, 227, 233, 0.92);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 4px 10px rgba(120, 88, 107, 0.05);
      cursor: pointer;
      text-align: left;
    }
    .teacher-link-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #d96b8b;
      background: linear-gradient(135deg, rgba(255,250,252,0.88), rgba(255,255,255,0.76));
      flex-shrink: 0;
    }
    .teacher-link-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .teacher-link-title {
      font-size: 0.98rem;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.02em;
    }
    .teacher-link-sub {
      font-size: 0.78rem;
      color: var(--text-sub);
      line-height: 1.45;
    }
    .info-notice-box {
      background: rgba(255,247,250,0.78);
      border: 1px solid #efc8d6;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .info-notice-text {
      font-size: 0.82rem;
      color: #8b6f79;
      line-height: 1.5;
      font-weight: 600;
      margin: 0;
      text-align: justify;
      word-break: keep-all;
    }
    
    .day-info-tag {
      display: inline-flex;
      align-items: center;
      background: #fbe8ef;
      color: var(--primary);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 10px;
      border: 1px solid #f3cad7;
    }

    .day-tag-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .day-tag-row .day-info-tag {
      margin-bottom: 0;
    }

    .seat-layout-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #f3cad7;
      background: linear-gradient(135deg, #fdf7f9 0%, #ffffff 100%);
      color: #d96b8b;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.76rem;
      font-weight: 800;
      box-shadow: 0 6px 18px rgba(217,107,139,0.10);
      cursor: pointer;
      white-space: nowrap;
    }

    .seat-layout-btn i {
      width: 15px;
      height: 15px;
    }

    .seat-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid #f3cad7;
      border-radius: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #fdf1f5 100%);
      color: #d96b8b;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      box-shadow: 0 10px 24px rgba(217,107,139,0.10);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .seat-link-btn:active {
      transform: scale(0.98);
    }

    .seat-link-btn:hover {
      border-color: #efc8d6;
      box-shadow: 0 12px 28px rgba(217,107,139,0.12);
    }

    .seat-link-btn i {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .seat-link-btn .seat-photo-icon,
    .seat-layout-btn .seat-photo-icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 18px;
      color: currentColor;
      line-height: 1;
    }

    .seat-link-btn .seat-photo-icon svg,
    .seat-layout-btn .seat-photo-icon svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .image-viewer-modal {
      position: fixed;
      inset: 0;
      background: rgba(28, 28, 30, 0.46);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 18px;
    }

    .image-viewer-dialog {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.74);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
    }

    .image-viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-soft);
      gap: 12px;
    }

    .image-viewer-title {
      font-size: 0.665rem !important;
      font-weight: 800;
      color: var(--dark);
    }

    .image-viewer-close {
      border: none;
      background: rgba(255,255,255,0.66);
      color: var(--text-main);
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .image-viewer-body {
      padding: 12px;
      background: rgba(255,255,255,0.66);
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .image-viewer-body img {
      display: block;
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.74);
      transform-origin: center center;
      transition: transform 120ms ease-out;
      will-change: transform;
      touch-action: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 공통 Hero 카드 */
    .hero-card {
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 14px;
      border: 1px solid rgba(244, 227, 233, 0.9);
      background: rgba(255, 255, 255, 0.9);
    }

    .hero-card.tone-blue {
      background: linear-gradient(135deg, #fff4f8 0%, #ffffff 80%);
      border-color: #f3dbe5;
    }

    .hero-card.tone-purple {
      background: linear-gradient(135deg, #fcf1f6 0%, #ffffff 80%);
      border-color: #f0dde5;
    }

    .hero-card.tone-green {
      background: linear-gradient(135deg, #fdf7f9 0%, #ffffff 80%);
      border-color: #f0e3e9;
    }

    .hero-card.tone-orange {
      background: linear-gradient(135deg, #fff7f8 0%, #ffffff 80%);
      border-color: #f2e1e7;
    }

    .hero-card.tone-indigo {
      background: linear-gradient(135deg, #faf0f5 0%, #ffffff 80%);
      border-color: #efdee6;
    }

    .hero-card.tone-pink {
      background: linear-gradient(135deg, #fff1f6 0%, #ffffff 80%);
      border-color: #f4dbe6;
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .hero-copy {
      min-width: 0;
      flex: 1;
    }

    .hero-title {
      font-size: 1.04rem;
      font-weight: 900;
      color: var(--dark);
      margin-bottom: 6px;
      word-break: keep-all;
    }

    .hero-desc {
      font-size: 0.88rem;
      line-height: 1.58;
      color: var(--text-sub);
      word-break: keep-all;
    }

    .hero-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.74rem;
      font-weight: 900;
      padding: 7px 11px;
      border-radius: 999px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .hero-badge.tone-blue {
      background: #fdebf1;
      color: var(--primary);
      border-color: #f6d2df;
    }

    .hero-badge.tone-purple {
      background: #f8eef4;
      color: #b05c86;
      border-color: #edd6e2;
    }

    .hero-badge.tone-green {
      background: #fdf3f6;
      color: #c96b8a;
      border-color: #f1d6e1;
    }

    .hero-badge.tone-orange {
      background: #fff2f4;
      color: #d67b95;
      border-color: #f5d6df;
    }

    .hero-badge.tone-indigo {
      background: #f8edf4;
      color: #b15f87;
      border-color: #ead2df;
    }

    .hero-badge.tone-pink {
      background: #fdeaf1;
      color: #d96b8b;
      border-color: #f3cfdd;
    }

    /* 빈 상태 */
    .section-empty-guide {
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(12px) saturate(1.04);
      -webkit-backdrop-filter: blur(12px) saturate(1.04);
      border: 1px dashed rgba(226, 187, 204, 0.58);
      border-radius: 18px;
      padding: 28px 18px;
      text-align: center;
      color: var(--text-sub);
    }

    .section-empty-guide strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.665rem !important;
      font-weight: 900;
      color: #1c1c1e;
    }

    .section-empty-guide span {
      display: block;
      font-size: 0.85rem;
      line-height: 1.6;
      word-break: keep-all;
    }

    /* 공통 칩 */
    .sub-tab-container,
    .filter-btn-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
      overflow: visible;
      padding-bottom: 2px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      align-items: stretch;
    }

    .sub-tab-container::-webkit-scrollbar,
    .filter-btn-grid::-webkit-scrollbar {
      display: none;
    }

    .sub-tab,
    .filter-btn {
      width: 100%;
      min-width: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255,255,255,0.70);
      border: 1px solid rgba(255,255,255,0.58);
      backdrop-filter: blur(10px) saturate(1.04);
      -webkit-backdrop-filter: blur(10px) saturate(1.04);
      font-size: 0.74rem;
      line-height: 1.2;
      font-weight: 800;
      color: var(--text-sub);
      text-align: center;
      cursor: pointer;
      padding: 10px 6px;
      box-shadow: var(--shadow);
      white-space: normal;
      word-break: keep-all;
      min-height: 42px;
    }

    .sub-tab.active,
    .filter-btn.active {
      background: linear-gradient(135deg, #e88aa5, #d96b8b);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 8px 20px rgba(217, 107, 139, 0.18);
    }

    .sub-tab-container.schedule-switcher {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      padding: 6px;
      margin-bottom: 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, #fdf1f5 0%, #fbf4f7 100%);
      border: 1px solid #f3cad7;
      box-shadow: 0 10px 24px rgba(0, 122, 255, 0.08);
    }

    .sub-tab-container.schedule-switcher .sub-tab {
      min-height: 58px;
      padding: 10px 12px;
      border-radius: 16px;
      border: none;
      background: transparent;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 3px;
      text-align: left;
      color: #8a7180;
    }

    .sub-tab-label {
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .sub-tab-meta {
      font-size: 0.68rem;
      font-weight: 700;
      line-height: 1.2;
      opacity: 0.88;
      word-break: keep-all;
    }

    .sub-tab-container.schedule-switcher .sub-tab.active {
      background: rgba(255,255,255,0.74);
      color: var(--primary);
      border: 1px solid #f2c8d6;
      box-shadow: 0 8px 18px rgba(217, 107, 139, 0.12);
    }

    .sport-detail-content {
      margin-top: 4px;
      margin-bottom: 24px;
    }

    /* 학년 탭 */
    .player-grade-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 8px;
      margin: 14px 0 12px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,249,251,0.82) 0%, rgba(255,244,248,0.76) 100%);
      border: 1px solid #ead7df;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.05);
    }

    .schedule-day-switcher {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px;
      margin: 14px 0 12px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,249,251,0.82) 0%, rgba(255,244,248,0.76) 100%);
      border: 1px solid #ead7df;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.05);
    }

    .schedule-day-btn {
      border: none;
      border-radius: 18px;
      background: transparent;
      color: #6b7280;
      font-weight: 800;
      font-size: 1rem;
      padding: 18px 12px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .schedule-day-btn.active {
      background: rgba(255,255,255,0.78);
      color: var(--dark);
      box-shadow: 0 10px 22px rgba(120, 88, 107, 0.08);
      backdrop-filter: blur(12px) saturate(1.05);
      -webkit-backdrop-filter: blur(12px) saturate(1.05);
    }

    .schedule-day-panel { display: none; }
    .schedule-day-panel.active { display: block; }
    .schedule-overview-empty-guide.is-hidden { display: none !important; }
    .schedule-grade-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      padding: 4px;
      background: #fdf1f5;
      border-radius: 999px;
      border: 1px solid #f3cad7;
    }

    .grade-btn,
    .schedule-grade-btn {
      flex: 1;
      width: 100%;
      min-width: 0;
      padding: 9px;
      border: none;
      background: transparent;
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text-sub);
      cursor: pointer;
      border-radius: 999px;
      white-space: nowrap;
    }

    .grade-btn.active,
    .schedule-grade-btn.active {
      background: rgba(255,255,255,0.74);
      color: var(--primary);
      box-shadow: var(--shadow);
    }

    /* 세부일정 - 두 줄 배치 */
    .schedule-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .schedule-card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(244, 227, 233, 0.92);
      border-radius: 16px;
      padding: 10.5px 11px;
      box-shadow: 0 4px 10px rgba(120, 88, 107, 0.05);
    }

    .schedule-inline-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      min-width: 0;
    }

    .schedule-top-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .schedule-bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .schedule-bottom-left {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .schedule-time-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fdf0f4;
      color: #b05c86;
      border: 1px solid #f2d7e1;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.92rem;
      font-weight: 900;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1;
    }

    .schedule-title-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1 1 auto;
      min-width: 0;
    }

    .schedule-match-title {
      font-size: 0.82rem;
      font-weight: 900;
      color: var(--dark);
      line-height: 1.2;
      flex: 1 1 auto;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .schedule-stage-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 0.67rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1;
      flex-shrink: 0;
      border: 1px solid transparent;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);

    .race-champion-banner {

      gap: 10px;
      padding: 12px 14px;
      border-radius: 18px;

    .race-champion-label {

      font-weight: 900;

      margin-bottom: 4px;

    .race-champion-name {

      font-weight: 900;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;

    }

    .race-champion-desc {
      font-size: 0.72rem;
      opacity: 0.9;
      line-height: 1.4;
    }

    .relay-selector-shell {
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,246,249,0.96) 100%);
      border: 1px solid rgba(240,220,228,0.94);
      border-radius: 22px;
      padding: 12px;
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: relayChooserFade 0.35s ease;
    }

    .relay-segment {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 8px;
      margin: 0;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,249,251,0.82) 0%, rgba(255,244,248,0.76) 100%);
      border: 1px solid #ead7df;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.05);
    }

    .relay-segment-btn {
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--text-sub);
      font-weight: 800;
      font-size: 0.8rem;
      line-height: 1;
      padding: 12px 10px;
      min-height: 42px;
      transition: all 0.2s ease;
      cursor: pointer;
      white-space: nowrap;
    }

    .relay-segment-btn .relay-btn-title {
      font-size: 0.8rem;
      font-weight: 800;
      color: inherit;
      letter-spacing: -0.01em;
    }

    .relay-segment-btn.active {
      background: rgba(255,255,255,0.74);
      color: var(--primary);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .relay-segment-btn:hover {
      background: rgba(255,255,255,0.72);
    }

    .relay-segment-btn:active {
      transform: scale(0.98);
    }

    .relay-selector-result {
      margin-top: 2px;
    }

    .bracket-panel {
      animation: bracketPanelIn 0.42s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .bracket-shell {
      position: relative;
      overflow: hidden;
    }

    .bracket-shell::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0) 42%, rgba(245,158,11,0.06) 100%);
    }

    .bracket-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .bracket-title-stack {
      min-width: 0;
    }

    .bracket-kicker {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(245, 158, 11, 0.12);
      color: #b86a54;
      font-size: 0.66rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }

    .bracket-title {
      font-size: 0.98rem;
      font-weight: 900;
      color: var(--dark);
      letter-spacing: -0.02em;
    }

    .bracket-subtitle {
      margin-top: 4px;
      font-size: 0.72rem;
      line-height: 1.45;
      color: var(--text-sub);
    }

    .bracket-round-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 62px;
      padding: 8px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255, 237, 213, 0.95);
      color: #b86a54;
      font-size: 0.72rem;
      font-weight: 900;
      box-shadow: 0 6px 16px rgba(249, 115, 22, 0.10);
    }

    .bracket.round-animated .round {
      opacity: 0;
      transform: translateY(14px) scale(0.985);
      animation: bracketRoundIn 0.5s ease forwards;
    }

    .bracket.round-animated .round:nth-child(1) { animation-delay: 0.02s; }
    .bracket.round-animated .round:nth-child(2) { animation-delay: 0.14s; }
    .bracket.round-animated .round:nth-child(3) { animation-delay: 0.26s; }

    .bracket.round-animated .match-unit {
      opacity: 0;
      transform: translateY(10px);
      animation: bracketMatchIn 0.38s ease forwards;
    }

    .bracket.round-animated .round:nth-child(1) .match-unit:nth-child(1) { animation-delay: 0.08s; }
    .bracket.round-animated .round:nth-child(1) .match-unit:nth-child(2) { animation-delay: 0.14s; }
    .bracket.round-animated .round:nth-child(1) .match-unit:nth-child(3) { animation-delay: 0.20s; }
    .bracket.round-animated .round:nth-child(1) .match-unit:nth-child(4) { animation-delay: 0.26s; }
    .bracket.round-animated .round:nth-child(2) .match-unit:nth-child(1) { animation-delay: 0.24s; }
    .bracket.round-animated .round:nth-child(2) .match-unit:nth-child(2) { animation-delay: 0.30s; }
    .bracket.round-animated .round:nth-child(3) .match-unit:nth-child(1) { animation-delay: 0.36s; }

    .team-row {
      transition: transform 0.22s ease, box-shadow 0.24s ease, border-color 0.22s ease, background-color 0.22s ease;
    }

    .team-row.winner,
    .team-row.bye-win {
      box-shadow: 0 10px 18px rgba(59, 130, 246, 0.14);
    }

    .team-row.final-winner {
      box-shadow: 0 14px 28px rgba(245, 158, 11, 0.26), 0 0 0 1px rgba(245, 158, 11, 0.22);
      transform: scale(1.03);
      border-color: rgba(245, 158, 11, 0.45);
      background: linear-gradient(180deg, rgba(255,251,235,0.98) 0%, rgba(255,255,255,0.98) 100%);
    }

    .team-row.final-winner .score {
      background: rgba(146, 64, 14, 0.16) !important;
      color: #fff !important;
      border-left: none;
    }

    .team-row.advance-enter {
      animation: advancePopIn 0.78s cubic-bezier(0.22, 1, 0.36, 1);
      transform-origin: center center;
      position: relative;
      z-index: 2;
    }

    .team-row.advance-enter::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 12px;
      border: 2px solid rgba(0, 122, 255, 0.28);
      box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.22);
      animation: advanceRing 0.78s ease-out;
      pointer-events: none;
    }

    .team-row.advance-enter .team-info-column,
    .team-row.advance-enter .score {
      animation: advanceGlow 0.78s ease-out;
    }

    .champ-area {
      position: relative;
      overflow: hidden;
      box-shadow: 0 18px 32px rgba(245, 158, 11, 0.16), 0 0 0 1px rgba(245, 158, 11, 0.18);
      animation: championPulse 2s ease-in-out infinite;
    }

    .champ-area::before {
      content: '';
      position: absolute;
      inset: -30% auto auto -10%;
      width: 60%;
      height: 180%;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.42) 50%, rgba(255,255,255,0) 100%);
      transform: rotate(18deg);
      animation: championShine 3.2s linear infinite;
      pointer-events: none;
    }

    .champ-label {
      letter-spacing: 0.04em;
    }

    .champ-team-name {
      position: relative;
      z-index: 1;
    }

    @keyframes relayChooserFade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bracketPanelIn {
      from { opacity: 0; transform: translateY(12px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes bracketRoundIn {
      from { opacity: 0; transform: translateY(14px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes bracketMatchIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes championPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 18px 32px rgba(245, 158, 11, 0.16); }
      50% { transform: scale(1.015); box-shadow: 0 22px 36px rgba(245, 158, 11, 0.24); }
    }

    @keyframes advancePopIn {
      0% {
        transform: translateY(10px) scale(0.92);
        box-shadow: 0 0 0 rgba(59, 130, 246, 0);
      }
      45% {
        transform: translateY(-4px) scale(1.04);
        box-shadow: 0 16px 28px rgba(59, 130, 246, 0.18);
      }
      100% {
        transform: translateY(0) scale(1);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
      }
    }

    @keyframes advanceRing {
      0% {
        opacity: 0.85;
        transform: scale(0.94);
        box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.22);
      }
      100% {
        opacity: 0;
        transform: scale(1.08);
        box-shadow: 0 0 0 14px rgba(0, 122, 255, 0);
      }
    }

    @keyframes advanceGlow {
      0% {
        background-color: rgba(191, 219, 254, 0.72);
      }
      100% {
        background-color: transparent;
      }
    }

    @keyframes championShine {
      from { transform: translateX(-140%) rotate(18deg); }
      to { transform: translateX(260%) rotate(18deg); }
    }

    /* 점수 / 시상 */

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --home-card-min-h: 136px;
      --touch-size: 44px;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      padding-bottom: calc(var(--safe-bottom) + 10px);
    }

    .sticky-header {
      padding-top: var(--safe-top);
    }

    .header-icon-btn,
    .tab-item,
    .sub-tab,
    .filter-btn,
    .inline-btn,
    .close-btn {
      min-height: var(--touch-size);
    }

    .nav-tabs {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 4px;
      overflow: hidden;
      scroll-snap-type: none;
      -webkit-overflow-scrolling: auto;
      padding: 4px 8px 8px;
      margin: 0 8px 8px;
    }

    .tab-item {
      scroll-snap-align: none;
      min-width: 0;
      width: 100%;
      white-space: normal;
      word-break: keep-all;
      line-height: 1.15;
      font-size: 0.68rem;
      letter-spacing: -0.02em;
      padding: 9px 4px;
    }

    .quick-action-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .quick-action-card {
      min-height: 90px;
      height: 100%;
      padding: 14px 12px;
      align-items: flex-start;
      flex-direction: column;
      justify-content: flex-start;
      gap: 10px;
      border-radius: 22px;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    .quick-action-card:active,
    .menu-card:active,
    .home-mini-link:active {
      transform: scale(0.985);
    }

    .quick-action-icon,
    .icon-wrapper,
    .home-mini-link-icon {
      width: 44px;
      height: 44px;
      border-radius: 15px;
    }

    .quick-action-copy,
    .home-mini-link-copy {
      width: 100%;
    }

    .quick-action-title,
    .menu-label,
    .home-mini-link-title {
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      word-break: keep-all;
    }

    .home-menu-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: stretch;
      gap: 10px;
    }

    .menu-card,
    .home-mini-link {
      min-height: var(--home-card-min-h);
      height: 100%;
      padding: 16px 14px 14px;
      border-radius: 22px;
    }

    .menu-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 0;
    }

    .menu-desc {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.4em;
    }

    .menu-meta {
      margin-top: auto;
    }

    .home-mini-link {
      justify-content: flex-start;
      align-items: flex-start;
      gap: 10px;
    }

    .home-mini-link-left {
      width: 100%;
      align-items: flex-start;
    }

    .home-mini-link-arrow {
      margin-top: auto;
      align-self: flex-end;
    }

    .main-content {
      padding-bottom: calc(20px + var(--safe-bottom));
    }

    .modal-body {
      max-height: min(85vh, 760px);
    }

    img {
      max-width: 100%;
      height: auto;
    }

/* Stabilize visibility during vertical scrolling on mobile */
  .hero-card, .schedule-card, .roster-card, .unified-info-card, .rule-section-card,

  .race-team-card, .notice-item-card, .modal-body {
    content-visibility: visible !important;
    contain-intrinsic-size: auto !important;
    will-change: auto !important;

  /* Prevent re-entrance flicker on cards while keeping layout intact */
  .hero-card, .schedule-card, .roster-card, .unified-info-card, .rule-section-card,
  .summary-mini-card, .menu-card, .quick-action-card, .teacher-section-card,

  /* Reduce layer instability for frequently tapped controls */
  .header-icon-btn, .filter-btn, .inline-btn, .close-btn, .seat-layout-btn, .seat-link-btn,

  .header-icon-btn:active, .filter-btn:active, .inline-btn:active, .close-btn:active,
  .seat-layout-btn:active, .seat-link-btn:active, .schedule-day-btn:active, .grade-btn:active,

    function createUID(prefix = 'id') {
      return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;

    function stripTrueFalseText(value = '') {
      return String(value ?? '')
        .replace(/(^|[\s,\/|()\[\]{}<>-])(?:true|false)(?=$|[\s,\/|()\[\]{}<>-])/gi, '$1')
        .replace(/\s{2,}/g, ' ')
        .replace(/\n\s+/g, '\n')
        .replace(/[ ,]+\n/g, '\n')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    function sanitizeTabularData(data = []) {
      if (!Array.isArray(data)) return [];
      return data.map(row => {
        if (!row || typeof row !== 'object') return row;
        const nextRow = { ...row };
        Object.keys(nextRow).forEach(key => {
          const value = nextRow[key];
          if (typeof value === 'boolean') {
            nextRow[key] = '';
          } else if (typeof value === 'string') {
            nextRow[key] = stripTrueFalseText(value);
          }
        });
        return nextRow;
      });
    }

    function dedupeRosterRows(rows = []) {
      if (!Array.isArray(rows)) return [];
      const seen = new Set();
      return rows.filter(row => {
        if (!row || typeof row !== 'object') return false;
        const key = [row.col1 || '', row.col2 || '', row.col3 || '', row.col4 || '']
          .map(v => String(v).trim())
          .join('||');
        if (!key.replace(/\|/g, '').trim()) return false;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function clearScoreAutoRefresh() {
      if (scoreRefreshInterval) {
        clearInterval(scoreRefreshInterval);
        scoreRefreshInterval = null;
      }
    }

    const STORAGE_CACHE_PREFIX = 'sports-festival-cache-v26:';
    const STORAGE_CACHE_TTL_MS = 1000 * 60 * 10;
    const LIVE_DYNAMIC_TABS = new Set(['점수','세부경기일정','세부일정','연합팀 구성','[연합팀 구성]','장소안내','선수단','심판','대진표']);

    function requestIdleTask(callback, timeout = 1200) {
      if (typeof window.requestIdleCallback === 'function') {
        return window.requestIdleCallback(callback, { timeout });
      }
      return setTimeout(callback, Math.min(timeout, 600));
    }

    function getStorageCacheKey(tabName) {
      return `${STORAGE_CACHE_PREFIX}${tabName}`;
    }

    function readPersistedTabCache(tabName) {
      try {
        const raw = localStorage.getItem(getStorageCacheKey(tabName));
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.data) || !parsed.savedAt) return null;
        if (Date.now() - parsed.savedAt > STORAGE_CACHE_TTL_MS) return null;
        return parsed.data;
      } catch (error) {
        return null;
      }
    }

    function writePersistedTabCache(tabName, data) {
      try {
        if (!Array.isArray(data)) return;
        localStorage.setItem(getStorageCacheKey(tabName), JSON.stringify({ savedAt: Date.now(), data }));
      } catch (error) {}
    }

    async function fetchTabData(tabName, { force = false } = {}) {
      const key = String(tabName || '').trim();
      const isLiveTab = LIVE_DYNAMIC_TABS.has(key);
      if (isLiveTab) force = true;

      if (!force && tabDataCache[key]) {
        return Promise.resolve(tabDataCache[key]);
      }

      if (!force) {
        const persisted = readPersistedTabCache(key);
        if (persisted) {
          tabDataCache[key] = persisted;
          return Promise.resolve(persisted);
        }
      } else if (isLiveTab) {
        try { delete tabDataCache[key]; } catch (_) {}
        try { localStorage.removeItem(getStorageCacheKey(key)); } catch (_) {}
      }

      const requestUrl = isLiveTab
        ? `${SCRIPT_URL}?tab=${encodeURIComponent(key)}&_ts=${Date.now()}`
        : `${SCRIPT_URL}?tab=${encodeURIComponent(key)}`;

      const request = fetch(requestUrl, { cache: 'no-store' }).then(async (res) => {
        if (!res.ok) throw new Error('Network response was not ok');
        const json = await res.json();
        return sanitizeTabularData(json);
      });

      tabDataCache[key] = request;

      try {
        const data = await request;
        tabDataCache[key] = data;
        if (!isLiveTab) writePersistedTabCache(key, data);
        return data;
      } catch (error) {
        delete tabDataCache[key];
        throw error;
      }
    }

              autocomplete="off"

    function buildTeacherSearchCards(rows = []) {
      const searchableRows = normalizeTeacherGuideRows(rows).filter(isTeacherSearchableRow);
      if (!searchableRows.length) {
        return createEmptyGuideHTML('검색 가능한 교사업무 데이터가 없습니다.', '구글시트의 교사업무분장_데이터 탭 내용을 확인해 주세요.');
      }

      return searchableRows.map((row, index) => {
        const day = String(row.col1 || '').trim();
        const type = String(row.col2 || '').trim();
        const role = String(row.col3 || '').trim();
        const task = String(row.col4 || '').trim() || '업무 내용';
        const teacher = String(row.col5 || '').trim();
        const detail = String(row.col6 || '').trim();
        const extra = String(row.col7 || '').trim();
        const searchText = normalizeSearchText([day, type, role, task, teacher, detail, extra].join(' '));
        const infoBody = [teacher, detail, extra].filter(Boolean).join('\n');

        return `
          <div class="unified-info-card" data-search-item="true" data-search-text="${escapeHtml(searchText)}">
            <div class="unified-info-card-head">
              <span class="unified-order-badge">${index + 1}</span>
              <div>
                <div class="unified-info-label">${escapeHtml(day)} · ${escapeHtml(type)}</div>
                <div class="unified-info-title">${escapeHtml(task)}</div>
              </div>
            </div>
            <div class="unified-info-body">${nl2brSafe(infoBody || '담당 교사 정보가 없습니다.')}</div>
            <div class="unified-info-meta">
              ${role ? `<span class="meta-pill">${escapeHtml(role)}</span>` : ''}
            </div>
          </div>
        `;
      }).join('');

    function filterTeacherGuideSearch(targetId) {
      const input = document.getElementById(`${targetId}-search`);
      const wrapper = document.getElementById(targetId);
      const idleBox = document.getElementById(`${targetId}-idle`);
      const emptyBox = document.getElementById(`${targetId}-empty`);
      if (!input || !wrapper) return;

      const keyword = normalizeSearchText(input.value);
      const items = wrapper.querySelectorAll('[data-search-item="true"]');

      if (!keyword) {
        wrapper.style.display = 'none';
        if (idleBox) idleBox.style.display = 'block';
        if (emptyBox) emptyBox.style.display = 'none';
        items.forEach(item => {
          item.style.display = '';
        });
        return;
      }

      wrapper.style.display = 'flex';
      if (idleBox) idleBox.style.display = 'none';

      let visibleCount = 0;
      items.forEach(item => {
        const searchText = item.dataset.searchText || normalizeSearchText(item.textContent || '');
        const matched = searchText.includes(keyword);
        item.style.display = matched ? '' : 'none';
        if (matched) visibleCount += 1;
      });

      if (emptyBox) {
        emptyBox.style.display = visibleCount === 0 ? 'block' : 'none';
      }
    }

    function parseTeacherShiftLines(value = '') {
      const lines = String(value || '')
        .split(/\n+/)
        .map(line => String(line || '').trim())
        .filter(Boolean);

      return lines.map(line => {
        const match = line.match(/^(오전|오후|종일)?\s*([0-9]{1,2}:[0-9]{2}\s*[~-]\s*[0-9]{1,2}:[0-9]{2})\s*[:：]\s*(.+)$/);
        if (!match) return null;
        const meridiem = String(match[1] || '').trim();
        const time = String(match[2] || '').replace(/\s*[~-]\s*/, ' ~ ').trim();
        const names = String(match[3] || '').trim();
        return {
          label: [meridiem, time].filter(Boolean).join(' '),
          names,
          raw: line
        };
      }).filter(Boolean);
    }

    function isProbablyImageUrl(value = '') {
      const text = String(value || '').trim();
      if (!text || !/^https?:\/\//i.test(text)) return false;
      return /\.(png|jpe?g|gif|webp|svg|bmp|avif)(\?.*)?$/i.test(text)
        || /drive\.google\.com/i.test(text)
        || /lh3\.googleusercontent\.com/i.test(text)
        || /googleusercontent\.com/i.test(text)
        || /i\.imgur\.com/i.test(text)
        || /^https?:\/\/imgur\.com\/[a-zA-Z0-9]+$/i.test(text)
        || /dropbox\.com/i.test(text)
        || /\/uc\?(?:[^#]*&)?id=/i.test(text)
        || /\/thumbnail\?id=/i.test(text);
    }

    function extractGoogleDriveFileId(url = '') {
      const value = String(url || '').trim();
      if (!value) return '';

      const patterns = [
        /drive\.google\.com\/file\/d\/([^/?#]+)/i,
        /drive\.google\.com\/open\?id=([^&#]+)/i,
        /[?&]id=([^&#]+)/i,
        /uc\?(?:[^#]*&)?id=([^&#]+)/i,
        /thumbnail\?id=([^&#]+)/i
      ];

      for (const pattern of patterns) {
        const match = value.match(pattern);
        if (match && match[1]) return match[1];
      }
      return '';
    }

    function normalizeImageUrl(url = '') {
      const value = String(url || '').trim();
      if (!value) return '';

      const driveId = extractGoogleDriveFileId(value);
      if (driveId) {
        return `https://drive.google.com/thumbnail?id=${driveId}&sz=w1600`;
      }

      if (/^[A-Za-z0-9_-]{20,}$/.test(value) && !/^https?:\/\//i.test(value)) {
        return `https://drive.google.com/thumbnail?id=${value}&sz=w1600`;
      }

      const imgurMatch = value.match(/^https?:\/\/imgur\.com\/([a-zA-Z0-9]+)$/i);
      if (imgurMatch) {
        return `https://i.imgur.com/${imgurMatch[1]}.jpg`;
      }

      if (/dropbox\.com/i.test(value)) {
        if (/[?&]raw=1/i.test(value)) return value;
        if (/[?&]dl=0/i.test(value)) return value.replace(/[?&]dl=0/i, '?raw=1');
        if (/[?&]dl=1/i.test(value)) return value.replace(/[?&]dl=1/i, '?raw=1');
        return `${value}${value.includes('?') ? '&' : '?'}raw=1`;
      }

      return value;
    }

    function isLikelyPlaceholderImageText(value = '') {
      const text = String(value || '').trim();
      if (!text) return true;
      if (isProbablyImageUrl(text) || /^[A-Za-z0-9_-]{20,}$/.test(text)) return false;
      return /(이미지를?\s*(넣|추가|등록|교체)|공유\s*링크|실제\s*(운동장|이동\s*동선|이미지)|이\s*위치에\s*넣|자리\s*배치\s*예시|seat\s*layout\s*example)/i.test(text);
    }

    function resolveDatasetValue(element, attrName = '') {
      if (!element || !attrName) return '';
      const kebab = attrName.includes('-') ? attrName : attrName.replace(/[A-Z]/g, (match) => `-${match.toLowerCase()}`);
      const camel = kebab.replace(/-([a-z])/g, (_, ch) => ch.toUpperCase());
      return element.getAttribute(`data-${kebab}`)
        || element.getAttribute(`data-${camel}`)
        || element.dataset?.[camel]
        || '';
    }

    function getTeacherMapImageMeta(row = {}) {
      const col5 = String(row.col5 || '').trim();
      const col6 = String(row.col6 || '').trim();
      const col7 = String(row.col7 || '').trim();
      const candidates = [col5, col6, col7].filter(Boolean);

      const imageSource = candidates.find(value => {
        const text = String(value || '').trim();
        return isProbablyImageUrl(text) || /^[A-Za-z0-9_-]{20,}$/.test(text);
      }) || '';

      const imageUrl = normalizeImageUrl(imageSource);
      const desc = [col5, col6, col7].filter(value => value && value !== imageSource).join(' ');
      return { imageUrl, desc, hasImage: !!imageUrl, sourceUrl: imageSource };
    }

    function handleTeacherMapImageError(img) {
      const preview = img?.closest('.teacher-map-photo-preview');

        </div>

      lucide.createIcons();

    function openImageViewerFromDataset(button) {
      if (!button) return;
      const rawUrl = resolveDatasetValue(button, 'image-url');
      const rawSource = resolveDatasetValue(button, 'image-source');
      const title = resolveDatasetValue(button, 'image-title') || '이미지 보기';
      openImageViewer(rawUrl || rawSource || '', title);
    }

    const imageViewerZoomState = {
      scale: 1,
      minScale: 1,
      maxScale: 4,
      x: 0,
      y: 0,
      startX: 0,
      startY: 0,
      baseDistance: 0,
      baseScale: 1,
      mode: '',
      rafId: 0
    };

    function getImageViewerElements() {
      return {
        modal: document.getElementById('image-viewer-modal'),
        body: document.getElementById('image-viewer-body'),
        img: document.getElementById('image-viewer-img')
      };
    }

    function getTouchDistance(t1, t2) {
      const dx = t2.clientX - t1.clientX;
      const dy = t2.clientY - t1.clientY;
      return Math.hypot(dx, dy);
    }

    function clampImageViewerPosition() {
      const { body, img } = getImageViewerElements();
      if (!body || !img) return;
      const rect = body.getBoundingClientRect();
      const scaledWidth = (img.clientWidth || rect.width || 1) * imageViewerZoomState.scale;
      const scaledHeight = (img.clientHeight || rect.height || 1) * imageViewerZoomState.scale;
      const maxX = Math.max(0, (scaledWidth - rect.width) / 2);
      const maxY = Math.max(0, (scaledHeight - rect.height) / 2);
      imageViewerZoomState.x = Math.max(-maxX, Math.min(maxX, imageViewerZoomState.x));
      imageViewerZoomState.y = Math.max(-maxY, Math.min(maxY, imageViewerZoomState.y));
    }

    function applyImageViewerTransform() {
      const { img } = getImageViewerElements();
      if (!img) return;
      clampImageViewerPosition();
      if (imageViewerZoomState.rafId) cancelAnimationFrame(imageViewerZoomState.rafId);
      imageViewerZoomState.rafId = requestAnimationFrame(() => {
        img.style.transform = `translate(${imageViewerZoomState.x}px, ${imageViewerZoomState.y}px) scale(${imageViewerZoomState.scale})`;
      });
    }

    function resetImageViewerZoom() {
      imageViewerZoomState.scale = 1;
      imageViewerZoomState.x = 0;
      imageViewerZoomState.y = 0;
      imageViewerZoomState.startX = 0;
      imageViewerZoomState.startY = 0;
      imageViewerZoomState.baseDistance = 0;
      imageViewerZoomState.baseScale = 1;
      imageViewerZoomState.mode = '';
      applyImageViewerTransform();
    }

    function primeImage(url = '') {
      const finalUrl = normalizeImageUrl(url);
      if (!finalUrl) return;
      requestIdleTask(() => {
        const img = new Image();
        img.decoding = 'async';
        img.loading = 'lazy';
        img.fetchPriority = 'low';
        img.referrerPolicy = 'no-referrer';
        img.src = finalUrl;
      }, 1800);
    }

    function bindImageViewerGestures() {
      const { body } = getImageViewerElements();
      if (!body || body.dataset.zoomBound === 'true') return;
      body.dataset.zoomBound = 'true';

      body.addEventListener('touchstart', (event) => {
        if (!event.touches || !event.touches.length) return;
        if (event.touches.length >= 2) {
          imageViewerZoomState.mode = 'pinch';
          imageViewerZoomState.baseDistance = getTouchDistance(event.touches[0], event.touches[1]);
          imageViewerZoomState.baseScale = imageViewerZoomState.scale;
          return;
        }
        if (imageViewerZoomState.scale > 1) {
          imageViewerZoomState.mode = 'pan';
          imageViewerZoomState.startX = event.touches[0].clientX - imageViewerZoomState.x;
          imageViewerZoomState.startY = event.touches[0].clientY - imageViewerZoomState.y;
        }
      }, { passive: true });

      body.addEventListener('touchmove', (event) => {
        if (event.touches.length >= 2) {
          const distance = getTouchDistance(event.touches[0], event.touches[1]);
          if (!imageViewerZoomState.baseDistance) imageViewerZoomState.baseDistance = distance;
          const nextScale = imageViewerZoomState.baseScale * (distance / imageViewerZoomState.baseDistance);
          imageViewerZoomState.scale = Math.max(imageViewerZoomState.minScale, Math.min(imageViewerZoomState.maxScale, nextScale));
          applyImageViewerTransform();
          event.preventDefault();
          return;
        }
        if (imageViewerZoomState.mode === 'pan' && event.touches.length === 1 && imageViewerZoomState.scale > 1) {
          imageViewerZoomState.x = event.touches[0].clientX - imageViewerZoomState.startX;
          imageViewerZoomState.y = event.touches[0].clientY - imageViewerZoomState.startY;
          applyImageViewerTransform();
          event.preventDefault();
        }
      }, { passive: false });

      body.addEventListener('touchend', () => {
        if (imageViewerZoomState.scale <= 1.01) {
          resetImageViewerZoom();
        } else {
          imageViewerZoomState.mode = '';
          imageViewerZoomState.baseDistance = 0;
          imageViewerZoomState.baseScale = imageViewerZoomState.scale;
          applyImageViewerTransform();
        }
      }, { passive: true });

      body.addEventListener('dblclick', (event) => {
        event.preventDefault();
        if (imageViewerZoomState.scale > 1) {
          resetImageViewerZoom();
        } else {
          imageViewerZoomState.scale = 2;
          imageViewerZoomState.x = 0;
          imageViewerZoomState.y = 0;
          applyImageViewerTransform();
        }
      });
    }

    function enhanceMobileScrollPerformance() {

      try {
        const saved = sessionStorage.getItem('festival_schedule_overview_day');
        if (saved === 'day1' || saved === 'day2') return saved;
      } catch (_) {}
      const now = new Date();
      const month = now.getMonth() + 1;

    function setupSubTabs(config) {

      els.subTabArea.classList.toggle('score-switcher', config.key === '점수시상');

      if (!config.subTabs) {

        loadData(config.key);

      }

      config.subTabs.forEach(st => {
        const btn = document.createElement('button');
        btn.className = 'sub-tab';
        btn.dataset.key = st.key;
        btn.innerHTML = config.key === '일정'
          ? `<span class="sub-tab-label">${st.label}</span><span class="sub-tab-meta">${st.meta || ''}</span>`
          : `<span class="sub-tab-label">${st.label}</span>`;

          clearScoreAutoRefresh();

          document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));

          if (isAlreadyActive) {
            els.dataList.innerHTML = '';

            els.dayTagArea.innerHTML = '';

            loadRealtimeScore(st.key);

            loadAwardPlanData(st.key);

            renderSportGrid('선수단', true);
          } else if (st.type === 'referee_filter') {

      });

      const firstBtn = els.subTabArea.querySelector('.sub-tab');
      if (firstBtn) firstBtn.click();

    function escapeHtml(str = '') {
      return String(stripTrueFalseText(str))
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function nl2brSafe(str = '') {
      return escapeHtml(str).replace(/\r?\n/g, '<br>');
    }

    function utf8ToBase64(str = '') {
      const bytes = new TextEncoder().encode(String(str));
      let binary = '';
      bytes.forEach(byte => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary);
    }

    function base64ToUtf8(base64 = '') {
      try {
        const binary = atob(base64);
        const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      } catch (e) {
        return '';
      }
    }

    function normalizeSportName(name = '') {
      let value = String(name).trim();
      value = value.replace(/[（）]/g, ch => ch === '（' ? '(' : ')');
      value = value.replace(/\s+/g, '');
      if (value === '팔시름') value = '팔씨름';
      if (/^피구남$|^남자피구$|^남피구$/.test(value)) value = '피구(남)';
      if (/^피구여$|^여자피구$|^여피구$/.test(value)) value = '피구(여)';
      if (/^계주$/.test(value)) value = '이어달리기';
      if (/^계주\((학급|연합)\)$/.test(value)) value = '이어달리기';
      if (/^이어달리기\((학급|연합)\)$/.test(value)) value = '이어달리기';
      return value;
    }

    function sportEquals(a = '', b = '') {
      return normalizeSportName(a) === normalizeSportName(b);
    }

    function isGradeFilterSport(sport = '') {
      return GRADE_FILTER_SPORTS.some(item => sportEquals(item, sport));
    }

    function detectGradeFromText(text = '') {
      const str = String(text || '').trim();
      if (/1학년/.test(str)) return '1학년';
      if (/2학년/.test(str)) return '2학년';
      if (/3학년/.test(str)) return '3학년';

      const match = str.match(/([123])-\d+/);
      if (match) return `${match[1]}학년`;

      return '';
    }

    function getScheduleGrade(item) {
      const candidates = [
        item.col6, item.col5, item.col4, item.col3, item.col2, item.col1
      ].filter(Boolean);

      for (const value of candidates) {
        const grade = detectGradeFromText(value);
        if (grade) return grade;
      }
      return '';
    }

    async function getGlobalSearchIndex(tabName, mode = 'player') {
      const cacheKey = `${tabName}-${mode}`;
      if (globalSearchIndexCache[cacheKey]) return globalSearchIndexCache[cacheKey];

      const allData = await fetchTabDataCached(tabName);
      const rows = Array.isArray(allData) ? allData.slice(1) : [];
      const indexedRows = rows.map(item => {
        const raw = mode === 'player'
          ? `${item.col1 || ''} ${item.col2 || ''} ${item.col3 || ''}`
          : `${item.col1 || ''} ${item.col2 || ''} ${item.col3 || ''} ${item.col4 || ''}`;
        return {
          item,
          searchText: normalizeSearchText(raw)
        };
      });

      globalSearchIndexCache[cacheKey] = indexedRows;
      return indexedRows;
    }

      const resultBox = document.getElementById(currentSportSearchContext.resultId);
      const emptyBox = document.getElementById(`${currentSportSearchContext.inputId.replace(/-search$/, '')}-empty`);
      if (!input || !resultBox) return;

      const keyword = normalizeSearchText(input.value);
      if (emptyBox) emptyBox.style.display = 'none';

      if (!keyword) {
        resultBox.innerHTML = '';
        return;
      }

      resultBox.innerHTML = '<div class="loader" style="font-size:0.8rem; padding:20px;">검색 중...</div>';

      try {
        const tabName = currentSportSearchContext.mode === 'player' ? '선수단' : '심판';
        const indexedRows = await getGlobalSearchIndex(tabName, currentSportSearchContext.mode);
        const filtered = indexedRows
          .filter(entry => entry.searchText.includes(keyword))
          .map(entry => entry.item);

        if (currentSportSearchContext.mode === 'player') {
          renderGlobalPlayerSearchResults(resultBox, filtered, keyword);
        } else {
          renderGlobalRefereeSearchResults(resultBox, filtered, keyword);
        }
      } catch (e) {
        resultBox.innerHTML = '<div class="loader" style="font-size:0.8rem;">⚠️ 검색 결과를 불러올 수 없습니다.</div>';
      }
    }

    function initializeSportSearchContext(mode) {
      const prefix = createUID(`global-${mode}`);
      const searchSectionHTML = createSearchSectionHTML(mode, mode === 'player' ? '선수 이름을 검색해 주세요.' : '심판 이름 또는 역할을 검색해 주세요.');
      return {
        mode,
        html: searchSectionHTML,
        inputId: `${prefix}-search`,
        resultId: `${prefix}-results`,
        prefix
      };
    }

    function normalizeSearchText(value = '') {
      return stripTrueFalseText(String(value || '')).replace(/\s+/g, '').toLowerCase();
    }

    const searchFilterFrameMap = {};
    const searchFilterDebounceMap = {};

    function updateSearchInputState(targetId) {
      const input = document.getElementById(`${targetId}-search`);
      const wrap = document.getElementById(`${targetId}-search-wrap`);
      if (!input || !wrap) return;
      wrap.classList.toggle('has-value', !!input.value);
    }

    function closeMobileKeyboard(input) {
      if (!input || typeof input.blur !== 'function') return;
      input.blur();
      if (document.activeElement && typeof document.activeElement.blur === 'function') {
        document.activeElement.blur();
      }
    }

    function handleSearchInputSubmit(targetId) {
      const input = document.getElementById(`${targetId}-search`);
      if (!input) return;
      if (isGlobalSportSearchTarget(targetId)) {
        handleGlobalSportSearch(currentSportSearchContext.key);
      } else {
        filterSearchItems(targetId);
      }
      closeMobileKeyboard(input);
    }

    function handleSearchInputKeydown(event, targetId) {
      if (!event || event.key !== 'Enter') return;
      handleSearchInputSubmit(targetId);
    }

    function clearSearchInput(targetId) {
      const input = document.getElementById(`${targetId}-search`);
      if (!input) return;
      input.value = '';
      updateSearchInputState(targetId);
      if (isGlobalSportSearchTarget(targetId)) {
        const resultBox = document.getElementById(currentSportSearchContext.resultId);
        const emptyBox = document.getElementById(`${targetId}-empty`);
        if (resultBox) resultBox.innerHTML = '';
        if (emptyBox) emptyBox.style.display = 'none';
      } else {
        filterSearchItems(targetId);
      }
      input.focus();
    }

    function prepareSearchItems(targetId) {
      const wrapper = document.getElementById(targetId);
      if (!wrapper) return;
      const items = wrapper.querySelectorAll('[data-search-item="true"]');
      items.forEach(item => {
        if (!item.dataset.searchPrepared) {
          const rawText = item.dataset.searchText || item.textContent || '';
          item.dataset.searchText = normalizeSearchText(rawText);
          item.dataset.searchPrepared = 'true';
        }
      });
    }

    function isGlobalSportSearchTarget(targetId) {
      return !!(
        currentSportSearchContext &&
        currentSportSearchContext.inputId === `${targetId}-search`
      );
    }

    function scheduleFilterSearch(targetId) {
      updateSearchInputState(targetId);

      if (searchFilterFrameMap[targetId]) {
        cancelAnimationFrame(searchFilterFrameMap[targetId]);
        searchFilterFrameMap[targetId] = null;
      }

      if (searchFilterDebounceMap[targetId]) {
        clearTimeout(searchFilterDebounceMap[targetId]);
      }

      searchFilterDebounceMap[targetId] = setTimeout(() => {
        searchFilterFrameMap[targetId] = requestAnimationFrame(() => {
          if (isGlobalSportSearchTarget(targetId)) {
            handleGlobalSportSearch(currentSportSearchContext.key);
          } else {
            filterSearchItems(targetId);
          }
          searchFilterFrameMap[targetId] = null;
        });
        searchFilterDebounceMap[targetId] = null;
      }, 60);
    }

    function filterSearchItems(targetId) {
      const input = document.getElementById(`${targetId}-search`);
      const wrapper = document.getElementById(targetId);
      const emptyBox = document.getElementById(`${targetId}-empty`);
      if (!input || !wrapper) return;

      prepareSearchItems(targetId);
      updateSearchInputState(targetId);

      const keyword = normalizeSearchText(input.value);
      const items = wrapper.querySelectorAll('[data-search-item="true"]');
      let visibleCount = 0;

      items.forEach(item => {
        const searchText = item.dataset.searchText || '';
        const matched = !keyword || searchText.includes(keyword);
        item.style.display = matched ? '' : 'none';
        if (matched) visibleCount += 1;
      });

      if (emptyBox) {
        emptyBox.style.display = items.length > 0 && visibleCount === 0 ? 'block' : 'none';
      }
    }

    function buildSearchableRefereeHTML(refContent, targetId, sport = '') {
      const lines = stripTrueFalseText(refContent)
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);

      if (!lines.length) {
        return createEmptyGuideHTML('등록된 심판 정보가 없습니다.', `${sport || '선택한 종목'} 심판진 정보가 아직 등록되지 않았습니다.`);
      }

      return `
        ${createNameSearchHTML(targetId, '심판 이름 또는 역할을 검색해 주세요.')}
        <div class="referee-line-list" id="${targetId}">
          ${lines.map(line => `
            <div class="referee-line-card" data-search-item="true" data-search-text="${escapeHtml(normalizeSearchText(line))}">${escapeHtml(line)}</div>
          `).join('')}
        </div>
      `;
    }

      if (mode === 'bracket') {

          badge: `${SPORTS_LIST.length}개 종목`
        };
      }

      if (isScheduleView) {
        return {
          tone: 'purple',
          title: '종목별 세부 경기 일정',

        };
      }

      if (isPlayerGrid && targetTab === '선수단') {
        return {
          tone: 'pink',
          title: '종목별 선수단 명단',
          desc: '종목을 선택하면 반별 선수 명단 또는 학년별 명단을 카드형으로 확인할 수 있습니다.',
          badge: `${SPORTS_LIST.length}개 종목`
        };
      }

      if (targetTab === '심판') {
        return {
          tone: 'pink',
          title: '종목별 심판진 정보',

          badge: `${SPORTS_LIST.length}개 종목`
        };
      }

      return {
        tone: 'blue',
        title: '종목별 정보',
        desc: '종목을 선택하여 상세 정보를 확인해 주세요.',
        badge: `${SPORTS_LIST.length}개 종목`

    function getSportSelectGuideText(targetTab, mode = 'default') {
      if (mode === 'rule') {
        return {
          title: '종목을 선택해 주세요.',
          desc: '종목 버튼을 누르면 해당 종목의 경기 규칙이 카드형으로 열립니다.'

      }

      if (mode === 'bracket') {
        return {
          title: '종목을 선택해 주세요.',
          desc: '종목 버튼을 누르면 해당 종목의 대진표가 카드형으로 열립니다.'
        };
      }

      if (targetTab === '선수단') {
        return {
          title: '종목을 선택해 주세요.',

        };
