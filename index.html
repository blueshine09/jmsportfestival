    const cols = [row?.col2, row?.col3, row?.col4, row?.col5, row?.col6, row?.col7];
    const text = cols.map(safeText).filter(Boolean).join(' ');
    return detectRelayTypeFromText(text);
  }

  function relaySegmentHTML(kind, currentType){
    const classActive = currentType === '학급' ? 'active' : '';
    const unionActive = currentType === '연합' ? 'active' : '';
    const resultId = kind === 'schedule' ? 'relay-schedule-result' : 'relay-roster-result';
    const label = kind === 'schedule' ? '세부일정' : '선수단';
    const onclickClass = kind === 'schedule'
      ? "loadRelayScheduleSplit('학급', this)"
      : "loadRelayRosterSplit('학급', this)";
    const onclickUnion = kind === 'schedule'
      ? "loadRelayScheduleSplit('연합', this)"
      : "loadRelayRosterSplit('연합', this)";
    return `
      <div class="relay-selector-shell">
        <div class="relay-segment sub-tab-container" role="tablist" aria-label="이어달리기 ${label} 구분">
          <button type="button" class="relay-segment-btn sub-tab ${classActive}" data-inline-click="${onclickClass}">
            <span class="relay-btn-title sub-tab-label">학급</span>
          </button>
          <button type="button" class="relay-segment-btn sub-tab ${unionActive}" data-inline-click="${onclickUnion}">
            <span class="relay-btn-title sub-tab-label">연합</span>
          </button>
        </div>
        <div id="${resultId}" class="relay-selector-result"></div>
      </div>
    `;
  }

  function getRelayRows(data, type, context){
    const rows = Array.isArray(data) ? data.filter((row) => isRelaySport(row?.col1 || '')) : [];
    const filtered = rows.filter((row) => detectRelayTypeFromRow(row, context) === type);
    const fallbackRows = filtered.length
      ? filtered
      : rows.filter((row) => !detectRelayTypeFromRow(row, context));
    const finalRows = filtered.length ? filtered : fallbackRows;
    if (context === 'roster') {
      return hasFn('dedupeRosterRows') ? window.dedupeRosterRows(finalRows) : finalRows;
    }
    return hasFn('uniqueRows') ? window.uniqueRows(finalRows) : finalRows;
  }

  window.loadRelayScheduleSplit = async function(type = '학급', btn = null){
    const container = document.getElementById('sport-common-detail');
    if (!container) return;
    const normalizedType = safeText(type) === '연합' ? '연합' : '학급';
    container.innerHTML = relaySegmentHTML('schedule', normalizedType);
    if (window.lucide && typeof window.lucide.createIcons === 'function') {
      window.lucide.createIcons();
    }
    const resultBox = document.getElementById('relay-schedule-result');
    if (!resultBox) return;
    resultBox.innerHTML = '<div class="loader" style="font-size:0.8rem; padding:20px;">로딩 중...</div>';
    try {
      const allData = await (hasFn('fetchTabDataCached')
        ? window.fetchTabDataCached('세부경기일정')
        : Promise.resolve([]));
      const rows = getRelayRows(allData, normalizedType, 'schedule');
      if (hasFn('renderScheduleList')) {
        window.renderScheduleList(resultBox, rows, '이어달리기');
      } else {
        resultBox.innerHTML = '<div class="loader" style="font-size:0.8rem;">⚠️ 일정 렌더러를 찾지 못했습니다.</div>';
      }
    } catch (error) {
      resultBox.innerHTML = '<div class="loader" style="font-size:0.8rem;">⚠️ 데이터를 불러오지 못했습니다.</div>';
    }
  };

  window.loadRelayRosterSplit = async function(type = '학급', btn = null){
    const container = document.getElementById('sport-common-detail');
    if (!container) return;
    const normalizedType = safeText(type) === '연합' ? '연합' : '학급';
    container.innerHTML = relaySegmentHTML('roster', normalizedType);
    if (window.lucide && typeof window.lucide.createIcons === 'function') {
      window.lucide.createIcons();
    }
    const resultBox = document.getElementById('relay-roster-result');
    if (!resultBox) return;
    resultBox.innerHTML = '<div class="loader" style="font-size:0.8rem; padding:20px;">로딩 중...</div>';
    try {
      const allData = await (hasFn('fetchTabDataCached')
        ? window.fetchTabDataCached('선수단')
        : Promise.resolve([]));
      const rows = getRelayRows(allData, normalizedType, 'roster');
      if (hasFn('renderClassCards')) {
        window.renderClassCards(resultBox, rows, '이어달리기', false);
      } else {
        resultBox.innerHTML = '<div class="loader" style="font-size:0.8rem;">⚠️ 선수단 렌더러를 찾지 못했습니다.</div>';
      }
    } catch (error) {
      resultBox.innerHTML = '<div class="loader" style="font-size:0.8rem;">⚠️ 데이터를 불러오지 못했습니다.</div>';
    }
  };

  if (typeof window.handleSportFilterClick === 'function') {
    const originalHandleSportFilterClick = window.handleSportFilterClick;
    window.handleSportFilterClick = async function(btn, targetTab, sport, isPlayerGrid = false, isScheduleView = false, mode = 'default'){
      if (!isRelaySport(sport) || mode === 'bracket') {
        return originalHandleSportFilterClick.apply(this, arguments);
      }

      // 이어달리기 예외 처리는 세부일정/선수단 분할 보기에서만 가로챈다.
      // 경기규칙 등 다른 모드에서는 원래 공통 핸들러를 그대로 사용해야
      // active 상태가 중복으로 잡히지 않고 정상 렌더링된다.
      if (!isScheduleView && !isPlayerGrid) {
        return originalHandleSportFilterClick.apply(this, arguments);
      }

      const container = document.getElementById('sport-common-detail');
      const isAlreadyActive = !!btn && btn.classList.contains('active');
      document.querySelectorAll('#sport-filter-group .filter-btn').forEach((b) => b.classList.remove('active'));

      if (isScheduleView && window.currentDetailScheduleMode === 'timeline') {
        window.currentDetailScheduleMode = 'sport';
        const sportFilterGroup = document.getElementById('sport-filter-group');
        if (sportFilterGroup) sportFilterGroup.classList.remove('is-hidden');
        document.querySelectorAll('.schedule-view-toggle-btn').forEach((button) => {
          button.classList.toggle('active', button.dataset.mode === 'sport');
        });
      }

      if (isAlreadyActive) {
        if (typeof window.resetSportDetailArea === 'function') {
          window.resetSportDetailArea(targetTab, isPlayerGrid, isScheduleView, mode);
        }
        if (isScheduleView && typeof window.renderScheduleDetailByMode === 'function') {
          await window.renderScheduleDetailByMode();
        }
        return;
      }

      if (btn) btn.classList.add('active');
      if (isScheduleView) {
        document.getElementById('sport-filter-group')?.classList.add('schedule-hidden-after-select');
      }
      if (!container) return;

      if (isScheduleView) {
        await window.loadRelayScheduleSplit('학급');
        return;
      }
      if (isPlayerGrid) {
        await window.loadRelayRosterSplit('학급');
        return;
      }
      return originalHandleSportFilterClick.apply(this, arguments);
    };
  }

  if (typeof window.openDetailInfo === 'function') {
    const originalOpenDetailInfo = window.openDetailInfo;
    window.openDetailInfo = async function(type, sport, matchInfo = ''){
      if (!(type === '선수단' && isRelaySport(sport))) {
        return originalOpenDetailInfo.apply(this, arguments);
      }

      const modal = document.getElementById('detail-modal');
      const title = document.getElementById('detail-modal-title');
      const content = document.getElementById('detail-modal-content');
      if (!modal || !title || !content) return;

      const relayType = detectRelayTypeFromText(matchInfo) === '연합' ? '연합' : '학급';
      title.textContent = `${sport} ${type} 정보`;
      content.innerHTML = '<div class="loader">데이터를 불러오고 있습니다...</div>';
      modal.style.display = 'flex';

      try {
        const data = hasFn('fetchTabDataCached')
          ? await window.fetchTabDataCached('선수단')
          : await (await fetch(`${typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : ''}?tab=${encodeURIComponent('선수단')}`)).json();
        const rows = Array.isArray(data) ? data.slice(1) : [];
        const filtered = getRelayRows(rows, relayType, 'roster');
        if (hasFn('renderClassCards')) {
          window.renderClassCards(content, filtered, '이어달리기', false);
        } else {
          content.innerHTML = '<div class="loader">⚠️ 데이터를 표시하지 못했습니다.</div>';
        }
      } catch (error) {
        content.innerHTML = '<div class="loader">⚠️ 데이터를 불러오지 못했습니다.</div>';
      }
    };
  }
})();
</script>

<script id="feedback-fab-script-v1">
(function(){
  const SCRIPT = (typeof FEEDBACK_SCRIPT_URL !== 'undefined' && FEEDBACK_SCRIPT_URL) ? FEEDBACK_SCRIPT_URL : ((typeof SCRIPT_URL !== 'undefined' && SCRIPT_URL) ? SCRIPT_URL : '');
  function el(id){ return document.getElementById(id); }
  function openFeedbackModal(){ const m=el('feedback-modal'); if(m){ m.classList.add('open'); m.setAttribute('aria-hidden','false'); } }
  function closeFeedbackModal(){ const m=el('feedback-modal'); if(m){ m.classList.remove('open'); m.setAttribute('aria-hidden','true'); } }
  function setStatus(msg, isError){ const s=el('feedback-status'); if(s){ s.textContent=msg||''; s.style.color=isError?'#c75d7f':'#7f4b61'; } }
  function bindSheetSwipeClose(){
    const modal = el('feedback-modal');
    const sheet = modal?.querySelector('.feedback-sheet');
    const handle = modal?.querySelector('.feedback-top');
    if(!modal || !sheet || !handle || modal.dataset.swipeBound === '1') return;
    modal.dataset.swipeBound = '1';
    let startY = 0;
    let currentY = 0;
    let dragging = false;
    let pointerId = null;
    const CLOSE_DISTANCE = 90;
    const RESISTANCE = 0.96;

    const resetSheet = () => {
      sheet.classList.remove('is-dragging');
      sheet.style.transform = '';
      modal.style.background = '';
    };

    const onPointerMove = (e) => {
      if(!dragging || (pointerId !== null && e.pointerId !== pointerId)) return;
      currentY = Math.max(0, e.clientY - startY);
      const offset = Math.max(0, currentY * RESISTANCE);
      sheet.style.transform = `translateY(${offset}px)`;
      modal.style.background = `rgba(17,24,39,${Math.max(0.12, 0.42 - Math.min(offset / 420, 0.22)).toFixed(3)})`;
      if(offset > 0) e.preventDefault();
    };

    const endDrag = () => {
      if(!dragging) return;
      dragging = false;
      pointerId = null;
      sheet.classList.remove('is-dragging');
      const moved = currentY;
      currentY = 0;
      if(moved > CLOSE_DISTANCE){
        resetSheet();
        closeFeedbackModal();
      } else {
        resetSheet();
      }
    };

    handle.addEventListener('pointerdown', (e) => {
      if(e.pointerType === 'mouse' && e.button !== 0) return;
      if(sheet.scrollTop > 4) return;
      dragging = true;
      pointerId = e.pointerId;
      startY = e.clientY;
      currentY = 0;
      sheet.classList.add('is-dragging');
      handle.setPointerCapture?.(e.pointerId);
    });

    handle.addEventListener('pointermove', onPointerMove, { passive:false });
    handle.addEventListener('pointerup', endDrag);
    handle.addEventListener('pointercancel', endDrag);
    modal.addEventListener('transitionend', () => { if(!dragging) resetSheet(); });
  }
  async function submitFeedback(){
    const payload = {
      action:'submitFeedback',
      name:(el('feedback-name')?.value||'').trim(),
      className:(el('feedback-class')?.value||'').trim(),
      type:(el('feedback-type')?.value||'기타').trim(),
      message:(el('feedback-message')?.value||'').trim(),
      page:location.href,
      referrer:document.referrer || '',
      userAgent:navigator.userAgent || ''
    };
    if(!payload.message){ setStatus('의견 내용을 입력해 주세요.', true); return; }
    if(!SCRIPT){ setStatus('SCRIPT_URL이 설정되지 않아 전송할 수 없습니다.', true); return; }
    const submitBtn = el('feedback-submit');
    if(submitBtn) submitBtn.disabled = true;
    setStatus('전송 중...', false);
    try{
      const res = await fetch(SCRIPT, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if(result && result.ok){
        setStatus('의견이 저장되었습니다.', false);
        if(el('feedback-name')) el('feedback-name').value='';
        if(el('feedback-class')) el('feedback-class').value='';
        if(el('feedback-message')) el('feedback-message').value='';
      } else {
        setStatus((result && result.message) || '저장에 실패했습니다.', true);
      }
    }catch(err){
      setStatus('전송 중 오류가 발생했습니다.', true);
    } finally {
      if(submitBtn) submitBtn.disabled = false;
    }
  }
  function bindFeedbackModal(){
    const btn = el('feedback-fab-btn');
    const cancel = el('feedback-cancel');
    const modal = el('feedback-modal');
    const submit = el('feedback-submit');
    if(btn && btn.dataset.boundFeedback !== '1'){
      btn.dataset.boundFeedback = '1';
      btn.addEventListener('click', openFeedbackModal);
    }
    if(cancel && cancel.dataset.boundFeedback !== '1'){
      cancel.dataset.boundFeedback = '1';
      cancel.addEventListener('click', closeFeedbackModal);
    }
    if(submit && submit.dataset.boundFeedback !== '1'){
      submit.dataset.boundFeedback = '1';
      submit.addEventListener('click', submitFeedback);
    }
    if(modal && modal.dataset.boundFeedback !== '1'){
      modal.dataset.boundFeedback = '1';
      modal.addEventListener('click', function(e){ if(e.target === modal) closeFeedbackModal(); });
    }
    bindSheetSwipeClose();
  }
  window.openFeedbackModal = openFeedbackModal;
  window.closeFeedbackModal = closeFeedbackModal;
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', bindFeedbackModal, { once:true });
  } else {
    bindFeedbackModal();
  }
})();
</script>

</script>

<script id="referee-inline-meta-v15">
(function(){
  if (window.__refereeInlineMetaV15__) return;
  window.__refereeInlineMetaV15__ = true;

  function esc(v){
    try { return typeof escapeHtml === 'function' ? escapeHtml(v) : String(v ?? ''); }
    catch(_) { return String(v ?? ''); }
  }
  function cleanText(v){
    try { return typeof stripTrueFalseText === 'function' ? stripTrueFalseText(v || '') : String(v || ''); }
    catch(_) { return String(v || ''); }
  }

  const prevRenderSubList = typeof renderSubList === 'function' ? renderSubList : null;
  if (!prevRenderSubList) return;

  renderSubList = function(container, filtered, sport = '', contextType = '') {
    if (contextType !== '심판') {
      return prevRenderSubList.apply(this, arguments);
    }

    if (!filtered || filtered.length === 0) {
      container.innerHTML = createEmptyGuideHTML('데이터가 없습니다.', '표시할 정보가 아직 등록되지 않았습니다.');
      return;
    }

    const targetId = `sub-search-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;

    container.innerHTML = `
      <div class="roster-stack referee-roster-stack" id="${targetId}">
        ${filtered.map((item, i) => {

<script id="safe-performance-stage2-v19">
(function(){
  if (window.__safePerfStage2V19__) return;
  window.__safePerfStage2V19__ = true;

  const HTML_PREFIX = 'sports-festival-html-cache-v19:';
  const HTML_TTL = 1000 * 60 * 30;
  const DATA_PREFIX = 'sports-festival-cache-v26:';
  const DATA_TTL = 1000 * 60 * 30;

  function lsGet(key){ try { return localStorage.getItem(key); } catch(_) { return null; } }
  function lsSet(key, value){ try { localStorage.setItem(key, value); } catch(_) {} }
  function safeParse(raw){ try { return JSON.parse(raw); } catch(_) { return null; } }
  function activeViewKey(){
    const sub = document.querySelector('#sub-tab-area .sub-tab.active[data-key]');
    if (sub && sub.dataset && sub.dataset.key) return sub.dataset.key;
    const main = document.querySelector('.tab-item.active[data-key]');
    return main && main.dataset ? main.dataset.key : '';
  }
  function getHtmlKey(viewKey){ return HTML_PREFIX + String(viewKey || '').trim(); }
  function readHtmlCache(viewKey){
    const parsed = safeParse(lsGet(getHtmlKey(viewKey)) || '');
    if (!parsed || typeof parsed.html !== 'string' || !parsed.savedAt) return '';
    if ((Date.now() - parsed.savedAt) > HTML_TTL) return '';
    return parsed.html || '';
  }
  function writeHtmlCache(viewKey, html){
    if (!viewKey || typeof html !== 'string') return;
    const trimmed = html.trim();
    if (!trimmed) return;
    if (/class="loader"|정보를 불러오는 중|로딩중/u.test(trimmed)) return;
    lsSet(getHtmlKey(viewKey), JSON.stringify({ savedAt: Date.now(), html }));
  }
  function paintCached(viewKey){
    const target = document.getElementById('data-list');
    const html = readHtmlCache(viewKey);
    if (!target || !html) return false;
    target.innerHTML = html;
    try { if (typeof showState === 'function') showState('data-list'); } catch(_) {}
    try {
      if (typeof refreshDynamicUI === 'function') refreshDynamicUI(target);
      else if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
    } catch(_) {}
    return true;
  }
  function staleRefresh(fn, args){
    setTimeout(() => {
      try { Promise.resolve(fn.apply(window, args || [])).catch(()=>{}); } catch(_) {}
    }, 0);
  }

  // Persist rendered HTML for fast re-entry / refresh.
  const dataList = document.getElementById('data-list');
  if (dataList && typeof MutationObserver !== 'undefined') {
    let saveTimer = null;
    const observer = new MutationObserver(() => {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        const key = activeViewKey();
        if (!key) return;
        writeHtmlCache(key, dataList.innerHTML || '');
      }, 120);
    });
    observer.observe(dataList, { childList: true, subtree: true, characterData: true });
  }

  // Extend persisted data cache lifetime safely.
  if (typeof window.readPersistedTabCache === 'function') {
    const originalRead = window.readPersistedTabCache;
    window.readPersistedTabCache = function(tabName){
      const preferred = safeParse(lsGet(DATA_PREFIX + String(tabName || '').trim()) || '');
      if (preferred && Array.isArray(preferred.data) && preferred.savedAt && (Date.now() - preferred.savedAt) <= DATA_TTL) {
        return preferred.data;
      }
      return originalRead.apply(this, arguments);
    };
  }
  if (typeof window.writePersistedTabCache === 'function') {
    const originalWrite = window.writePersistedTabCache;
    window.writePersistedTabCache = function(tabName, data){
      try {
        if (Array.isArray(data)) {
          lsSet(DATA_PREFIX + String(tabName || '').trim(), JSON.stringify({ savedAt: Date.now(), data }));
        }
      } catch(_) {}
      return originalWrite.apply(this, arguments);
    };
  }

  if (typeof window.loadRealtimeScore === 'function') {
    const original = window.loadRealtimeScore;
    window.loadRealtimeScore = function(key, isSilent){
      return original.apply(this, arguments);
    };
  }

  if (typeof window.loadAwardPlanData === 'function') {
    const original = window.loadAwardPlanData;
    window.loadAwardPlanData = function(key){
      paintCached(key || '시상 계획');
      staleRefresh(original, arguments);
      return;
    };
  }

  if (typeof window.loadData === 'function') {
    const original = window.loadData;
    window.loadData = function(tabName){
      paintCached(tabName);
      staleRefresh(original, arguments);
      return;
    };
  }

  if (typeof window.renderTeacherGuide === 'function') {
    const original = window.renderTeacherGuide;
    window.renderTeacherGuide = function(){
      paintCached('교사업무분장');
      staleRefresh(original, arguments);
      return;
    };
  }

  if (typeof window.renderSportGrid === 'function') {
    const original = window.renderSportGrid;
    window.renderSportGrid = function(targetTab, isPlayerGrid, isScheduleView, mode){
      const viewKey = isScheduleView ? '일정_세부일정' : String(targetTab || '');
      paintCached(viewKey);
      return original.apply(this, arguments);
    };
  }

  if (typeof window.loadScheduleOverview === 'function') {
    const original = window.loadScheduleOverview;
    window.loadScheduleOverview = function(){
      paintCached('일정_전체일정');
      return original.apply(this, arguments);
    };
  }
})();

<script id="schedule-overview-stability-fix-v23">
(function(){
  if (window.__scheduleOverviewStabilityFixV23__) return;
  window.__scheduleOverviewStabilityFixV23__ = true;

  const HTML_CACHE_KEY = 'sports-festival-html-cache-v19:일정_전체일정';
  try { localStorage.removeItem(HTML_CACHE_KEY); } catch(_) {}

  function esc(value){
    return (typeof escapeHtml === 'function') ? escapeHtml(value || '') : String(value || '');
  }

  function isMeaningfulRow(item){
    if (!item || typeof item !== 'object') return false;
    const values = [item.col1, item.col2, item.col3, item.col4]
      .map(v => String(v || '').replace(/\s+/g, ' ').trim())
      .filter(Boolean);
    if (!values.length) return false;
    return values.some(v => !/^\d+$/.test(v));
  }

  function buildOverviewHtml(day1Data, day2Data){
    const day1Rows = Array.isArray(day1Data) ? day1Data.slice(1).filter(isMeaningfulRow) : [];
    const day2Rows = Array.isArray(day2Data) ? day2Data.slice(1).filter(isMeaningfulRow) : [];
    const day1ImageMeta = (typeof extractScheduleImageMeta === 'function') ? extractScheduleImageMeta(day1Data, '1일차 좌석 배치') : null;
    const day2ImageMeta = (typeof extractScheduleImageMeta === 'function') ? extractScheduleImageMeta(day2Data, '2일차 좌석 배치') : null;
    const defaultDay = (typeof getDefaultScheduleOverviewDay === 'function') ? getDefaultScheduleOverviewDay() : 'day1';

    if (!day1Rows.length && !day2Rows.length) return '';

    const empty = (title, desc) => (typeof createEmptyGuideHTML === 'function')
      ? createEmptyGuideHTML(title, desc)
      : `<div class="section-empty-guide"><strong>${esc(title)}</strong><span>${esc(desc)}</span></div>`;

    const renderRows = (rows) => rows.map((item, i) => {
      const location = item.col4 || item.col1;
      const locationTag = location ? `<div class="btn-group"><span class="inline-btn loc">${esc(location)}</span></div>` : '';
      return `
        <div class="data-card">
          <div class="item-row">
            <div class="item-no">${i + 1}</div>
            <div class="item-info">
              <span class="item-time">${esc(item.col2 || '')}</span>
              <span class="item-content">${esc(item.col3 || '')}</span>
              ${locationTag}
            </div>
          </div>
        </div>`;
    }).join('');

    const renderPanel = (dayKey, dayLabel, daySub, rows, imageMeta) => `
      <section class="schedule-day-panel ${defaultDay === dayKey ? 'active' : ''}" data-day="${dayKey}">
        <section class="teacher-section-card" style="margin-top: 12px;">
          <div class="teacher-section-head ${dayKey === 'day1' ? 'schedule-head-inline' : ''}">
            <div>
              <h3 class="teacher-section-title">${esc(dayLabel)}</h3>
              <p class="teacher-section-sub">${esc(daySub)}</p>
            </div>
            ${(dayKey === 'day1' || dayKey === 'day2') && imageMeta && imageMeta.url ? `
              <button class="seat-link-btn" type="button"
                data-image-url="${esc(imageMeta.url)}"
                data-image-source="${esc(imageMeta.url)}"
                data-image-title="${esc(imageMeta.title || `${dayLabel} 좌석 배치`)}"
                data-inline-click="openImageViewerFromDataset(this)">
                <span class="seat-photo-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect><circle cx="8.5" cy="10" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg></span>
                좌석 배치
              </button>` : ''}
          </div>
          ${rows.length ? renderRows(rows) : empty('등록된 일정이 없습니다.', '구글시트 일정을 확인해 주세요.')}
        </section>
      </section>`;

    return `
      <div class="schedule-overview-shell">
        <div class="schedule-day-switcher">
          <button class="schedule-day-btn ${defaultDay === 'day1' ? 'active' : ''}" type="button" data-day="day1" data-inline-click="switchScheduleOverviewDay('day1')">1일차</button>
          <button class="schedule-day-btn ${defaultDay === 'day2' ? 'active' : ''}" type="button" data-day="day2" data-inline-click="switchScheduleOverviewDay('day2')">2일차</button>
        </div>
        <div class="section-empty-guide schedule-overview-empty-guide ${defaultDay ? 'is-hidden' : ''}">
          <strong style="font-size:1.365rem !important; line-height:1.15;">일차를 선택해 주세요.</strong>
          <span>상단에서 1일차 또는 2일차를 누르면 아래에 전체일정이 열립니다.</span>
        </div>
        ${renderPanel('day1', '1일차 전체일정', '4월 2일 · 운동장 및 체육관', day1Rows, day1ImageMeta)}
        ${renderPanel('day2', '2일차 전체일정', '4월 3일 · 마동근린공원', day2Rows, day2ImageMeta)}
      </div>`;
  }

  function writeFreshCaches(html){
    try {
      const cacheStore = window.__fullRenderCacheStore__ || window.__festivalRenderCache__;
      if (cacheStore && cacheStore.initialViews) {
        cacheStore.initialViews['일정_전체일정'] = html;
        cacheStore.scheduleOverviewReady = true;
      }
    } catch(_) {}
    try {
      localStorage.setItem(HTML_CACHE_KEY, JSON.stringify({ savedAt: Date.now(), html }));
    } catch(_) {}
  }

  window.loadScheduleOverview = async function loadScheduleOverviewStableV23(){
    const target = (typeof els !== 'undefined' && els && els.dataList) ? els.dataList : document.getElementById('data-list');
    if (typeof showState === 'function') showState('loader');
    try {
      const fetcher = (typeof fetchTabDataCached === 'function') ? fetchTabDataCached : fetchTabData;
      const [day1Data, day2Data] = await Promise.all([
        fetcher('전체일정_1일차'),
        fetcher('전체일정_2일차')
      ]);
      const html = buildOverviewHtml(day1Data, day2Data);
      if (!html) {
        if (typeof showState === 'function') showState('empty-box');
        return '';
      }
      if (target) {
        const shared = window.__festivalSharedUtils__ || {};
        if (shared.setHtmlIfChanged) shared.setHtmlIfChanged(target, html);
        else target.innerHTML = html;
      }
      writeFreshCaches(html);
      if (typeof showState === 'function') showState('data-list');
      if (typeof refreshDynamicUI === 'function' && target) refreshDynamicUI(target);
      return html;
    } catch (error) {
      if (typeof showState === 'function') showState('error-box');
      return '';
    }
  };

  try { loadScheduleOverview = window.loadScheduleOverview; } catch(_) {}
})();
</script>

<script id="targeted-performance-patch-v1">
(function(){
  if (window.__targetedPerformancePatchV1__) return;
  window.__targetedPerformancePatchV1__ = true;

  const shared = window.__festivalSharedUtils__ || {};
  const setHtmlIfChanged = shared.setHtmlIfChanged || function(el, html){
    if (!el) return false;
    if (el.innerHTML === html) return false;
    el.innerHTML = html;
    return true;
  };

  const renderCache = window.__festivalRenderHtmlCache__ = window.__festivalRenderHtmlCache__ || new Map();
  window.applyCachedHtml = function applyCachedHtml(key, el, html){
    if (!el || !key) return setHtmlIfChanged(el, html);
    if (renderCache.get(key) === html && el.innerHTML === html) return false;
    renderCache.set(key, html);
    return setHtmlIfChanged(el, html);
  };

  const dataList = document.getElementById('data-list');
  if (dataList && typeof MutationObserver !== 'undefined' && !window.__dataListScopedIconRefreshBound__) {
    window.__dataListScopedIconRefreshBound__ = true;
    const observer = new MutationObserver(() => {
      if (typeof window.requestIconRefresh === 'function') {
        window.requestIconRefresh();
      }
    });
    observer.observe(dataList, { childList: true, subtree: true });
  }
})();
</script>

<script>
(function(){
  function normalizeRealtimeScoreCells(){
    try {
      const selectors = [
        '.realtime-score-page .realtime-score-badge-row .score-guide-badge-col:not(.score-guide-badge-col-sport):not(.realtime-rank-col)',
        '.realtime-score-page .realtime-score-board tbody td:not(:first-child):not(:last-child)'
      ];
      selectors.forEach(function(selector){
        document.querySelectorAll(selector).forEach(function(cell){
          const badgeChild = cell.querySelector('.award-chip, [class*="badge"], [class*="chip"]');
          if (badgeChild) {
            const text = (badgeChild.textContent || '').trim();
            if (text) cell.textContent = text;
          }
        });
      });
    } catch (e) {
      console.error(e);
    }
  }

  document.addEventListener('DOMContentLoaded', function(){

<script id="location-guide-modal-v2">
(function(){
  if (window.__locationGuideModalV2__) return;
  window.__locationGuideModalV2__ = true;

  function normalizePlaceText(value = ''){
    return String(value || '')
      .replace(/\s+/g, ' ')
      .replace(/[()[\]{}]/g, ' ')
      .trim()
      .toLowerCase();
  }

  function scoreLocationMatch(place = '', title = ''){
    const a = normalizePlaceText(place);
    const b = normalizePlaceText(title);
    if (!a || !b) return 0;
    if (a === b) return 100;
    if (b.includes(a)) return 80;
    if (a.includes(b)) return 70;
    const aTokens = a.split(/[·,\/-]/).map(v => v.trim()).filter(Boolean);
    const bTokens = b.split(/[·,\/-]/).map(v => v.trim()).filter(Boolean);
    const common = aTokens.filter(token => bTokens.includes(token));
    if (common.length) return 40 + (common.length * 10);
    return 0;
  }

  function buildLocationGuideHtml(place = '', images = []){
    const safePlace = (typeof escapeHtml === 'function') ? escapeHtml(place || '장소') : String(place || '장소');
    if (!Array.isArray(images) || !images.length) {
      return `
        <div class="section-empty-guide" style="margin:0; min-height:220px;">
          <strong style="font-size:1.15rem; line-height:1.25;">등록된 장소 사진이 없습니다.</strong>
          <span>${safePlace} 사진을 보려면 장소안내 시트에 장소명(col1)과 이미지링크(col2)를 넣어 주세요.</span>
        </div>
      `;
    }

    return `
      <div style="display:flex; flex-direction:column; gap:18px;">
        ${images.map((item, idx) => `
          <div style="display:flex; flex-direction:column; gap:10px;">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
              <strong style="font-size:1rem; line-height:1.35; color:#1c1c1e;">${escapeHtml(item.title || `${place} 안내 ${idx + 1}`)}</strong>
              <span style="font-size:0.84rem; font-weight:700; color:#8e8e93;">${idx + 1} / ${images.length}</span>
            </div>
            <img src="${escapeHtml(item.url || '')}" alt="${escapeHtml(item.title || place)} 이미지" loading="lazy" decoding="async" referrerpolicy="no-referrer" style="display:block; width:100%; border-radius:18px; background:#fff6f8; border:1px solid #ead7df;" />
            ${item.desc ? `<div style="font-size:0.9rem; line-height:1.6; color:#7f4b61;">${escapeHtml(item.desc)}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `;
  }

  async function ensureLocationGuideGallery(){
    if (Array.isArray(window.currentLocationGuideGallery) && window.currentLocationGuideGallery.length) {
      return window.currentLocationGuideGallery;
    }

    const toImageUrl = (raw = '') => {
      const text = String(raw || '').trim();
      if (!text) return '';
      if (/^https?:\/\//i.test(text)) {
        const fileMatch = text.match(/[-\w]{25,}/);
        if (/drive\.google\.com/i.test(text) && fileMatch) {
          return `https://drive.google.com/thumbnail?id=${fileMatch[0]}&sz=w1600`;
        }
        return text;
      }
      if (/^[-\w]{25,}$/.test(text)) {
        return `https://drive.google.com/thumbnail?id=${text}&sz=w1600`;
      }
      return text;
    };

    const rows = (typeof fetchTabDataCached === 'function')
      ? await fetchTabDataCached('장소안내')
      : [];

    const list = (Array.isArray(rows) ? rows : [])
      .slice(1)
      .map((row, idx) => {
        const title = String(row.col1 || '').trim();
        const rawUrl = String(row.col2 || '').trim();
        const desc = String(row.col3 || '').trim();
        const sort = Number(String(row.col4 || '').trim()) || (idx + 1);
        return { title, url: toImageUrl(rawUrl), desc, sort };
      })
      .filter(item => item.title && item.url)
      .sort((a, b) => a.sort - b.sort);

    window.currentLocationGuideGallery = list;
    return list;
  }

  window.openLocationGuideModal = async function(place = ''){
    const locationText = String(place || '').trim();
    const modal = document.getElementById('detail-modal');
    const title = document.getElementById('detail-modal-title');
    const content = document.getElementById('detail-modal-content');
    if (!modal || !title || !content) return;

    title.textContent = locationText ? `${locationText} 장소 안내` : '장소 안내';
    content.innerHTML = `
      <div class="section-empty-guide" style="margin:0; min-height:220px;">
        <strong style="font-size:1.15rem; line-height:1.25;">장소 사진을 불러오는 중입니다.</strong>
        <span>잠시만 기다려 주세요.</span>
      </div>
    `;
    modal.style.display = 'flex';

    try {
      const gallery = await ensureLocationGuideGallery();
      const matched = (Array.isArray(gallery) ? gallery : [])
        .map(item => ({ ...item, __score: scoreLocationMatch(locationText, item.title || '') }))
        .filter(item => item.__score > 0)
        .sort((a, b) => b.__score - a.__score);

      title.textContent = locationText ? `${locationText} 장소 안내` : '장소 안내';
      content.innerHTML = buildLocationGuideHtml(locationText, matched);
    } catch (error) {
      title.textContent = locationText ? `${locationText} 장소 안내` : '장소 안내';
      content.innerHTML = `
        <div class="section-empty-guide" style="margin:0; min-height:220px;">
          <strong style="font-size:1.15rem; line-height:1.25;">장소 사진을 불러오지 못했습니다.</strong>
          <span>장소안내 시트 연결 상태와 이미지 링크를 확인해 주세요.</span>
        </div>
      `;
      console.error('openLocationGuideModal failed:', error);
    }
  };
})();
</script>

<script id="schedule-player-modal-fix-v2">
(function(){
  if (window.__schedulePlayerModalFixV2__) return;
  window.__schedulePlayerModalFixV2__ = true;

  function getActiveSportName(){
    const activeBtn = document.querySelector('.filter-btn.active[data-sport-name], .filter-chip.active[data-sport-name], .schedule-sport-chip.active[data-sport-name]');
    if (activeBtn && activeBtn.dataset.sportName) return String(activeBtn.dataset.sportName).trim();

    const activeTitle = document.querySelector('#sport-common-detail .section-title, #sport-common-detail .sport-section-title');

      const text = String(activeTitle.textContent || '').trim();
      if (text) return text.replace(/\s*(세부일정|경기일정|명단|정보).*$/, '').trim();
    }
    return '';
  }

  document.addEventListener('click', function(event){
    const btn = event.target.closest('.schedule-card .action-pill.player, .schedule-card .action-pill.referee');
    if (!btn) return;

    const card = btn.closest('.schedule-card');
    const titleEl = card ? card.querySelector('.schedule-match-title, .schedule-event') : null;
    const sport = getActiveSportName();

    if (btn.classList.contains('player') && typeof window.showPlayerFromSchedule === 'function') {
      window.showPlayerFromSchedule(sport, titleEl ? titleEl.textContent.trim() : '');
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation && event.stopImmediatePropagation();
      return;
    }

    if (btn.classList.contains('referee') && typeof window.showRefereeFromSchedule === 'function') {
      const refText = btn.getAttribute('data-ref-text') || '등록된 심판 정보가 없습니다.';
      window.showRefereeFromSchedule(sport, refText);
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation && event.stopImmediatePropagation();
    }
  }, true);
})();
</script>

<script id="sheet-refresh-fix-v1">
(function(){
  if (window.__sheetRefreshFixV1__) return;
  window.__sheetRefreshFixV1__ = true;

  const DYNAMIC_TABS = new Set(['점수','세부경기일정','장소안내','선수단','심판']);
  const CACHE_PREFIXES = ['sports-festival-cache-v26:', 'sports-festival-html-cache-v19:'];

  function clearFestivalCaches(targetTabs){
    try{
      const tabs = Array.isArray(targetTabs) && targetTabs.length ? targetTabs : null;
      const removeKeys = [];
      for (let i = 0; i < localStorage.length; i += 1){
        const key = localStorage.key(i);
        if (!key) continue;
        const isFestivalKey = CACHE_PREFIXES.some(prefix => key.startsWith(prefix));
        if (!isFestivalKey) continue;
        if (!tabs){
          removeKeys.push(key);
          continue;
        }
        const matched = tabs.some(tab => key.includes(tab));
        if (matched) removeKeys.push(key);
      }
      removeKeys.forEach(key => localStorage.removeItem(key));
    }catch(_){}
  }

  clearFestivalCaches(Array.from(DYNAMIC_TABS));

  const originalFetchTabDataCached = window.fetchTabDataCached;
  window.fetchTabDataCached = function(tabName){
    const key = String(tabName || '').trim();
    if (DYNAMIC_TABS.has(key) && typeof fetchTabData === 'function') {
      clearFestivalCaches([key]);
      return Promise.resolve(fetchTabData(key, { force: true }));
    }
    if (typeof originalFetchTabDataCached === 'function') {
      return originalFetchTabDataCached.apply(this, arguments);
    }
    if (typeof fetchTabData === 'function') {
      return Promise.resolve(fetchTabData(key));
    }
    return Promise.resolve([]);
  };

  const originalActivateMainTab = window.activateMainTab;
  if (typeof originalActivateMainTab === 'function') {
    window.activateMainTab = function(key, updateHash){
      clearFestivalCaches(Array.from(DYNAMIC_TABS));
      return originalActivateMainTab.apply(this, arguments);
    };
  }

  const originalActivateSubTab = window.activateSubTab;
  if (typeof originalActivateSubTab === 'function') {
    window.activateSubTab = function(key){
      clearFestivalCaches(Array.from(DYNAMIC_TABS));
      return originalActivateSubTab.apply(this, arguments);
    };
  }

  window.addEventListener('focus', function(){
    clearFestivalCaches(Array.from(DYNAMIC_TABS));
  });

  document.addEventListener('visibilitychange', function(){
    if (!document.hidden) clearFestivalCaches(Array.from(DYNAMIC_TABS));
  });
})();
</script>

<script id="performance-speed-optimizer-v49">
(function(){
  if (window.__speedOptimizerV49__) return;
  window.__speedOptimizerV49__ = true;

  const FAST_PREFIX = 'sports-fast-v49:';
  const DYNAMIC_TTL = 0;
  const STATIC_TTL = 10 * 60 * 1000;
  const BG_REFRESH_GAP = 0;
  const DYNAMIC_TABS = new Set(['점수','세부경기일정','장소안내','선수단','심판','대진표']);
  const mem = new Map();
  const inflight = new Map();
  const lastBg = new Map();

  function now(){ return Date.now(); }
  function ttlFor(tab){ return DYNAMIC_TABS.has(String(tab || '').trim()) ? DYNAMIC_TTL : STATIC_TTL; }
  function storageKey(tab){ return FAST_PREFIX + String(tab || '').trim(); }
  function readStore(tab){
    const key = String(tab || '').trim();
    const ttl = ttlFor(key);
    const m = mem.get(key);
    if (m && (now() - m.savedAt) < ttl && Array.isArray(m.data)) return m.data;
    try {
      const raw = sessionStorage.getItem(storageKey(key));
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.data)) return null;
      if ((now() - Number(parsed.savedAt || 0)) >= ttl) return null;
      mem.set(key, { savedAt: Number(parsed.savedAt || now()), data: parsed.data });
      return parsed.data;
    } catch(_) { return null; }
  }
  function writeStore(tab, data){
    const key = String(tab || '').trim();
    if (!Array.isArray(data)) return;
    const payload = { savedAt: now(), data };
    mem.set(key, payload);
    try { sessionStorage.setItem(storageKey(key), JSON.stringify(payload)); } catch(_) {}
  }
  function shouldBgRefresh(tab){
    const key = String(tab || '').trim();
    const last = Number(lastBg.get(key) || 0);
    if ((now() - last) < BG_REFRESH_GAP) return false;
    lastBg.set(key, now());
    return true;
  }
  function bgRefresh(fn, tab){
    if (!shouldBgRefresh(tab)) return;
    Promise.resolve().then(fn).then((rows) => {
      if (Array.isArray(rows) && rows.length) writeStore(tab, rows);
    }).catch(() => {});
  }

  if (typeof window.fetchTabData === 'function') {
    const originalFetchTabData = window.fetchTabData;
    window.fetchTabData = async function(tabName, options){
      const key = String(tabName || '').trim();
      const force = !!(options && options.force);
      const cached = readStore(key);

      if (cached && !force) {
        bgRefresh(() => originalFetchTabData.call(this, key, options || {}), key);
        return cached;
      }

      if (cached && force && ttlFor(key) <= DYNAMIC_TTL) {
        bgRefresh(() => originalFetchTabData.call(this, key, options || {}), key);
        return cached;
      }

      if (inflight.has(key)) return inflight.get(key);
      const task = Promise.resolve()
        .then(() => originalFetchTabData.call(this, key, options || {}))
        .then((rows) => {

          return rows;
        })
        .finally(() => inflight.delete(key));
      inflight.set(key, task);
      return task;
    };
  }

  if (typeof window.fetchTabDataCached === 'function') {
    const originalFetchTabDataCached = window.fetchTabDataCached;
    window.fetchTabDataCached = function(tabName){
      const key = String(tabName || '').trim();
      const cached = readStore(key);
      if (cached) {
        if (typeof window.fetchTabData === 'function') bgRefresh(() => window.fetchTabData(key), key);
        return Promise.resolve(cached);
      }
      return Promise.resolve(originalFetchTabDataCached.apply(this, arguments)).then((rows) => {
        if (Array.isArray(rows) && rows.length) writeStore(key, rows);
        return rows;
      });
    };
  }

  if (typeof window.getTabData === 'function') {
    const originalGetTabData = window.getTabData;
    window.getTabData = function(tabName){
      const key = String(tabName || '').trim();
      const cached = readStore(key);

        if (typeof window.fetchTabData === 'function') bgRefresh(() => window.fetchTabData(key), key);
        return Promise.resolve(cached);
      }
      return Promise.resolve(originalGetTabData.apply(this, arguments)).then((rows) => {
        if (Array.isArray(rows) && rows.length) writeStore(key, rows);
        return rows;
      });
    };
  }

    ['점수','세부경기일정','선수단','심판','대진표'].forEach((tab, idx) => {
      setTimeout(() => {
        const cached = readStore(tab);
        if (!cached) window.fetchTabData(tab).catch(() => {});
      }, 250 * (idx + 1));
    });
  }

  if ('requestIdleCallback' in window) {
    window.requestIdleCallback(prefetchTabs, { timeout: 1800 });
  } else {
    window.addEventListener('load', () => setTimeout(prefetchTabs, 1200), { once: true });
  }
})();
</script>

<script id="referee-schedule-auto-v59">
(function(){
  if (window.__refereeScheduleAutoV59__) return;
  window.__refereeScheduleAutoV59__ = true;

  function txt(v){
    try { return typeof stripTrueFalseText === 'function' ? stripTrueFalseText(v || '').trim() : String(v || '').trim(); }
    catch(_) { return String(v || '').trim(); }
  }
  function esc(v){
    try { return typeof escapeHtml === 'function' ? escapeHtml(v) : String(v ?? ''); }
    catch(_) { return String(v ?? ''); }
  }
  function searchNorm(v){
    try { return typeof normalizeSearchText === 'function' ? normalizeSearchText(v) : String(v || '').replace(/\s+/g,'').toLowerCase(); }
    catch(_) { return String(v || '').replace(/\s+/g,'').toLowerCase(); }
  }
  function stageLabelFromItem(item){
    try {
      if (typeof getScheduleStageInfo === 'function') {
        const info = getScheduleStageInfo(item.col7, item.col3);
        return info && info.label ? info.label : '';
      }
    } catch(_) {}
    const text = `${txt(item?.col7)} ${txt(item?.col3)}`;
    if (text.includes('준결승') || text.includes('4강')) return '준결승';
    if (text.includes('결승')) return '결승';
    if (text.includes('예선')) return '예선';
    return '';
  }
  function getDetailRows(raw){
    return Array.isArray(raw) ? raw.slice(1) : [];
  }
  let cachePromise = null;
  async function getRefereeScheduleRows(){
    if (cachePromise) return cachePromise;
    cachePromise = (async () => {
      const fetcher = (typeof window.fetchTabDataCached === 'function') ? window.fetchTabDataCached : (typeof fetchTabDataCached === 'function' ? fetchTabDataCached : null);
      if (!fetcher) return [];
      const raw = await fetcher('세부경기일정');
      return getDetailRows(raw).filter(item => {
        const sport = txt(item.col1);
        const time = txt(item.col2);
        const match = txt(item.col3);
        const location = txt(item.col4);
        const referee = txt(item.col5);
        const hasTime = /\d{1,2}\s*[:.]\s*\d{2}/.test(time);
        return !!sport && !!referee && hasTime && (!!match || !!location);
      }).map(item => {
        const sport = txt(item.col1);
        const time = txt(item.col2) || '시간미정';
        const match = txt(item.col3) || '경기 정보 없음';
        const location = txt(item.col4) || '장소미정';
        const referee = txt(item.col5) || '심판 정보 없음';
        const stage = stageLabelFromItem(item);
        const topText = [time, stage, match, sport, location].filter(Boolean).join(' ');
        const searchText = searchNorm([sport, time, stage, match, location, referee].join(' '));
        return { item, sport, time, stage, match, location, referee, topText, searchText };
      });
    })();
    return cachePromise;
  }

  function sortSports(sports){
    const base = Array.isArray(window.SPORTS_LIST) ? window.SPORTS_LIST : [];
    return [...sports].sort((a,b) => {
      const ia = base.indexOf(a);
      const ib = base.indexOf(b);
      if (ia >= 0 && ib >= 0) return ia - ib;
      if (ia >= 0) return -1;
      if (ib >= 0) return 1;
      return String(a).localeCompare(String(b), 'ko');
    });
  }

  function buildRefereeScheduleCardsHTML(rows, sport){
    if (!rows || !rows.length) {
      return createEmptyGuideHTML('등록된 심판 정보가 없습니다.', `${sport || '선택한 종목'} 경기의 심판 정보가 아직 등록되지 않았습니다.`);
    }
    const sorted = [...rows].sort((a,b) => {
      try {
        const am = typeof parseScheduleStartMinutes === 'function' ? parseScheduleStartMinutes(a.time) : 0;
        const bm = typeof parseScheduleStartMinutes === 'function' ? parseScheduleStartMinutes(b.time) : 0;
        if (am !== bm) return am - bm;
      } catch(_) {}
      return String(a.match).localeCompare(String(b.match), 'ko');
    });

    return `<div class="referee-schedule-stack">${sorted.map(row => `
      <div class="referee-schedule-card" data-search-item="true" data-search-text="${esc(row.searchText)}">
        <div class="referee-schedule-top">
          <span class="referee-chip time">${esc(row.time)}</span>
          ${row.stage ? `<span class="referee-chip stage">${esc(row.stage)}</span>` : ''}
          <div class="referee-match-text">${esc(row.match)}</div>
          <span class="referee-chip sport">${esc(row.sport)}</span>
        </div>
        <div class="referee-schedule-bottom">
          <div class="referee-name-text"><span class="referee-name-label">심판</span> ${typeof nl2brSafe === 'function' ? nl2brSafe(row.referee) : esc(row.referee)}</div>
          <span class="referee-chip location">${esc(row.location)}</span>
        </div>
      </div>
    `).join('')}</div>`;
  }

  async function hydrateRefereeButtons(){
    const group = document.getElementById('sport-filter-group');
    if (!group) return;
    const detail = document.getElementById('sport-common-detail');
    const rows = await getRefereeScheduleRows();
    const baseSports = Array.isArray(SPORTS_LIST) && SPORTS_LIST.length
      ? SPORTS_LIST.slice()
      : ['풋살', '축구', '피구(남)', '피구(여)', '빅발리볼', '발야구', '줄다리기', '이어달리기', '8자 줄넘기', '단체줄넘기', '미션달리기', '팔씨름'];
    const excludedSports = new Set(['공식행사']);
    const sportsFromRows = rows
      .map(row => String(row.sport || '').trim())
      .filter(Boolean)
      .filter(sport => !excludedSports.has(sport));
    const orderedBaseSports = baseSports
      .map(sport => String(sport || '').trim())
      .filter(Boolean)
      .filter(sport => !excludedSports.has(sport));
    const extraSports = sportsFromRows.filter(sport => !orderedBaseSports.includes(sport));
    const sports = [...orderedBaseSports, ...extraSports];
    if (!sports.length) {
      group.innerHTML = '';
      if (detail) detail.innerHTML = createEmptyGuideHTML('등록된 심판 일정이 없습니다.', '세부경기일정 시트의 시간, 대진, 장소, 심판 정보를 확인해 주세요.');
      return;
    }
    const sportsFromRowsSet = new Set(sportsFromRows);
    group.innerHTML = sports.map(sport => {
      const hasRows = sportsFromRowsSet.has(sport);
      return `
      <button type="button" class="filter-btn${hasRows ? '' : ' is-empty-sport'}" data-sport-grid-button="true" data-target-tab="심판" data-sport-name="${esc(sport)}" data-is-player-grid="false" data-is-schedule-view="false" data-mode="default" data-inline-click="handleSportFilterClick(this, '심판', '${esc(sport)}', false, false, 'default')">${esc(sport)}</button>`;
    }).join('');
  }

  const originalRenderSportGrid = window.renderSportGrid;
  if (typeof originalRenderSportGrid === 'function') {
    window.renderSportGrid = function(targetTab, isPlayerGrid, isScheduleView, mode){
      const result = originalRenderSportGrid.apply(this, arguments);
      const resolvedMode = mode || 'default';
      if (targetTab === '심판' && !isScheduleView && resolvedMode === 'default') {
        Promise.resolve().then(hydrateRefereeButtons);
        const detail = document.getElementById('sport-common-detail');
        if (detail) {
          detail.innerHTML = createEmptyGuideHTML('종목을 선택해 주세요.', '세부경기일정 시트에서 자동으로 만든 심판 카드가 열립니다.');
        }
      }
      return result;
    };
  }

  const originalHandleSportFilterClick = window.handleSportFilterClick;
  if (typeof originalHandleSportFilterClick === 'function') {
    window.handleSportFilterClick = async function(btn, targetTab, sport, isPlayerGrid, isScheduleView, mode){
      const resolvedMode = mode || 'default';
      if (!(targetTab === '심판' && !isScheduleView && resolvedMode === 'default')) {
        return originalHandleSportFilterClick.apply(this, arguments);
      }
      const container = document.getElementById('sport-common-detail');
      if (!container) return;
      const isAlreadyActive = btn.classList.contains('active');
      document.querySelectorAll('#sport-filter-group .filter-btn').forEach(b => b.classList.remove('active'));
      if (isAlreadyActive) {
        if (typeof resetSportDetailArea === 'function') resetSportDetailArea(targetTab, false, false, resolvedMode);
        return;
      }
      btn.classList.add('active');
      container.innerHTML = '<div class="loader" style="font-size:0.8rem; padding:20px;">심판 일정 불러오는 중...</div>';
      try {
        const rows = await getRefereeScheduleRows();
        const filtered = rows.filter(row => {
          try { return typeof sportEquals === 'function' ? sportEquals(row.sport, sport) : row.sport === sport; }
          catch(_) { return row.sport === sport; }
        });
        container.innerHTML = buildRefereeScheduleCardsHTML(filtered, sport);
        const stack = container.querySelector('.referee-schedule-stack');
        if (stack && typeof prepareSearchItems === 'function') {
          const stackId = `ref-auto-${Date.now()}`;
          stack.id = stackId;
          prepareSearchItems(stackId);
          if (typeof updateSearchInputState === 'function') updateSearchInputState(stackId);
        }
      } catch (e) {
        container.innerHTML = '<div class="loader" style="font-size:0.8rem;">⚠️ 심판 일정을 불러올 수 없습니다.</div>';
      }
    };
  }

  const originalGetGlobalSearchIndex = window.getGlobalSearchIndex || (typeof getGlobalSearchIndex === 'function' ? getGlobalSearchIndex : null);
  if (originalGetGlobalSearchIndex) {
    const wrapped = async function(tabName, mode){
      if (mode !== 'referee') return originalGetGlobalSearchIndex.apply(this, arguments);
      const rows = await getRefereeScheduleRows();
      return rows.map(row => ({
        item: {
          col1: row.sport,
          col2: `${row.time}${row.stage ? ' ' + row.stage : ''}`,
          col3: row.referee,
          col4: `${row.match} / ${row.location}`,
          __autoRefereeSchedule: true,
          __row: row
        },
        searchText: row.searchText
      }));
    };
    window.getGlobalSearchIndex = wrapped;
    try { getGlobalSearchIndex = wrapped; } catch(_) {}
  }

  const originalRenderGlobalRefereeSearchResults = window.renderGlobalRefereeSearchResults || (typeof renderGlobalRefereeSearchResults === 'function' ? renderGlobalRefereeSearchResults : null);
  const newRenderGlobalRefereeSearchResults = function(container, filtered){
    if (!filtered || !filtered.length) {
      container.innerHTML = createEmptyGuideHTML('검색 결과가 없습니다.', '입력한 이름 또는 역할과 일치하는 심판 정보를 찾지 못했습니다. 다른 검색어로 다시 확인해 주세요.');
      return;
    }
    const autoRows = filtered.filter(entry => {
      const row = entry && (entry.__row || (entry.item && entry.item.__row));
      const flag = entry && (entry.__autoRefereeSchedule || (entry.item && entry.item.__autoRefereeSchedule));
      return !!(flag && row);
    }).map(entry => entry.__row || (entry.item && entry.item.__row));
    if (!autoRows.length && originalRenderGlobalRefereeSearchResults) {
      return originalRenderGlobalRefereeSearchResults.apply(this, arguments);
    }
    container.innerHTML = buildRefereeScheduleCardsHTML(autoRows, '');
  };
  window.renderGlobalRefereeSearchResults = newRenderGlobalRefereeSearchResults;
  try { renderGlobalRefereeSearchResults = newRenderGlobalRefereeSearchResults; } catch(_) {}
})();
</script>

      return {
        rosterRows: __rosterFilterDataCache.rosterRows,
        allianceRows: __rosterFilterDataCache.allianceRows
      };
    })();

    try {
      return await __rosterFilterDataCache.loadingPromise;
    } finally {
      __rosterFilterDataCache.loadingPromise = null;
    }
  }

  function prefetchRosterFilterData() {
    loadRosterFilterData().catch(() => {});
  }
  try { if (typeof window !== 'undefined') window.prefetchRosterFilterData = prefetchRosterFilterData; } catch (_) {}

  function buildRosterHtml(result){
    if (!result || !result.success) {
      return `<div class="section-empty-guide"><strong>선수단을 불러오지 못했습니다.</strong><span>${escapeHtml(result?.message || '경기 정보를 다시 확인해 주세요.')}</span></div>`;
    }

    const titleMeta = safeText(result.matchInfo)
      ? `<div style="margin-bottom:10px;font-size:0.82rem;color:var(--text-sub);font-weight:700;">${escapeHtml(result.matchInfo)}</div>`
      : '';

    const sectionsHtml = (result.sections || []).map(section => {
      const classCards = (section.classes || []).map(klass => `
        <div class="roster-card player-referee-style-card" style="margin-top:10px;">
          <div class="roster-card-head player-referee-style-head">
            <div class="player-referee-style-meta">
              <span class="roster-class">${escapeHtml(`${klass.grade} ${klass.classText}`.trim())}</span>
            </div>
            <span class="roster-sport-badge">${escapeHtml(result.sport)}</span>
          </div>
          <div class="roster-player-list player-referee-style-body">${klass.players.length ? escapeHtml(klass.players.join(', ')) : '등록된 선수 정보가 없습니다.'}</div>
        </div>
      `).join('');

      return `
        <div class="unified-info-card" style="padding:14px;">
          <div class="unified-info-card-head" style="margin-bottom:0;">
            <div class="unified-order-badge">팀</div>
            <div>
              <div class="unified-info-label">선수단</div>
              <div class="unified-info-title">${escapeHtml(section.label)}</div>
            </div>
          </div>
          ${classCards || '<div class="unified-info-body">해당 경기로 연결된 반의 선수 명단이 없습니다.</div>'}
        </div>
      `;
    }).join('');

    const pendingHtml = (result.pending || []).length ? `
      <div class="info-notice-box" style="margin-top:10px;">
        <p class="info-notice-text">${result.pending.map(item => `${item.label}는 승자 확정 후 표시됩니다.`).join(' / ')}</p>
      </div>
    ` : '';

    return `
      ${titleMeta}
      <div class="unified-info-stack">${sectionsHtml}</div>
      ${pendingHtml}
    `;
  }

  function shouldUseMatchRoster(type, sport, matchInfo){
    return type === '선수단' && safeText(matchInfo).includes('vs');
  }

  if (typeof window.openDetailInfo === 'function') {
    const originalOpenDetailInfo = window.openDetailInfo;
    window.openDetailInfo = async function(type, sport, matchInfo = '') {
      if (!shouldUseMatchRoster(type, sport, matchInfo)) {
        return originalOpenDetailInfo.apply(this, arguments);
      }

      const modal = document.getElementById('detail-modal');
      const title = document.getElementById('detail-modal-title');
      const content = document.getElementById('detail-modal-content');
      if (!modal || !title || !content) {
        return originalOpenDetailInfo.apply(this, arguments);
      }

      title.textContent = `${sport} 선수단 정보`;
      content.innerHTML = '<div class="loader">데이터를 불러오고 있습니다...</div>';
      modal.style.display = 'flex';

      try {
        const { rosterRows, allianceRows } = await loadRosterFilterData();
        const result = buildRosterResult(sport, matchInfo, rosterRows, allianceRows);
        content.innerHTML = buildRosterHtml(result);

        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          try { window.lucide.createIcons(); } catch (_) {}
        }
      } catch (error) {
        content.innerHTML = '<div class="loader">⚠️ 데이터를 불러오지 못했습니다.</div>';
      }
    };
  }
})();
</script>

  display:flex !important;
  justify-content:flex-end !important;
  align-items:center !important;
  width:100% !important;
}
.schedule-guide-action.schedule-guide-action--top .schedule-guide-btn,
.schedule-guide-action.schedule-guide-action--top .schedule-guide-btn.seat-link-btn{
  margin-left:auto !important;
  margin-right:0 !important;
}
</style>
