        return {
          title: '종목을 선택해 주세요.',
          desc: ''
        };
      }

      return {
        title: '종목을 선택해 주세요.',
        desc: '종목 버튼을 누르면 해당 종목의 세부 정보가 카드형으로 열립니다.'
      };
    }

    function getSportGridDefaultDetailHTML(targetTab, isPlayerGrid = false, isScheduleView = false, mode = 'default') {
      if (!shouldUseSportSelectGuide(targetTab, mode)) return '';
      return createSportSelectGuideHTML(targetTab, mode);
    }

    function shouldUseSportSelectGuide(targetTab, mode = 'default') {
      return mode === 'rule' || mode === 'bracket' || targetTab === '선수단' || targetTab === '심판';
    }

    function createSportSelectGuideHTML(targetTab, mode = 'default') {
      const guideText = getSportSelectGuideText(targetTab, mode);
      return `
        <div id="sport-select-guide" class="sport-select-guide">
          <h3 class="sport-select-guide-title">${guideText.title}</h3>
        </div>
      `;
    }

    function updateSportSelectGuideVisibility(visible) {
      const guide = document.getElementById('sport-select-guide');
      if (!guide) return;
      guide.classList.toggle('hidden', !visible);
    }

    function resetSportDetailArea(targetTab, isPlayerGrid = false, isScheduleView = false, mode = 'default') {
      const container = document.getElementById('sport-common-detail');
      if (!container) return;
      container.innerHTML = getSportGridDefaultDetailHTML(targetTab, isPlayerGrid, isScheduleView, mode);
      updateSportSelectGuideVisibility(shouldUseSportSelectGuide(targetTab, mode));
    }

    function bindScheduleActionButtons(container) {
      if (!container || container.dataset.scheduleActionsBound === 'true') return;

      container.addEventListener('click', (event) => {
        const btn = event.target.closest('[data-role]');
        if (!btn || !container.contains(btn)) return;

        const sport = base64ToUtf8(btn.dataset.sport64 || '');

        if (btn.dataset.role === 'player') {
          const matchInfo = base64ToUtf8(btn.dataset.match64 || '');
          openDetailInfo('선수단', sport, matchInfo);
          return;
        }

        if (btn.dataset.role === 'referee') {
          const refContent = base64ToUtf8(btn.dataset.ref64 || '');
          showRefereeFromSchedule(sport, refContent);
        }
      });

      container.dataset.scheduleActionsBound = 'true';
    }

    function normalizeScheduleDayValue(value = '') {
      return String(value || '').replace(/\s+/g, '').trim();
    }

    function getScheduleDayKey(item = {}) {
      const directCandidates = [item.col8, item.col9, item.day, item.dateLabel, item.dayLabel].filter(Boolean);
      for (const value of directCandidates) {
        const normalized = normalizeScheduleDayValue(value);
        if (!normalized) continue;
        if (/(1일차|1일|day1|d1|첫째날|첫날)/i.test(normalized)) return 'day1';
        if (/(2일차|2일|day2|d2|둘째날|둘째|다음날)/i.test(normalized)) return 'day2';
      }

      const textCandidates = [item.col7, item.col6, item.col5, item.col4, item.col3, item.col2, item.col1].filter(Boolean);
      for (const value of textCandidates) {
        const normalized = normalizeScheduleDayValue(value);
        if (!normalized) continue;
        if (/(1일차|1일|day1|d1)/i.test(normalized)) return 'day1';
        if (/(2일차|2일|day2|d2)/i.test(normalized)) return 'day2';
      }
      return '';
    }

    function getScheduleDayLabel(item = {}) {
      const key = getScheduleDayKey(item);
      if (key === 'day1') return '1일차';
      if (key === 'day2') return '2일차';
      return '';
    }

    function getScheduleDetailDefaultDay(rows = []) {
      const availableDays = Array.from(new Set((rows || []).map(getScheduleDayKey).filter(Boolean)));
      try {
        const saved = sessionStorage.getItem('festival_schedule_detail_day');
        if (saved && availableDays.includes(saved)) return saved;
      } catch (_) {}
      if (availableDays.includes('day1')) return 'day1';
      if (availableDays.includes('day2')) return 'day2';
      return '';
    }

    function buildScheduleDayTabsHTML(rows = [], hintText = '상단에서 1일차 또는 2일차를 선택해 주세요.') {
      const availableDays = Array.from(new Set((rows || []).map(getScheduleDayKey).filter(Boolean)));
      if (availableDays.length < 2) return '';

      const defaultDay = getScheduleDetailDefaultDay(rows);
      return `
        <div class="schedule-day-tabs">
          <button class="schedule-day-btn ${defaultDay === 'day1' ? 'active' : ''}" type="button" data-day="day1" data-inline-click="switchScheduleDay('day1', this)">1일차</button>
          <button class="schedule-day-btn ${defaultDay === 'day2' ? 'active' : ''}" type="button" data-day="day2" data-inline-click="switchScheduleDay('day2', this)">2일차</button>
        </div>
        <div class="schedule-day-hint">${escapeHtml(hintText)}</div>
      `;
    }

    function wrapSchedulePanelsByDay(rows = [], renderPanel) {
      const availableDays = Array.from(new Set((rows || []).map(getScheduleDayKey).filter(Boolean)));
      if (availableDays.length < 2) {
        return renderPanel(rows, '');
      }

      const defaultDay = getScheduleDetailDefaultDay(rows);
      return availableDays.map(dayKey => {
        const dayRows = rows.filter(item => getScheduleDayKey(item) === dayKey);
        if (!dayRows.length) return '';
        const dayLabel = dayKey === 'day1' ? '1일차' : '2일차';
        return `
          <section class="schedule-day-panel ${defaultDay === dayKey ? 'active' : ''}" data-schedule-day="${dayKey}">
            <div class="schedule-day-header">
              <div class="schedule-day-title">${dayLabel} 경기 일정</div>
              <span class="schedule-day-badge ${dayKey}">${dayLabel}</span>
            </div>
            ${renderPanel(dayRows, dayKey)}
          </section>
        `;
      }).join('');
    }

    function buildScheduleCardsHTML(filtered, sport, options = {}) {
      const showSportBadge = !!options.showSportBadge;
      const emptyTitle = options.emptyTitle || '조회된 일정이 없습니다.';
      const emptyDesc = options.emptyDesc || `${sport} 종목의 세부 일정이 아직 등록되지 않았습니다.`;
      if (!filtered || filtered.length === 0) {
        return createEmptyGuideHTML(emptyTitle, emptyDesc);
      }

      return `
        <div class="schedule-stack">
          ${filtered.map((item) => {
            const rawRefData = stripTrueFalseText(item.col5) || '등록된 심판 정보가 없습니다.';
            const matchInfo = item.col3 || '등록된 경기 정보가 없습니다.';
            const location = item.col4 || '장소미정';
            const time = item.col2 || '시간미정';
            const itemSport = item.col1 || sport || '';
            const stageInfo = getScheduleStageInfo(item.col7, matchInfo);
            const dayLabel = getScheduleDayLabel(item);
            const dayKey = getScheduleDayKey(item);

            return `
              <div class="schedule-card">
                <div class="schedule-inline-row">
                  <div class="schedule-top-row">
                    <div class="schedule-main">
                      <div class="schedule-time-badge">${escapeHtml(time)}</div>
                      <div class="schedule-match-title">${escapeHtml(matchInfo)}</div>
                    </div>
                    ${showSportBadge && itemSport ? `<span class="schedule-stage-badge prelim">${escapeHtml(itemSport)}</span>` : ''}
                    ${dayLabel ? `<span class="schedule-day-badge ${dayKey} schedule-day-badge-top">${escapeHtml(dayLabel)}</span>` : ''}
                  </div>
                  <div class="schedule-bottom-row detail-meta-row">
                    <div class="meta-left">
                      ${stageInfo ? `<span class="schedule-stage-badge ${stageInfo.className}">${escapeHtml(stageInfo.label)}</span>` : ''}
                      <button
                      type="button"
                      class="meta-pill location schedule-location-btn"
                      data-action-spec='{"action":"openLocationGuideModal","args":["${escapeHtml(String(location || ""))}"],"stop":true}'
                    >${escapeHtml(location)}</button>
                    </div>
                    <div class="meta-right">
                      <button
                        type="button"
                        class="action-pill player"
                        data-role="player"
                        data-action-spec='{"action":"showPlayerFromSchedule","args":["${escapeHtml(String(itemSport || ''))}","${escapeHtml(String(matchInfo || ''))}"],"stop":true}'
                      >선수단</button>
                      <button
                        type="button"
                        class="action-pill referee"
                        data-role="referee"
                        data-action-spec='{"action":"showRefereeFromSchedule","args":["${escapeHtml(String(itemSport || ''))}","${escapeHtml(String(rawRefData || ''))}"],"stop":true}'
                      >심판</button>
                    </div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function getScheduleStageInfo(stageValue, matchInfo) {
      const stageText = String(stageValue || '').replace(/\s+/g, ' ').trim();
      const matchText = String(matchInfo || '').replace(/\s+/g, ' ').trim();
      const text = stageText || matchText;
      if (!text) return null;

      if (text.includes('준결승') || text.includes('4강') || text.toLowerCase().includes('semi')) {
        return { label: '준결승', className: 'semi' };
      }
      if (text.includes('결승') || text.toLowerCase().includes('final')) {
        return { label: '결승', className: 'final' };
      }
      if (text.includes('예선') || text.toLowerCase().includes('prelim')) {
        return { label: '예선', className: 'prelim' };
      }
      return null;
    }

    function renderScheduleList(container, filtered, sport) {
      container.innerHTML = buildScheduleCardsHTML(filtered, sport);
      bindScheduleActionButtons(container);
    }

    function renderScheduleGradeFilter(container, filtered, sport) {
      const grades = ['1학년', '2학년', '3학년'];

      const renderGradeFilterBlock = (rows, dayKey = '') => {
        const listId = createUID('schedule-grade-content');
        scheduleGradeDataCache[listId] = rows || [];

        let html = `<div class="schedule-grade-tabs">`;
        grades.forEach(g => {
          html += `<button class="schedule-grade-btn ${currentScheduleGrade === g ? 'active' : ''}" data-target="${listId}" data-inline-click="event.stopPropagation(); updateScheduleGradeFilter('${g}', '${sport}', '${listId}', this)">${g}</button>`;
        });
        html += `</div>`;
        html += `<div id="${listId}"></div>`;
        return html;
      };

      const availableDays = Array.from(new Set((filtered || []).map(getScheduleDayKey).filter(Boolean)));
      if (availableDays.length >= 2) {
        const dayTabsHtml = buildScheduleDayTabsHTML(filtered, '일차를 먼저 고른 뒤 학년 버튼을 누르면 세부 경기가 열립니다.');
        const panelsHtml = wrapSchedulePanelsByDay(filtered, (rows, dayKey) => renderGradeFilterBlock(rows, dayKey));
        container.innerHTML = `${dayTabsHtml}${panelsHtml}`;

        availableDays.forEach(dayKey => {
          const dayRows = filtered.filter(item => getScheduleDayKey(item) === dayKey);
          const panel = container.querySelector(`.schedule-day-panel[data-schedule-day="${dayKey}"]`);
          const listEl = panel ? panel.querySelector('[id^="schedule-grade-content"]') : null;
          if (listEl) updateScheduleGradeFilter(currentScheduleGrade, sport, listEl.id);
        });
        return;
      }

      const listId = createUID('schedule-grade-content');
      scheduleGradeDataCache[listId] = filtered || [];

      let html = `<div class="schedule-grade-tabs">`;
      grades.forEach(g => {
        html += `<button class="schedule-grade-btn ${currentScheduleGrade === g ? 'active' : ''}" data-target="${listId}" data-inline-click="event.stopPropagation(); updateScheduleGradeFilter('${g}', '${sport}', '${listId}', this)">${g}</button>`;
      });
      html += `</div>`;
      html += `<div id="${listId}"></div>`;

      container.innerHTML = html;
      updateScheduleGradeFilter(currentScheduleGrade, sport, listId);
    }

    function updateScheduleGradeFilter(grade, sport, listId, btn = null) {
      const buttons = document.querySelectorAll(`.schedule-grade-btn[data-target="${listId}"]`);
      const isAlreadyActive = !!btn && btn.classList.contains('active');
      currentScheduleGrade = grade;

      buttons.forEach(button => {
        button.classList.toggle('active', !isAlreadyActive && button.textContent === grade);
      });

      const listContainer = document.getElementById(listId);
      if (!listContainer) return;

      if (isAlreadyActive) {
        listContainer.innerHTML = '';
        return;
      }

      const data = scheduleGradeDataCache[listId] || [];
      const filtered = data.filter(item => getScheduleGrade(item) === grade);

      if (!filtered.length) {
        listContainer.innerHTML = createEmptyGuideHTML(`${grade} 일정이 없습니다.`, `${sport} ${grade} 경기 일정이 아직 등록되지 않았습니다.`);
        return;
      }

      listContainer.innerHTML = buildScheduleCardsHTML(filtered, sport);
      bindScheduleActionButtons(listContainer);
      const gradeTabs = document.querySelector(`.schedule-grade-tabs button[data-target="${listId}"]`)?.closest('.schedule-grade-tabs');
      if (gradeTabs) gradeTabs.classList.add('schedule-hidden-after-select');
    }

    
    function showPlayerFromSchedule(sport, matchInfo) {
      return openDetailInfo('선수단', sport, matchInfo || '');
    }

function showRefereeFromSchedule(sport, refContent) {
      const modal = document.getElementById('detail-modal');
      const title = document.getElementById('detail-modal-title');
      const content = document.getElementById('detail-modal-content');
      const targetId = createUID('referee-search');

      title.textContent = `${sport} 심판진 정보`;
      content.innerHTML = buildSearchableRefereeHTML(refContent, targetId, sport);
      modal.style.display = 'flex';
    }

    /* 규칙 헬퍼 */
    function normalizeRuleType(value = '') {
      const v = String(value).trim().toLowerCase();
      if (!v) return '';
      if (['summary', 'sum', '요약', '핵심', '카드', 'info'].includes(v)) return 'summary';
      if (['section', 'setction', 'sectoin', 'detail', '상세', '규칙', '항목', '본문'].includes(v)) return 'section';
      if (['meta', '설명', '소개', '안내'].includes(v)) return 'meta';
      if (['warning', 'warnning', '주의', '경고'].includes(v)) return 'warning';
      return '';
    }

    function isRuleSummaryTitle(title = '') {
      const t = String(title).trim();
      return [
        '인원', '경기 인원', '참가 인원',
        '시간', '경기 시간',
        '승패', '승패 방식',
        '장소', '복장', '대상',
        '방식', '진행 방식', '진행방식'
      ].includes(t);
    }

    function isRuleMetaTitle(title = '') {
      const t = String(title).trim();
      return ['한줄요약', '핵심요약', '핵심', '요약', '안내'].includes(t);
    }

    function splitRuleText(text = '') {
      return String(text)
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/\r/g, '\n')
        .split(/\n+/)
        .map(line => line.replace(/^[•·\-※\s]+/, '').trim())
        .filter(Boolean);
    }

    function getDefaultRuleSectionTitle(type, tone = 'normal') {
      if (tone === 'warning' || type === 'warning') return '주의사항';
      if (type === 'section') return '경기 규칙';
      return '안내';
    }

    function buildRuleViewModel(filtered) {
      const rows = (filtered || []).map((item, index) => {
        const col2 = (item.col2 || '').trim();
        const col3 = (item.col3 || '').trim();
        const col4 = (item.col4 || '').trim();
        const col5 = (item.col5 || '').trim();
        const col6 = (item.col6 || '').trim();
        const col7 = (item.col7 || '').trim();

        const explicitType = normalizeRuleType(col2);

        let type = 'section';
        let title = '';
        let content = '';
        let badge = '';
        let tone = 'normal';
        let order = index;

        if (explicitType) {
          const isWarningType = explicitType === 'warning';
          type = isWarningType ? 'section' : explicitType;
          tone = (isWarningType || /warning|주의|경고/i.test(col6)) ? 'warning' : 'normal';
          badge = col5 || '';
          const parsedOrder = parseInt(col7, 10);
          order = Number.isNaN(parsedOrder) ? index : parsedOrder;

          if (explicitType === 'meta') {
            title = '한줄요약';
            content = col4 || col3 || '';
          } else if (explicitType === 'summary') {
            if (col4) {
              title = col3 || `항목 ${index + 1}`;
              content = col4;
            } else {
              const parts = col3.split(/[:：]/);
              if (parts.length >= 2) {
                title = parts.shift().trim() || `항목 ${index + 1}`;
                content = parts.join(':').trim();
              } else {
                title = `항목 ${index + 1}`;
                content = col3;
              }
            }
          } else {
            if (col4) {
              title = col3 || getDefaultRuleSectionTitle(explicitType, tone);
              content = col4;
            } else {
              title = getDefaultRuleSectionTitle(explicitType, tone);
              content = col3;
            }
          }
        } else {
          title = col2 || `규칙 ${index + 1}`;
          content = col3 || '';
          badge = '';
          order = index;

          if (isRuleMetaTitle(title)) type = 'meta';
          else if (isRuleSummaryTitle(title)) type = 'summary';
          else type = 'section';

          if (/주의|경고|실격|반칙|금지/.test(title)) tone = 'warning';
        }

        return { type, title, content, badge, tone, order };
      }).sort((a, b) => a.order - b.order);

      const summary = [];
      const sections = [];
      let description = '';
      let heroBadge = '';

      rows.forEach(row => {
        if (row.type === 'meta') {
          if (!description && row.content) description = row.content;
          if (!heroBadge && row.badge) heroBadge = row.badge;
          return;
        }

        if (row.type === 'summary') {
          if (row.content) {
            summary.push({
              label: row.title,
              value: row.content
            });
          }
          return;
        }

        let section = sections.find(item => item.title === row.title && item.tone === row.tone);

        if (!section) {
          section = {
            title: row.title || (row.tone === 'warning' ? '주의사항' : '경기 규칙'),
            tone: row.tone || 'normal',
            badge: row.badge || '',
            items: []
          };
          sections.push(section);
        }

        if (row.badge && !section.badge) {
          section.badge = row.badge;
        }

        const items = splitRuleText(row.content);
        if (items.length > 0) {
          section.items.push(...items);
        } else if (row.content) {
          section.items.push(row.content);
        }
      });

      return {
        description: description || '아래 핵심 규칙과 상세 내용을 순서대로 확인해 주세요.',
        heroBadge: heroBadge || `총 ${sections.length}개 항목`,
        summary: summary.slice(0, 4),
        sections
      };
    }

    function createRuleSummaryHTML(summary) {
      if (!summary || summary.length === 0) return '';
      return `
        <div class="rule-summary-grid">
          ${summary.map(item => `
            <div class="rule-summary-box">
              <span class="rule-summary-label">${escapeHtml(item.label)}</span>
              <strong class="rule-summary-value">${escapeHtml(item.value)}</strong>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderRuleList(container, filtered, sport = '') {
      if (!filtered || filtered.length === 0) {
        container.innerHTML = createEmptyGuideHTML('등록된 규칙이 없습니다.', `아직 ${sport || '해당 종목'} 규칙 데이터가 등록되지 않았습니다.`);
        return;
      }

      const model = buildRuleViewModel(filtered);

      container.innerHTML = `

          )}

          <div class="rule-section-list">
            ${model.sections.length > 0 ? model.sections.map(section => `
              <div class="rule-section-card ${section.tone === 'warning' ? 'warning' : ''}">
                <div class="rule-section-title-row">
                  <div class="rule-section-title">${escapeHtml(section.title)}</div>
                  ${section.badge ? `<em class="rule-section-badge">${escapeHtml(section.badge)}</em>` : ''}
                </div>
                <ul class="rule-section-list-ul">
                  ${section.items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
                </ul>
              </div>
            `).join('') : createEmptyGuideHTML('상세 규칙이 아직 등록되지 않았습니다.', '시트에 규칙 데이터를 추가하면 이 영역에 자동으로 표시됩니다.')}
          </div>
        </div>
      `;
    }

    async function openDetailInfo(type, sport, matchInfo = '') {
      const modal = document.getElementById('detail-modal');
      const title = document.getElementById('detail-modal-title');
      const content = document.getElementById('detail-modal-content');

      title.textContent = `${sport} ${type} 정보`;
      content.innerHTML = '<div class="loader">데이터를 불러오고 있습니다...</div>';
      modal.style.display = 'flex';

      try {
        const res = await fetch(`${SCRIPT_URL}?tab=${encodeURIComponent(type)}`);
        const data = await res.json();

        if (type === '선수단') {
          const classes = matchInfo.match(/\d+-\d+/g) || [];

          if (classes.length > 0) {
            const filtered = dedupeRosterRows(data.filter(item => {
              const itemSport = (item.col1 || '').trim();
              const itemClass = (item.col2 || '').trim();
              return sportEquals(itemSport, sport) && classes.some(cls => itemClass.includes(cls));
            }));
            renderClassCards(content, filtered, sport, false);
          } else if (isGradeFilterSport(sport)) {
            renderGradeFilterAndList(content, data, sport);
          } else {
            const filtered = dedupeRosterRows(data.filter(item => sportEquals(item.col1 || '', sport)));
            renderClassCards(content, filtered, sport, false);
          }
        } else {
          const filtered = data.filter(item => sportEquals(item.col1 || '', sport));
          renderSubList(content, filtered, sport, type);
        }
      } catch (e) {
        content.innerHTML = '<div class="loader">⚠️ 데이터를 불러오는데 실패했습니다.</div>';
      }
    }

    function getCachedPlayerRows(data, sport, grade = '') {
      const cacheKey = `${sport}__${grade || 'all'}`;
      if (playerGradeFilterCache[cacheKey]) return playerGradeFilterCache[cacheKey];

      const gradeDigit = grade ? grade.charAt(0) : '';
      const rows = dedupeRosterRows((data || []).filter(item => {
        const sportMatched = sportEquals(item.col1 || '', sport);
        if (!sportMatched) return false;
        if (!gradeDigit) return true;
        return String(item.col2 || '').startsWith(`${gradeDigit}-`);
      }));

      playerGradeFilterCache[cacheKey] = rows;
      return rows;
    }

    function renderGradeFilterAndList(container, data, sport) {
      const grades = ['1학년', '2학년', '3학년'];
      const listId = `grade-content-list-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      gradeDataCache[listId] = data || null;

      let html = `<div class="player-grade-tabs">`;
      grades.forEach(g => {
        html += `<button class="grade-btn ${currentPlayerGrade === g ? 'active' : ''}" data-target="${listId}" data-inline-click="event.stopPropagation(); updateGradeFilter('${g}', '${sport}', null, '${listId}', this)">${g}</button>`;
      });
      html += `</div><div id="${listId}"></div>`;

      container.innerHTML = html;
      updateGradeFilter(currentPlayerGrade, sport, data, listId);
    }

    async function updateGradeFilter(grade, sport, cachedData = null, listId = 'grade-content-list', btn = null) {
      const buttons = document.querySelectorAll(`.grade-btn[data-target="${listId}"]`);
      const isAlreadyActive = !!btn && btn.classList.contains('active');
      currentPlayerGrade = grade;

      buttons.forEach(b => {
        b.classList.toggle('active', !isAlreadyActive && b.textContent === grade);
      });

      const listContainer = document.getElementById(listId);
      if (!listContainer) return;

      if (isAlreadyActive) {
        listContainer.innerHTML = '';
        return;
      }

      listContainer.innerHTML = '<div class="loader" style="font-size:0.75rem;">로딩 중...</div>';

      try {
        let data;
        if (cachedData) {
          data = cachedData;
        } else if (gradeDataCache[listId]) {
          data = gradeDataCache[listId];
        } else {
          const res = await fetch(`${SCRIPT_URL}?tab=선수단`);
          data = await res.json();
          gradeDataCache[listId] = data;
        }

        const filtered = getCachedPlayerRows(data, sport, grade);
        renderClassCards(listContainer, filtered, sport, false);
      } catch (e) {
        listContainer.innerHTML = '⚠️ 데이터 오류';
      }
    }

        return;

      }

    function extractScheduleImageMeta(data, fallbackTitle = '연합팀 좌석 배치') {
      if (!Array.isArray(data) || data.length <= 1) return null;

      const rows = data.slice(1);
      const findImageCandidate = (row = {}) => {
        const candidates = [row.col5, row.col6, row.col7]
          .map(value => String(value || '').trim())
          .filter(Boolean);
        return candidates.find(value => {
          if (!value || isLikelyPlaceholderImageText(value)) return false;
          return isProbablyImageUrl(value) || /^[A-Za-z0-9_-]{20,}$/.test(value);
        }) || '';
      };

      const imageRow = rows.find(item => !!findImageCandidate(item)) || null;
      if (!imageRow) return null;

      const rawUrl = findImageCandidate(imageRow);
      const normalizedUrl = normalizeImageUrl(rawUrl);
      if (!normalizedUrl) return null;

      return {
        title: String(imageRow.col6 || imageRow.col4 || imageRow.col3 || fallbackTitle || '연합팀 좌석 배치').trim(),
        url: normalizedUrl,
        sourceUrl: rawUrl
      };
    }

    function extractDetailScheduleGuideMeta(rows = [], fallbackTitle = '경기장 안내') {
      if (!Array.isArray(rows) || !rows.length) return null;

      const findImageCandidate = (row = {}) => {
        const raw = String(row.col8 || '').trim();
        if (!raw || isLikelyPlaceholderImageText(raw)) return '';
        if (isProbablyImageUrl(raw) || /^[A-Za-z0-9_-]{20,}$/.test(raw)) return raw;
        return '';
      };

      const images = rows
        .map((row, index) => {
          const rawUrl = findImageCandidate(row);
          if (!rawUrl) return null;
          const normalizedUrl = normalizeImageUrl(rawUrl);
          if (!normalizedUrl) return null;
          return {
            index,
            title: String(row.col9 || row.col3 || row.col1 || fallbackTitle || '경기장 안내').trim(),
            url: normalizedUrl,
            sourceUrl: rawUrl
          };
        })
        .filter(Boolean);

      if (!images.length) return null;

      return {
        title: fallbackTitle || '경기장 안내',
        url: images[0]?.url || '',
        sourceUrl: images[0]?.sourceUrl || '',
        images
      };
    }

    function buildDetailScheduleGuideHtml(images = []) {
      if (!Array.isArray(images) || !images.length) {
        return `
          <div class="section-empty-guide" style="margin: 0;">
            <strong style="font-size:1.15rem; line-height:1.25;">등록된 경기장 안내 이미지가 없습니다.</strong>
            <span>세부경기일정 시트의 col8에 이미지 링크 또는 구글드라이브 파일 ID를 넣어 주세요.</span>
          </div>
        `;

      const itemsHtml = images.map((item, idx) => `

    function buildRaceBracketHTML(filtered, sportTitle = '') {
      const isJump = false;
      const isCompactWinnerSport = String(sportTitle || '').includes('팔씨름');
      const rows = uniqueRows(filtered).filter((item) => normalizeCell(item?.col2));
      const stageText = (value) => String(value == null ? '' : value).replace(/\s+/g, ' ').trim();
      const rankNum = (item) => {
        const meta = extractRelayMeta(item);
        const raw = String(meta.rankText || '').replace(/\D/g, '');
        const n = parseInt(raw, 10);
        return Number.isFinite(n) ? n : 999;
      };
      const hasStageLabels = rows.some((item) => /^(?:예선|준결승|결승)$/u.test(stageText(item?.col5)));

      const prelimRows = hasStageLabels
        ? rows.filter((item) => /^(?:예선|준결승)$/u.test(stageText(item?.col5)))
        : rows.slice(0, 7);

      const manualFinalTeams = hasStageLabels
        ? rows.filter((item) => /^결승$/u.test(stageText(item?.col5)))
        : rows.slice(7, 11).filter((item) => normalizeCell(item?.col2));

      const heat1 = prelimRows.slice(0, Math.min(4, prelimRows.length));
      const heat2 = prelimRows.slice(Math.min(4, prelimRows.length));
      const heats = [
        { key: '', teams: heat1, badge: `${heat1.length}팀 경기` },
        { key: '', teams: heat2, badge: `${heat2.length}팀 경기` }
      ].filter((heat) => (heat.teams || []).length > 0);

      const autoFinalTeams = collectRelayAdvanceTeams(heats);
      const finalTeams = (manualFinalTeams.length ? manualFinalTeams : autoFinalTeams)
        .filter((item) => normalizeCell(item?.col2))
        .sort((a, b) => rankNum(a) - rankNum(b))
        .slice(0, 4);

      const champion = finalTeams.find((item) => rankNum(item) === 1)?.col2 || '결과 입력 대기';

      const heatCards = heats.map((heat, heatIndex) => `
        <div class="race-stage-card">
          <div class="race-stage-head">
            <div>
              <div class="race-stage-kicker">HEAT ${heatIndex + 1}</div>
              <div class="race-stage-title"></div>
            </div>
            <span class="race-stage-badge">${heat.badge}</span>
          </div>
          <div class="race-team-stack">
            ${heat.teams.map((team, idx) => createRaceHeatTeamHTML(team, idx)).join('')}
          </div>
          <div class="race-advance-note">각 조 상위 2팀 결승 진출</div>
        </div>
      `).join('');

      return `
        <div class="bracket-panel${isJump ? ' jump-result-panel' : ''}${isCompactWinnerSport ? ' compact-winner-bracket' : ''}">
          <div class="race-bracket-board">
            ${heatCards}
            <div class="race-stage-card final">
              <div class="race-stage-head">
                <div>
                  <div class="race-stage-kicker">FINAL</div>
                  <div class="race-stage-title">결승</div>
                </div>
                <span class="race-stage-badge">${finalTeams.length || 0}팀 결승</span>
              </div>
              <div class="race-team-stack">
                ${finalTeams.length ? finalTeams.map((team, idx) => createRaceFinalTeamHTML(team, idx)).join('') : '<div class="race-team-empty">결승 진출 팀이 아직 없습니다.</div>'}
              </div>
            </div>
            <div class="race-champion-banner${isCompactWinnerSport ? ' compact-winner-banner' : ''}">
              <div class="race-champion-copy">
                <div class="race-champion-label"><span class="trophy-icon" aria-hidden="true"></span>CHAMPION</div>
                <div class="race-champion-name">${escapeHtml(champion)}</div>
                <div class="race-champion-desc">결승 1위 팀을 우승팀으로 표시합니다.</div>
              </div>
              <div class="race-team-status champion">우승</div>
            </div>
          </div>
        </div>
      `;
    }

    function parseRankingNumber(value = '', sportTitle = '') {
      const raw = String(value || '').trim();
      if (!raw) return Number.POSITIVE_INFINITY;
      const sport = String(sportTitle || '').trim();
      if (sport.includes('미션달리기')) {
        const rankMatch = raw.match(/(\d+)\s*위/);
        if (rankMatch) return Number(rankMatch[1]);
      }
      const numeric = raw.replace(/,/g, '').match(/-?\d+(?:\.\d+)?/);
      if (numeric) return Number(numeric[0]);
      const rankMatch = raw.match(/(\d+)\s*위/);
      if (rankMatch) return Number(rankMatch[1]);
      return Number.POSITIVE_INFINITY;
    }

    function buildResultRankingHTML(filtered, sportTitle = '') {
      const sport = String(sportTitle || '').trim();
      const isJump = sport.includes('8자 줄넘기') || sport.includes('단체줄넘기');
      const isMission = sport.includes('미션달리기');
      const useJumpStyle = isJump || isMission;
      const rows = (filtered || []).filter((item) => normalizeCell(item?.col2));
      const decorated = rows.map((item, index) => {
        const rawResultText = normalizeCell(item?.col3);
        const hasResult = !!rawResultText && !/^(?:기록\s*미입력|순위\s*미입력|미입력|경기전)$/u.test(rawResultText);
        const resultText = hasResult ? rawResultText : '';
        const detailText = normalizeCell(item?.col4);
        return {
          item,
          index,
          team: normalizeCell(item?.col2) || `팀 ${index + 1}`,
          resultText,
          detailText,
          hasResult,
          sortValue: parseRankingNumber(resultText, sport),
        };
      });

      decorated.sort((a, b) => {
        const av = a.sortValue;
        const bv = b.sortValue;
        if (Number.isFinite(av) && Number.isFinite(bv)) {
          if (isMission) return av - bv || a.index - b.index;
          return bv - av || a.index - b.index;
        }
        if (Number.isFinite(av)) return -1;
        if (Number.isFinite(bv)) return 1;
        return a.index - b.index;
      });

      const champion = decorated.find((entry, idx) => entry.hasResult && idx === 0)?.team || '결과 입력 대기';
      const desc = isJump
        ? '입력된 기록이 가장 높은 학급을 우승팀으로 표시합니다.'
        : '입력된 순위가 1위인 학급을 우승팀으로 표시합니다.';
      const badge = isJump ? '최고 기록 우승' : '1위 우승';
      const valueLabel = isJump ? '기록' : '순위';

      return `
        <div class="bracket-panel${useJumpStyle ? ' compact-winner-panel' : ''}">
          <div class="race-bracket-board">
            <div class="race-stage-card final">
              <div class="race-stage-head compact-result-head">
                <div class="compact-result-topline">
                  <div class="race-stage-kicker">RESULT</div>
                  <span class="race-stage-badge">${escapeHtml(badge)}</span>
                </div>
                <div class="race-stage-title">${escapeHtml(sport)}</div>
              </div>
              <div class="race-team-stack">
                ${decorated.map((entry, idx) => {
                  const rank = idx + 1;
                  const rankClass = rank <= 3 ? ` final-rank-${rank}` : '';
                  const statusClass = rank === 1 ? ' champion' : '';
                  const statusText = rank === 1 ? '우승' : `${rank}위`;
                  const subText = entry.detailText;
                  const recordBadge = entry.hasResult
                    ? `<div class="jump-record-badge"><span class="jump-record-badge-label">${escapeHtml(valueLabel)}</span><span class="jump-record-badge-value">${escapeHtml(entry.resultText)}</span></div>`
                    : '';
                  const inlineNote = [entry.hasResult ? `${valueLabel} ${entry.resultText}` : '', entry.detailText].filter(Boolean).join(' · ');
                  return `
                    <div class="race-team-card${rankClass}${useJumpStyle ? ' jump-record-card' : ''}">
                      <div class="race-rank-chip">${rank}</div>
                      <div class="race-team-main">
                        <div class="race-team-name">${escapeHtml(entry.team)}</div>
                        ${useJumpStyle
                          ? `${recordBadge}${subText ? `<div class="race-team-note">${escapeHtml(subText)}</div>` : ''}`
                          : `${inlineNote ? `<div class="race-team-note">${escapeHtml(inlineNote)}</div>` : ''}`}
                      </div>
                      <div class="race-team-status${statusClass}">${escapeHtml(statusText)}</div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
            <div class="race-champion-banner${useJumpStyle ? ' compact-winner-banner' : ''}">
              <div class="race-champion-copy">
                <div class="race-champion-label"><span class="trophy-icon" aria-hidden="true"></span>CHAMPION</div>
                <div class="race-champion-name">${escapeHtml(champion)}</div>
                <div class="race-champion-desc">${escapeHtml(desc)}</div>
              </div>
              <div class="race-team-status champion">우승</div>
            </div>
          </div>
        </div>
      `;
    }

    function normalizeRelayRankText(text) {
      const raw = text == null ? '' : String(text).trim();
      if (!raw) return '';
      if (/^(?:우승|준우승)$/u.test(raw)) return raw;
      const pureNum = raw.match(/^(\d+)$/);
      if (pureNum) return `${pureNum[1]}위`;
      const numRank = raw.match(/^(\d+)\s*위$/u);
      if (numRank) return `${numRank[1]}위`;
      return '';
    }

    function normalizeRelayStatusText(text) {
      const raw = text == null ? '' : String(text).trim();
      if (!raw) return '';
      if (/결승\s*진출/u.test(raw)) return '결승 진출';
      if (/예선\s*종료/u.test(raw)) return '예선 종료';
      return '';
    }

    function extractRelayMeta(item) {
      const parts = [item?.col3, item?.col4]
        .map(v => (v == null ? '' : String(v).trim()))
        .filter(Boolean);
      let rankText = '';
      let statusText = '';
      const details = [];

      parts.forEach((part) => {
        const normalizedRank = normalizeRelayRankText(part);
        if (!rankText && normalizedRank) {
          rankText = normalizedRank;
          return;
        }
        const normalizedStatus = normalizeRelayStatusText(part);
        if (!statusText && normalizedStatus) {
          statusText = normalizedStatus;
          return;
        }
        details.push(part);
      });

      return { rankText, statusText, detail: details.join(' · ') };
    }

    function extractRelayRankAndDetail(item) {
      const { rankText, detail } = extractRelayMeta(item);
      return { rankText, detail };
    }

    function collectRelayAdvanceTeams(heats) {
      const explicit = [];
      heats.forEach((heat) => {
        (heat?.teams || []).forEach((team) => {
          const meta = extractRelayMeta(team);
          if (meta.statusText === '결승 진출' && normalizeCell(team?.col2)) {
            explicit.push(team);
          }
        });
      });
      return explicit.slice(0, 4);
    }

    function createRaceHeatTeamHTML(item, idx) {
      const teamName = escapeHtml(item?.col2 || `팀 ${idx + 1}`);
      const { rankText, detail, statusText } = extractRelayMeta(item);
      const resolvedStatus = statusText || '경기전';
      const isAdvance = resolvedStatus === '결승 진출';
      return `
        <div class="race-team-card ${isAdvance ? 'advance' : ''}">

    function applyWinners() {
      const getRowName = (row) => String(row?.querySelector('input')?.value || '').trim();
      const setRowName = (row, value, placeholder = 'TBD') => {
        if (!row) return;
        const input = row.querySelector('input');
        if (!input) return;
        const prevValue = String(input.value || '').trim();
        const nextValue = String(value || '').trim();
        input.value = nextValue;
        input.placeholder = nextValue ? '' : placeholder;

        row.classList.remove('advance-enter');
        if (nextValue && nextValue !== prevValue) {
          void row.offsetWidth;
          row.classList.add('advance-enter');
          window.setTimeout(() => row.classList.remove('advance-enter'), 900);
        }
      };
      const clearWinnerStyles = (root) => {
        root.querySelectorAll('.team-row').forEach(row => {
          row.classList.remove('winner', 'final-winner');
        });
      };
      const resolveWinnerRow = (rows) => {
        if (!rows.length) return null;
        if (rows.length === 1) return rows[0];

        const s1 = parseFloat(rows[0].querySelector('.score')?.textContent);
        const s2 = parseFloat(rows[1].querySelector('.score')?.textContent);
        const pk1 = parseFloat(rows[0].querySelector('.score')?.dataset.pk) || 0;
        const pk2 = parseFloat(rows[1].querySelector('.score')?.dataset.pk) || 0;

        if (Number.isFinite(s1) && Number.isFinite(s2)) {
          if (s1 > s2) return rows[0];
          if (s2 > s1) return rows[1];
          if (pk1 > pk2) return rows[0];
          if (pk2 > pk1) return rows[1];
        }
        return null;
      };

      document.querySelectorAll('.bracket').forEach(bracket => {
        clearWinnerStyles(bracket);

        const rounds = Array.from(bracket.querySelectorAll('.round'));
        if (rounds.length < 3) return;

        const firstRoundUnits = Array.from(rounds[0].querySelectorAll('.match-unit'));
        const secondRoundRows = Array.from(rounds[1].querySelectorAll('.team-row:not(.bye-win)'));
        const finalRows = Array.from(rounds[2].querySelectorAll('.team-row:not(.bye-win)'));
        const championNode = rounds[2].querySelector('.champ-team-name');
        const championArea = rounds[2].querySelector('.champ-area');

        const firstRoundWinners = firstRoundUnits.map(unit => {
          const rows = Array.from(unit.querySelectorAll('.team-row'));
          const winnerRow = resolveWinnerRow(rows);
          if (winnerRow) {
            winnerRow.classList.add(winnerRow.dataset.type === 'final' ? 'final-winner' : 'winner');
            return getRowName(winnerRow);
          }
          return '';
        });

        setRowName(secondRoundRows[0], firstRoundWinners[0] || '', '준결승1');
        setRowName(secondRoundRows[1], firstRoundWinners[1] || '', '준결승2');
        setRowName(secondRoundRows[2], firstRoundWinners[2] || '', '준결승3');
        setRowName(secondRoundRows[3], firstRoundWinners[3] || '', '준결승4');

        const secondRoundUnits = Array.from(rounds[1].querySelectorAll('.match-unit'));
        const secondRoundWinners = secondRoundUnits.map(unit => {
          const rows = Array.from(unit.querySelectorAll('.team-row:not(.bye-win)'));
          const winnerRow = resolveWinnerRow(rows);
          if (winnerRow) {
            winnerRow.classList.add('winner');
            return getRowName(winnerRow);
          }
          return '';
        });

        setRowName(finalRows[0], secondRoundWinners[0] || '', '결승1');
        setRowName(finalRows[1], secondRoundWinners[1] || '', '결승2');

        const finalWinnerRow = resolveWinnerRow(finalRows);
        if (finalWinnerRow) {
          finalWinnerRow.classList.add('final-winner');
        }

        if (championNode) {
          const championName = finalWinnerRow ? getRowName(finalWinnerRow) : '';
          championNode.textContent = championName || '대기중';
          if (championArea) championArea.classList.toggle('pending', !championName);
        }
      });

      document.querySelectorAll('.champ-team-name').forEach(node => {
        const value = String(node.textContent || '').trim();
        node.closest('.champ-area')?.classList.toggle('pending', !value || value === '대기중');
      });
    }

      const columnCount = Math.min(normalizedHeaders.length, 5);
      const headers = normalizedHeaders.slice(0, columnCount);
      const rows = bodyRows.map(row => Object.values(row || {}).slice(0, columnCount).map(value => escapeHtml(String(value ?? '').trim() || '-')));

    function renderRealtimeScoreBadgeHTML(data = []) {
      if (!Array.isArray(data) || data.length < 2) {
        return '<div class="score-guide-empty">실시간 점수 데이터를 아직 불러오지 못했습니다.</div>';
      }

      const headerRow = data[0] || {};
      const headerVals = Object.values(headerRow).map(value => String(value ?? '').trim());
      const bodyRows = data.slice(1).filter(row => Object.values(row || {}).some(value => String(value ?? '').trim()));

      if (!headerVals.length || bodyRows.length === 0) {
        return '<div class="score-guide-empty">실시간 점수 데이터가 없습니다.</div>';
      }

      const headers = headerVals.map(value => formatScoreHeaderText(value || '') || '-');
      const rankHeaderRegex = /^(순위|rank|ranking)$/i;
      const rankColIndex = headers.findIndex(value => rankHeaderRegex.test(String(value || '').trim()));
      const hasRankColumn = rankColIndex >= 0;
      const gridStyle = `style="grid-template-columns: ${headers.map((_, idx) => {
        if (idx === 0) return '1.55fr';
        if (hasRankColumn && idx === rankColIndex) return '0.92fr';
        return '0.7fr';
      }).join(' ')};"`;

      const rowsHtml = bodyRows.map((row, rowIndex) => {
        const rowValues = Object.values(row || {});
        const vals = rowValues.map((value, idx) => {
          const raw = String(value ?? '').trim();
          if (hasRankColumn && idx === rankColIndex && raw === '1') return '🥇 1';
          return escapeHtml(raw || '0');
        });
        const rankRaw = hasRankColumn ? String(rowValues[rankColIndex] ?? '').trim() : '';
        const isTop = hasRankColumn && rankRaw === '1';
        return `
          <div class="award-badge-card award-badge-card-lined score-guide-badge-card realtime-score-badge-card${isTop ? ' top-rank' : ''}">
            <div class="score-guide-badge-row realtime-score-badge-row" ${gridStyle}>
              ${vals.map((value, idx) => {
                const extraClass = idx === 0
                  ? ' score-guide-badge-col-sport'
                  : (hasRankColumn && idx === rankColIndex ? ' realtime-rank-col' : '');
                return `<div class="score-guide-badge-col${extraClass}">${value}</div>`;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="score-guide-modal-wrap score-guide-badge-wrap realtime-score-badge-wrap">
          <div class="score-guide-badge-grid">
            <div class="score-guide-badge-head realtime-score-badge-head" ${gridStyle}>
              ${headers.map((value, idx) => `<div class="score-guide-badge-head-col${idx === 0 ? ' score-guide-badge-head-col-sport' : (hasRankColumn && idx === rankColIndex ? ' realtime-rank-head-col' : '')}">${escapeHtml(value)}</div>`).join('')}
            </div>
            ${rowsHtml}
          </div>
        </div>
      `;
    }

        '시상계획표', '시상 계획표', '시상표',

      const results = await Promise.all(candidateTabs.map(async (sheetName, index) => {

          const awardData = await fetchTabData(sheetName);
          return { index, awardData };
        } catch (err) {
          console.warn('award plan fetch failed:', sheetName, err);
          return { index, awardData: null };
        }
      }));

      const found = results
        .filter(item => item.awardData && item.awardData.length >= 2)
        .sort((a, b) => a.index - b.index)[0];

      return found ? found.awardData : null;

    function classScheduleIsRenderableItem(item) {

    function getAllianceClassKeysForTeamName(teamName, allianceRows = []) {

    function classScheduleExtractGradeFromRow(row = null) {
      const source = [

    function classScheduleExtractClassKeysFromFreeText(text = '', fallbackGrade = '') {
      const source = safeText(text);
      if (!source) return [];
      const result = [];
      const defaultGrade = safeText(fallbackGrade) || currentClassScheduleGrade || '';

      source.replace(/([123])\s*-\s*(\d+)/g, (_, gradeNo, classNo) => {
        result.push(`${gradeNo}-${classNo}`);
        return _;
      });

      source.replace(/([123])학년\s*[:：]?\s*(\d+)반/g, (_, gradeNo, classNo) => {
        result.push(`${gradeNo}-${classNo}`);
        return _;
      });

      source.replace(/([123])학년/g, () => '');

      const gradeMatch = source.match(/([123])학년/);

        if (key) result.push(key);

      });

      source.replace(/\(?(\d+)\s*\/\s*(\d+)\s*승자\)?/g, (_, a, b) => {

        if (key1) result.push(key1);

    function inferClassKeysFromMatchInfo(matchInfo = '', allianceRows = [], fallbackGrade = '') {
      const text = safeText(matchInfo);

          ...directKeys,
          ...getAllianceClassKeysForTeamName(vs.left, allianceRows),

      const grade = gradeMatch ? `${gradeMatch[1]}학년` : (safeText(fallbackGrade) || currentClassScheduleGrade);

        const fixedDash = cleaned.match(/^([123])-(\d+)$/);
        if (fixedDash) {
          classKeys.push(`${fixedDash[1]}-${fixedDash[2]}`);
          return;

        const winner = cleaned.match(/^\(?(\d+)\s*\/\s*(\d+)\s*승자\)?$/);
        if (winner) {
          const key1 = classScheduleMakeClassKey(grade, `${winner[1]}반`);

    function getScheduleMinuteRange(value = '') {
      const text = String(value || '').trim();
      if (!text) return { start: Number.MAX_SAFE_INTEGER, end: Number.MAX_SAFE_INTEGER };
      const parts = text.split('-');
      const start = parseScheduleStartMinutes(parts[0] || text);
      const end = parseScheduleStartMinutes(parts[1] || text);
      return {
        start,
        end: end === Number.MAX_SAFE_INTEGER ? start : end
      };
    }

    function formatMinuteDiff(diffMinutes = 0) {
      const safe = Math.max(0, diffMinutes);
      const hours = Math.floor(safe / 60);
      const minutes = safe % 60;
      if (hours > 0) return `${hours}시간 ${minutes}분`;
      return `${minutes}분`;
    }

    function matchesFavoriteSport(row, favoriteSport = '') {
      const keyword = String(favoriteSport || '').trim();
      if (!keyword) return true;
      const haystack = [row?.col1, row?.col3, row?.col4, row?.col7].map(v => String(v || '')).join(' ');
      return haystack.includes(keyword);
    }

    function extractFavoriteSportCandidates(rows = []) {
      const set = new Set();
      (rows || []).forEach(row => {
        [row?.col1, row?.col3].forEach(value => {
          const text = String(value || '').trim();
          if (!text) return;
          const matches = text.match(/[가-힣A-Za-z0-9]+/g) || [];
          matches.forEach(token => {
            if (token.length < 2) return;
            if (/\d/.test(token) && token.length < 3) return;
            if (['집합','점심','폐회식','개회식','응원','시상','정리','준비','이동','휴식','조회','전체','미리보기'].includes(token)) return;
            set.add(token);
          });
        });
      });
      return Array.from(set).slice(0, 20);
    }

    function getFestivalScheduleSummary(rows = [], label = '', favoriteSport = '') {
      const validRows = (rows || []).filter(item => (String(item.col2 || '').trim() || String(item.col3 || '').trim()) && matchesFavoriteSport(item, favoriteSport));
      if (!validRows.length) {
        return {
          title: favoriteSport ? `${label} · ${favoriteSport} 일정 없음` : `${label} 일정 준비 중`,
          desc: favoriteSport ? '선택한 종목과 맞는 일정이 아직 없습니다.' : '표시할 일정 데이터가 아직 없습니다.',
          meta: '',
          isLive: false,
          countdownText: '',
          favoriteSport,
          stageInfo: null,
          nextLabel: '',
          parallelRows: [],
          parallelCount: 0,
          targetRow: null,
          nextRow: null
        };
      }
      const nowMinutes = new Date().getHours() * 60 + new Date().getMinutes();
      const sorted = [...validRows].sort((a, b) => parseScheduleStartMinutes(a.col2) - parseScheduleStartMinutes(b.col2));
      const currentIndex = sorted.findIndex(item => {
        const range = getScheduleMinuteRange(item.col2);
        return range.start <= nowMinutes && (range.end === Number.MAX_SAFE_INTEGER || nowMinutes <= range.end);
      });
      const current = currentIndex >= 0 ? sorted[currentIndex] : null;
      const next = current ? (sorted[currentIndex + 1] || null) : (sorted.find(item => parseScheduleStartMinutes(item.col2) > nowMinutes) || sorted[0] || null);
      const target = current || next || sorted[0];
      const targetIndex = sorted.indexOf(target);
      const followUp = current ? (sorted[targetIndex + 1] || null) : (sorted[targetIndex + 1] || sorted[0] || null);
      const range = getScheduleMinuteRange(target.col2);
      const countdownText = current
        ? `종료까지 ${formatMinuteDiff(range.end - nowMinutes)}`
        : `시작까지 ${formatMinuteDiff(range.start - nowMinutes)}`;
      const sameStartRows = sorted.filter(item => item !== target && parseScheduleStartMinutes(item.col2) === range.start);
      const titleParts = [target.col1 || '', target.col2 || '시간미정'].filter(Boolean);
      const metaParts = [target.col4 || '', target.col7 || ''].filter(Boolean);
      return {
        title: titleParts.join(' · '),
        desc: `${target.col3 || '일정명 미정'}`,
        meta: metaParts.join(' · '),
        isLive: !!current,
        countdownText,
        favoriteSport,
        stageInfo: getScheduleStageInfo(target.col7, target.col3),
        nextLabel: followUp ? `${followUp.col2 || '시간미정'} · ${followUp.col1 || '다음 종목'} · ${followUp.col3 || '다음 일정 확인'}` : '',
        parallelRows: sameStartRows,
        parallelCount: sameStartRows.length,
        targetRow: target,
        nextRow: followUp
      };
    }

      const saveData = !!(connection && connection.saveData);
      const slowNetwork = !!(connection && /(^|\b)(slow-2g|2g)(\b|$)/i.test(String(connection.effectiveType || '')));
      if (saveData || slowNetwork) return;

      const candidates = new Set();
      const [day1, day2] = await Promise.allSettled([
        fetchTabData('전체일정_1일차'),
        fetchTabData('전체일정_2일차')
      ]);
      [day1, day2].forEach(result => {
        if (result.status !== 'fulfilled' || !Array.isArray(result.value)) return;
        const meta = extractScheduleImageMeta(result.value);
        if (meta && meta.url) candidates.add(meta.url);
      });

      Array.from(candidates).slice(0, 2).forEach(url => {
        const img = new Image();
        img.decoding = 'async';
        img.loading = 'lazy';
        img.src = url;
      });
    } catch (_) {}
  };

  if (typeof window.prefetchEssentialTabs === 'function') {
    const originalPrefetchEssentialTabs = window.prefetchEssentialTabs;
    window.prefetchEssentialTabs = function prefetchEssentialTabsPatched(){
      originalPrefetchEssentialTabs.apply(this, arguments);
      if (window.__ENABLE_BACKGROUND_PREFETCH__) {
        requestIdleTask(() => { window.preloadCriticalMapImages?.(); }, 3200);
      }
    };
  }

  const CARD_SELECTOR = '.hero-card, .schedule-card, .roster-card, .unified-info-card, .rule-section-card, .summary-mini-card, .menu-card, .quick-action-card, .teacher-section-card, .teacher-map-photo-card, .teacher-map-card, .referee-line-card, .data-card, .card, .overview-timeline-card, .detail-group-card, .round-card, .race-stage-card, .race-team-card, .notice-item-card, .modal-body';
  const PRESS_SELECTOR = '.header-icon-btn, .filter-btn, .inline-btn, .close-btn, .seat-layout-btn, .seat-link-btn, .schedule-day-btn, .grade-btn, .schedule-grade-btn, .relay-segment-btn, .menu-card, .quick-action-card, button, [role="button"]';
  const reduceMotion = () => window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function initUiEnhancements(root=document){
    if (!(root instanceof Element || root === document)) return;
    root.querySelectorAll(PRESS_SELECTOR).forEach((el) => {
      if (el.dataset.iosBound === '1') return;
      el.dataset.iosBound = '1';
      const on = () => el.classList.add('is-pressing');
      const off = () => el.classList.remove('is-pressing');
      el.addEventListener('pointerdown', on, {passive:true});
      el.addEventListener('pointerup', off, {passive:true});
      el.addEventListener('pointercancel', off, {passive:true});
      el.addEventListener('pointerleave', off, {passive:true});
    });
    root.querySelectorAll(CARD_SELECTOR).forEach((el, idx) => {
      if (el.dataset.iosAnimated !== '1') {
        el.dataset.iosAnimated = '1';
        el.style.animationDelay = Math.min(idx * 28, 180) + 'ms';
      }
      if (el.dataset.ios17GlassBound !== '1') {
        el.dataset.ios17GlassBound = '1';
        el.addEventListener('pointermove', (e) => {
          if (reduceMotion()) return;
          const r = el.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width;
          const y = (e.clientY - r.top) / r.height;
          el.style.setProperty('--glass-x', (x * 100).toFixed(1) + '%');
          el.style.setProperty('--glass-y', (y * 100).toFixed(1) + '%');
        }, {passive:true});
      }
    });
  }

  let enhanceQueued = false;
  const enhanceTargets = new Set();
  function queueEnhancement(target){
    if (target) enhanceTargets.add(target);
    if (enhanceQueued) return;
    enhanceQueued = true;
    const flush = () => {
      enhanceQueued = false;
      const targets = enhanceTargets.size ? Array.from(enhanceTargets) : [document];
      enhanceTargets.clear();
      targets.forEach((node) => initUiEnhancements(node));
    };
    if (window.requestAnimationFrame) window.requestAnimationFrame(flush);
    else setTimeout(flush, 16);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => queueEnhancement(document), {once:true});
  } else {
    queueEnhancement(document);
  }

  if (document.body && !window.__unifiedUiObserverBound__) {
    window.__unifiedUiObserverBound__ = true;
    const mo = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        mutation.addedNodes.forEach((node) => {
          if (node instanceof HTMLElement) queueEnhancement(node);
        });
      }
    });
    const observeRoot = document.getElementById('data-list') || document.querySelector('.main-content') || document.body;
    if (observeRoot) mo.observe(observeRoot, { childList: true, subtree: true });
  }

  scheduleMicrotask(() => {
    requestIconRefresh();
    if (typeof currentActiveMainTab !== 'undefined' && currentActiveMainTab === '홈') {
      try { window.renderHomeMenu(); } catch (_) {}
    }
    window.primeNoticeFeed?.().catch?.(() => {});
  });
})();

<script>
(function(){
  if (window.__firstPassBracketCleanupApplied__) return;
  window.__firstPassBracketCleanupApplied__ = true;

  const __shared = window.__festivalSharedUtils__ || {};
  const txt = (v) => (__shared.txt ? __shared.txt(v) : String(v == null ? '' : v).trim());
  const esc = (v) => (__shared.esc ? __shared.esc(v) : txt(v));
  const norm = (v) => (__shared.norm ? __shared.norm(v) : txt(v).replace(/\s+/g,''));
  const setHtmlIfChanged = (el, html) => (__shared.setHtmlIfChanged ? __shared.setHtmlIfChanged(el, html) : false);

  function resultSortValue(raw, sport){
    const t = txt(raw);
    const s = txt(sport);
    if (!t) return s.includes('미션달리기') ? Number.POSITIVE_INFINITY : Number.NEGATIVE_INFINITY;
    if (s.includes('미션달리기')) {
      const cleaned = t.replace(/\s+/g, ' ').trim();
      const rank = cleaned.match(/^(\d+)\s*(?:위)?$/) || cleaned.match(/(\d+)\s*위/);
      return rank ? Number(rank[1]) : Number.POSITIVE_INFINITY;
    }
    const num = t.replace(/,/g,'').match(/-?\d+(?:\.\d+)?/);
    if (num) return Number(num[0]);
    const rank = t.match(/(\d+)\s*위/);
    return rank ? Number(rank[1]) : Number.NEGATIVE_INFINITY;
  }

  async function getBracketRows(targetKey){
    let data = [];
    if (typeof window.getTabData === 'function') {
      data = await window.getTabData('대진표');
    } else if (typeof window.fetchTabDataCached === 'function') {
      data = await window.fetchTabDataCached('대진표');
    }
    const target = norm(targetKey);
    return (Array.isArray(data) ? data : []).filter((row) => norm(row && row.col1) === target);
  }

  function normalizeResultText(v){
    return txt(v).replace(/[​-‍﻿]/g, '').replace(/\s+/g, ' ').trim();
  }

  function buildResultOnlyBoard(rows, sportLabel){
    const sport = txt(sportLabel);
    const isMission = sport.includes('미션달리기');
    const isJump = sport.includes('8자 줄넘기') || sport.includes('단체줄넘기');
    const isGroupJump = sport.includes('단체줄넘기');
    const maxDecoratedRank = isMission ? 4 : (isGroupJump ? 4 : (isJump ? 2 : 3));
    const decoratedRankClass = (rank, hasActualResult) => {
      if (!hasActualResult || rank < 1 || rank > maxDecoratedRank) return '';
      if (rank === 1) return ' champion final-rank-1';
      return ` final-rank-${rank}`;
    };
    const entries = (Array.isArray(rows) ? rows : [])
      .map((row, idx) => {
        const team = normalizeResultText(row && row.col2);
        const value = normalizeResultText(row && row.col3);
        const detail = normalizeResultText(row && row.col4);
        const hasMeaningfulData = Boolean(team || value || detail);
        if (!hasMeaningfulData) return null;
        return {
          team: team || `팀 ${idx + 1}`,
          value: value || '기록 미입력',
          detail,
          idx,
          score: resultSortValue(value, sport)
        };
      })
      .filter(Boolean);

    entries.sort((a, b) => {
      const av = a.score;
      const bv = b.score;
      if (isMission) {
        if (Number.isFinite(av) && Number.isFinite(bv)) return av - bv || a.idx - b.idx;
        if (Number.isFinite(av)) return -1;
        if (Number.isFinite(bv)) return 1;
        return a.idx - b.idx;
      }
      if (Number.isFinite(av) && Number.isFinite(bv)) return bv - av || a.idx - b.idx;
      if (Number.isFinite(av)) return -1;
      if (Number.isFinite(bv)) return 1;
      return a.idx - b.idx;
    });

    const compactEntries = entries.filter((entry) => normalizeResultText(entry.team));
    const hasActualResult = compactEntries.some((entry) => {
      const rawValue = normalizeResultText(entry.value);
      return Boolean(rawValue && !/^(?:기록\s*미입력|순위\s*미입력|미입력|경기전|결과입력대기)$/u.test(rawValue));
    });
    const badge = isJump ? '최고 기록 우승' : '1위 우승';
    const valueLabel = isJump ? '기록' : '순위';
    const champion = hasActualResult && compactEntries[0] ? compactEntries[0].team : '결과 입력 대기';
    const stageTitleHTML = (isMission || isJump) ? '' : `<div class="race-stage-title">${esc(sport)}</div>`;
    const missionStatusClass = (rank, hasActualResult) => decoratedRankClass(rank, hasActualResult);
    const valueHTML = (entry, rank) => {
      if (isMission) return '';
      return `<span class="race-team-sub mission-rank-badge${isMission ? missionStatusClass(rank) : ''}" style="margin:0;white-space:nowrap;">${esc(`${valueLabel} ${entry.value || '미입력'}`)}</span>`;
    };

    if (!compactEntries.length) {
      return `<div class="bracket-panel"><div class="race-bracket-board"><div class="race-stage-card final"><div class="race-stage-head compact-result-head"><div class="compact-result-topline"><div class="race-stage-kicker">RESULT</div><span class="race-stage-badge">${esc(badge)}</span></div>${stageTitleHTML || `<div class="race-stage-title">${esc(sport)}</div>`}</div><div class="race-stage-desc">결과 데이터가 아직 없습니다.</div></div></div></div>`;
    }

    const wrapperClasses = [
      'bracket-panel',
      (isJump || isMission) ? 'jump-result-panel compact-winner-panel gold-winner-panel' : '',
      isMission && hasActualResult ? 'mission-has-result' : ''
    ].filter(Boolean).join(' ');

    return `<div class="${wrapperClasses}" data-sport-label="${esc(sport)}"><div class="race-bracket-board"><div class="race-stage-card final"><div class="race-stage-head compact-result-head"><div class="compact-result-topline"><div class="race-stage-kicker">RESULT</div><span class="race-stage-badge">${esc(badge)}</span></div>${stageTitleHTML}</div><div class="champ-area" style="margin:0 0 18px;"><span class="champ-label"><span class="trophy-icon" aria-hidden="true"></span>우승</span><span class="champ-team-name">${esc(champion)}</span></div><div class="race-team-stack">${compactEntries.map((entry, index) => {
      const rank = index + 1;
      const statusText = hasActualResult ? (rank === 1 ? '우승' : `${rank}위`) : (isMission ? '결과입력대기' : '경기전');
      const rankClasses = decoratedRankClass(rank, hasActualResult);
      const shouldShowInlineBadge = !isMission || hasActualResult;
      const valueBadge = shouldShowInlineBadge
        ? `<span class="jump-record-badge${(isJump || isMission) ? ' mission-inline-badge' : ''}"><span class="jump-record-badge-label">${esc(valueLabel)}</span><span class="jump-record-badge-value">${esc(entry.value || '미입력')}</span></span>`
        : '';
      const mainTopRow = (isJump || isMission)
        ? `<div class="mission-inline-row"><div class="race-team-name" style="margin:0;white-space:nowrap;">${esc(entry.team)}</div>${valueBadge}</div>`
        : `<div class="race-team-name" style="margin:0;white-space:nowrap;">${esc(entry.team)}</div>${(isJump || isMission) ? valueBadge : valueHTML(entry, rank)}`;
      return `<div class="race-team-card${rankClasses}${(isJump || isMission) ? ' jump-record-card' : ''}${isMission ? missionStatusClass(rank, hasActualResult) : ''}" data-result-value="${esc(entry.value || '')}" data-sport-label="${esc(sport)}" style="display:flex;align-items:center;gap:14px;justify-content:space-between;"><div style="display:flex;align-items:center;gap:14px;min-width:0;flex:1;"><div class="race-rank-chip">${rank}</div><div class="race-team-main">${mainTopRow}${entry.detail ? `<div class="race-team-note">${esc(entry.detail)}</div>` : ''}</div></div><div style="display:flex;align-items:center;gap:16px;justify-content:flex-end;flex-wrap:nowrap;white-space:nowrap;margin-left:12px;"><span class="race-status-badge${hasActualResult && rank === 1 ? ' is-qualified' : ''}">${esc(statusText)}</span></div></div>`;
    }).join('')}</div></div></div></div>`;
  }

  function normalizeRenderedResultCards(container){
    if (!container) return;
    const stack = container.querySelector('.race-team-stack');
    if (!stack) return;
    const sport = normalizeResultText(container.querySelector('.race-stage-title')?.textContent || container.querySelector('.race-stage-badge')?.textContent || container.getAttribute('data-sport-label') || '');
    const isMission = sport.includes('미션달리기');
    const isJump = sport.includes('8자 줄넘기') || sport.includes('단체줄넘기');
    const isGroupJump = sport.includes('단체줄넘기');
    const maxDecoratedRank = isMission ? 4 : (isGroupJump ? 4 : (isJump ? 2 : 3));
    const cards = Array.from(stack.querySelectorAll('.race-team-card'));
    const validCards = cards.filter((card) => normalizeResultText(card.querySelector('.race-team-name')?.textContent));
    cards.forEach((card) => {
      if (!validCards.includes(card)) card.remove();
    });
    validCards.forEach((card, index) => {
      const rank = index + 1;
      const chip = card.querySelector('.race-rank-chip');
      const status = card.querySelector('.race-status-badge, .race-team-status');
      if (chip) chip.textContent = String(rank);
      const hasActualResult = validCards.some((item) => {
        const storedValue = normalizeResultText(item.getAttribute('data-result-value') || '');
        return Boolean(storedValue && !/^(?:기록\s*미입력|순위\s*미입력|미입력|경기전|결과입력대기)$/u.test(storedValue));
      });
      if (status) status.textContent = hasActualResult ? (rank === 1 ? '우승' : `${rank}위`) : (isMission ? '결과입력대기' : '경기전');
      card.classList.remove('final-rank-1','final-rank-2','final-rank-3','final-rank-4','champion');
      if (hasActualResult && rank >= 1 && rank <= maxDecoratedRank) {
        if (rank === 1) card.classList.add('champion','final-rank-1');
        else card.classList.add(`final-rank-${rank}`);
      }
    });
  }

  async function renderResultOnly(container, targetKey, label){
    if (!container) return;
    setHtmlIfChanged(container, '<div class="loader">대진표 로딩중...</div>');
    try {
      const rows = await getBracketRows(targetKey);
      if (!rows.length) {
        const emptyHtml = (typeof window.createEmptyGuideHTML === 'function')
          ? window.createEmptyGuideHTML('대진표 정보가 없습니다.', `${label} 결과가 아직 등록되지 않았습니다.`)
          : '<div class="loader">대진표 정보가 없습니다.</div>';
        setHtmlIfChanged(container, emptyHtml);
        return;
      }
      setHtmlIfChanged(container, buildResultOnlyBoard(rows, label));
      normalizeRenderedResultCards(container);
    } catch (error) {
      console.error('result-only bracket render error', error, targetKey, label);
      setHtmlIfChanged(container, '<div class="loader">⚠️ 데이터 오류</div>');
    }
  }

  const originalLoadBracketDataToContainer = window.loadBracketDataToContainer;
  window.loadBracketDataToContainer = async function firstPassLoadBracketDataToContainer(container, targetKey, sportLabel = '') {
    const normalizedTarget = norm(targetKey);
    const isResultOnly = normalizedTarget.startsWith(norm('대진_미션달리기'))
      || normalizedTarget.startsWith(norm('대진_8자 줄넘기'))
      || normalizedTarget.startsWith(norm('대진_단체줄넘기'));

    if (!isResultOnly) {
      return originalLoadBracketDataToContainer ? originalLoadBracketDataToContainer.apply(this, arguments) : undefined;
    }

    return renderResultOnly(container, targetKey, sportLabel || targetKey);
  };
  loadBracketDataToContainer = window.loadBracketDataToContainer;

  const originalHandleSportFilterClick = window.handleSportFilterClick;
  window.handleSportFilterClick = async function firstPassHandleSportFilterClick(btn, targetTab, sport, isPlayerGrid=false, isScheduleView=false, mode='default'){
    if (mode === 'bracket' && (sport === '미션달리기' || sport === '단체줄넘기')) {
      const container = document.getElementById('sport-common-detail');
      if (!container) return;
      const isAlreadyActive = !!(btn && btn.classList.contains('active'));
      document.querySelectorAll('#sport-filter-group .filter-btn').forEach((item) => item.classList.remove('active'));
      if (isAlreadyActive) {
        if (typeof window.resetSportDetailArea === 'function') {
          window.resetSportDetailArea(targetTab, isPlayerGrid, isScheduleView, mode);
        }
        return;
      }
      if (typeof window.updateSportSelectGuideVisibility === 'function') window.updateSportSelectGuideVisibility(false);
      if (btn) btn.classList.add('active');
      const bracketKey = sport === '단체줄넘기' ? '대진_단체줄넘기' : '대진_미션달리기';
      await renderResultOnly(container, bracketKey, sport);
      return;
    }
    return originalHandleSportFilterClick ? originalHandleSportFilterClick.apply(this, arguments) : undefined;
  };
  handleSportFilterClick = window.handleSportFilterClick;

  const originalLoadBracketByGrade = window.loadBracketByGrade;
  window.loadBracketByGrade = async function firstPassLoadBracketByGrade(sport, grade, btn=null){
    if (txt(sport) === '8자 줄넘기' || txt(sport) === '단체줄넘기') {
      if (btn) {
        document.querySelectorAll('#bracket-grade-tabs .grade-btn').forEach((item) => item.classList.remove('active'));
        btn.classList.add('active');
      }
      const container = document.getElementById('bracket-grade-container');
      if (!container) return;
      await renderResultOnly(container, `대진_${txt(sport)}_${txt(grade)}`, `${txt(sport)} ${txt(grade)}`);
      return;
    }
    return originalLoadBracketByGrade ? originalLoadBracketByGrade.apply(this, arguments) : undefined;
  };
  loadBracketByGrade = window.loadBracketByGrade;
})();
</script>
<script>
(function(){
  function rxText(v){ return String(v == null ? '' : v).replace(/\s+/g,' ').trim(); }
  function rxKey(v){ return rxText(v); }
  function rxEsc(v){
    const s = String(v == null ? '' : v);
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function rxStage(v){
    const t = rxText(v);
    if (/^결승$/u.test(t)) return '결승';
    if (/^(?:예선|준결승)$/u.test(t)) return '예선';
    return '';
  }
  function rxRank(v){
    const t = rxText(v);
    if (!t) return '';
    if (/^\d+$/.test(t)) return t + '위';
    const m = t.match(/(\d+)\s*위/u);
    if (m) return m[1] + '위';
    if (/^우승$/u.test(t)) return '1위';
    if (/^준우승$/u.test(t)) return '2위';
    return '';
  }
  function rxStatus(v){
    const t = rxText(v);
    if (/결승\s*진출/u.test(t)) return '결승 진출';
    if (/예선\s*종료/u.test(t)) return '예선 종료';
    return '';
  }
  function rxMeta(item){
    const parts = [item && item.col3, item && item.col4].map(rxText).filter(Boolean);
    let rankText = '';
    let statusText = '';
    const detail = [];
    parts.forEach((part) => {
      const r = rxRank(part);
      if (!rankText && r) { rankText = r; return; }
      const s = rxStatus(part);
      if (!statusText && s) { statusText = s; return; }
      detail.push(part);
    });
    return { rankText, statusText, detail: detail.join(' · ') };
  }
  function rxRankNum(item){
    const rankText = rxMeta(item).rankText;
    const m = rankText.match(/(\d+)/);
    return m ? parseInt(m[1],10) : 999;
  }
  function rxEmpty(title, desc){
    if (typeof window.createEmptyGuideHTML === 'function') return window.createEmptyGuideHTML(title, desc);
    return '<div class="loader">'+ rxEsc(title || '대진표 정보가 없습니다.') +'</div>';
  }
  function rxHeatCard(team, idx){
    const meta = rxMeta(team);
    const rankNumMatch = (meta.rankText || '').match(/(\d+)/);
    const rankNum = rankNumMatch ? parseInt(rankNumMatch[1], 10) : 999;
    const autoAdvance = Number.isFinite(rankNum) && rankNum <= 2;
    const status = meta.statusText || (autoAdvance ? '결승 진출' : (meta.rankText ? '예선 종료' : '경기전'));
    const isAdvance = status === '결승 진출';
    return `
      <div class="race-team-card ${isAdvance ? 'advance' : ''}">
        <div class="race-rank-chip">${idx + 1}</div>
        <div class="race-team-main">
          <div class="race-team-name">${rxEsc(rxText(team && team.col2) || `팀 ${idx + 1}`)}</div>
          ${meta.detail ? `<div class="race-team-note">${rxEsc(meta.detail)}</div>` : ''}
        </div>
        <div class="race-team-status-group">
          <div class="race-team-status ${isAdvance ? 'advance' : ''}">${rxEsc(status)}</div>
          ${meta.rankText ? `<div class="race-rank-side-badge">${rxEsc(meta.rankText)}</div>` : ''}
        </div>
      </div>`;
  }
  function rxFinalCard(team, idx){
    const meta = rxMeta(team);
    const rawRank = rxText(team && team.col3);
    const parsedRank = rxRank(rawRank || (meta && meta.rankText) || '');
    const rankMatch = parsedRank.match(/(\d+)/);
    const rankNum = rankMatch ? parseInt(rankMatch[1], 10) : NaN;
    const hasRank = Number.isFinite(rankNum);
    const labels = ['우승','준우승','3위','4위'];
    const status = hasRank ? (labels[Math.max(0, rankNum - 1)] || `${rankNum}위`) : '경기전';
    const rankClass = hasRank && rankNum <= 4 ? `final-rank-${rankNum}` : '';
    const statusClass = hasRank && rankNum === 1 ? 'champion' : '';
    return `
      <div class="race-team-card ${rankClass}">
        <div class="race-rank-chip">${idx + 1}</div>
        <div class="race-team-main">
          <div class="race-team-name">${rxEsc(rxText(team && team.col2) || `결승팀 ${idx+1}`)}</div>
          ${meta.detail ? `<div class="race-team-note">${rxEsc(meta.detail)}</div>` : ''}
        </div>
