<script>
(function(){
  if (window.__firstPassBracketCleanupApplied__) return;
  window.__firstPassBracketCleanupApplied__ = true;

  function txt(v){ return String(v == null ? '' : v).trim(); }
  function esc(v){ return txt(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function norm(v){ return txt(v).replace(/\s+/g,''); }
  function setHtmlIfChanged(el, html){ if (!el) return false; if (el.innerHTML === html) return false; el.innerHTML = html; return true; }

  function resultSortValue(raw, sport){
    const t = txt(raw);
    const s = txt(sport);
    if (!t) return s.includes('미션달리기') ? Number.POSITIVE_INFINITY : Number.NEGATIVE_INFINITY;
    if (s.includes('미션달리기')) {
      const rank = t.match(/(\d+)\s*위/);
      return rank ? Number(rank[1]) : Number.POSITIVE_INFINITY;
    }
    const num = t.replace(/,/g,'').match(/-?\d+(?:\.\d+)?/);
    if (num) return Number(num[0]);
    const rank = t.match(/(\d+)\s*위/);
    return rank ? Number(rank[1]) : Number.NEGATIVE_INFINITY;
  }

  async function getBracketRows(targetKey){
    let data = [];
    if (typeof window.getTabData === 'function') {
      data = await window.getTabData('대진표');
    } else if (typeof window.fetchTabDataCached === 'function') {
      data = await window.fetchTabDataCached('대진표');
    }
    const target = norm(targetKey);
    return (Array.isArray(data) ? data : []).filter((row) => norm(row && row.col1) === target);
  }

  function normalizeResultText(v){
    return txt(v).replace(/[​-‍﻿]/g, '').replace(/\s+/g, ' ').trim();
  }

  function buildResultOnlyBoard(rows, sportLabel){
    const sport = txt(sportLabel);
    const isMission = sport.includes('미션달리기');
    const isJump = sport.includes('8자 줄넘기') || sport.includes('단체줄넘기');
    const entries = (Array.isArray(rows) ? rows : [])
      .map((row, idx) => {
        const team = normalizeResultText(row && row.col2);
        const value = normalizeResultText(row && row.col3);
        const detail = normalizeResultText(row && row.col4);
        const hasMeaningfulData = Boolean(team || value || detail);
        if (!hasMeaningfulData) return null;
        return {
          team: team || `팀 ${idx + 1}`,
          value: value || '기록 미입력',
          detail,
          idx,
          score: resultSortValue(value, sport)
        };
      })
      .filter(Boolean);

    entries.sort((a, b) => {
      const av = a.score;
      const bv = b.score;
      if (isMission) {
        if (Number.isFinite(av) && Number.isFinite(bv)) return av - bv || a.idx - b.idx;
        if (Number.isFinite(av)) return -1;
        if (Number.isFinite(bv)) return 1;
        return a.idx - b.idx;
      }
      if (Number.isFinite(av) && Number.isFinite(bv)) return bv - av || a.idx - b.idx;
      if (Number.isFinite(av)) return -1;
      if (Number.isFinite(bv)) return 1;
      return a.idx - b.idx;
    });

    const compactEntries = entries.filter((entry) => normalizeResultText(entry.team));
    const hasActualResult = compactEntries.some((entry) => {
      const rawValue = normalizeResultText(entry.value);
      return Boolean(rawValue && !/^(?:기록\s*미입력|미입력|경기전)$/u.test(rawValue));
    });
    const badge = isJump ? '최고 기록 우승' : '1위 우승';
    const valueLabel = isJump ? '기록' : '순위';
    const champion = hasActualResult && compactEntries[0] ? compactEntries[0].team : '결과 입력 대기';
    const stageTitleHTML = (isMission || isJump) ? '' : `<div class="race-stage-title">${esc(sport)}</div>`;
    const valueHTML = (entry) => isMission
      ? ''
      : `<span class="race-team-sub" style="margin:0;white-space:nowrap;">${esc(`${valueLabel} ${entry.value || '미입력'}`)}</span>`;

    if (!compactEntries.length) {
      return `<div class="bracket-panel"><div class="race-bracket-board"><div class="race-stage-card final"><div class="race-stage-head"><div><div class="race-stage-kicker">RESULT</div>${stageTitleHTML || `<div class="race-stage-title">${esc(sport)}</div>`}</div><span class="race-stage-badge">${esc(badge)}</span></div><div class="race-stage-desc">결과 데이터가 아직 없습니다.</div></div></div></div>`;
    }

    return `<div class="bracket-panel${isJump ? ' jump-result-panel compact-winner-panel' : ''}${(isJump || isMission) ? ' gold-winner-panel' : ''}"><div class="race-bracket-board"><div class="race-stage-card final"><div class="race-stage-head"><div><div class="race-stage-kicker">RESULT</div>${stageTitleHTML}</div><span class="race-stage-badge">${esc(badge)}</span></div><div class="champ-area" style="margin:0 0 18px;"><span class="champ-label"><span class="trophy-icon" aria-hidden="true"></span>우승</span><span class="champ-team-name">${esc(champion)}</span></div><div class="race-team-stack">${compactEntries.map((entry, index) => {
      const rank = index + 1;
      const statusText = hasActualResult ? (rank === 1 ? '우승' : `${rank}위`) : '경기전';
      const rankClasses = hasActualResult ? (rank === 1 ? ' champion final-rank-1' : rank === 2 ? ' final-rank-2' : rank === 3 ? ' final-rank-3' : '') : '';
      return `<div class="race-team-card${rankClasses}${isJump ? ' jump-record-card' : ''}" style="display:flex;align-items:center;gap:14px;justify-content:space-between;"><div style="display:flex;align-items:center;gap:14px;min-width:0;flex:1;"><div class="race-rank-chip">${rank}</div><div class="race-team-name" style="margin:0;white-space:nowrap;">${esc(entry.team)}</div></div><div style="display:flex;align-items:center;gap:16px;justify-content:flex-end;flex-wrap:nowrap;white-space:nowrap;margin-left:12px;">${isJump ? `<span class="jump-record-badge"><span class="jump-record-badge-label">${esc(valueLabel)}</span><span class="jump-record-badge-value">${esc(entry.value || '미입력')}</span></span>` : valueHTML(entry)}${entry.detail ? `<span class="race-team-sub" style="margin:0;white-space:nowrap;">${esc(entry.detail)}</span>` : ''}<span class="race-status-badge${hasActualResult && rank === 1 ? ' is-qualified' : ''}">${esc(statusText)}</span></div></div>`;
    }).join('')}</div></div></div></div>`;
  }

  function normalizeRenderedResultCards(container){
    if (!container) return;
    const stack = container.querySelector('.race-team-stack');
    if (!stack) return;
    const cards = Array.from(stack.querySelectorAll('.race-team-card'));
    const validCards = cards.filter((card) => normalizeResultText(card.querySelector('.race-team-name')?.textContent));
    cards.forEach((card) => {
      if (!validCards.includes(card)) card.remove();
    });
    validCards.forEach((card, index) => {
      const rank = index + 1;
      const chip = card.querySelector('.race-rank-chip');
      const status = card.querySelector('.race-status-badge, .race-team-status');
      if (chip) chip.textContent = String(rank);
      const hasActualResult = validCards.some((item) => {
        const badgeValue = normalizeResultText(item.querySelector('.jump-record-badge-value')?.textContent || '');
        const subText = normalizeResultText(item.querySelector('.race-team-sub')?.textContent || '');
        const combined = `${badgeValue} ${subText}`.trim();
        return Boolean(combined && !/^(?:기록\s*미입력|미입력|순위\s*미입력|경기전)$/u.test(combined));
      });
      if (status) status.textContent = hasActualResult ? (rank === 1 ? '우승' : `${rank}위`) : '경기전';
      card.classList.remove('final-rank-1','final-rank-2','final-rank-3','champion');
      if (hasActualResult && rank === 1) card.classList.add('champion','final-rank-1');
      else if (hasActualResult && rank === 2) card.classList.add('final-rank-2');
      else if (hasActualResult && rank === 3) card.classList.add('final-rank-3');
    });
  }

  async function renderResultOnly(container, targetKey, label){
    if (!container) return;
    setHtmlIfChanged(container, '<div class="loader">대진표 로딩중...</div>');
    try {
      const rows = await getBracketRows(targetKey);
      if (!rows.length) {
        const emptyHtml = (typeof window.createEmptyGuideHTML === 'function')
          ? window.createEmptyGuideHTML('대진표 정보가 없습니다.', `${label} 결과가 아직 등록되지 않았습니다.`)
          : '<div class="loader">대진표 정보가 없습니다.</div>';
        setHtmlIfChanged(container, emptyHtml);
        return;
      }
      setHtmlIfChanged(container, buildResultOnlyBoard(rows, label));
      normalizeRenderedResultCards(container);
    } catch (error) {
      console.error('result-only bracket render error', error, targetKey, label);
      setHtmlIfChanged(container, '<div class="loader">⚠️ 데이터 오류</div>');
    }
  }

  const originalLoadBracketDataToContainer = window.loadBracketDataToContainer;
  window.loadBracketDataToContainer = async function firstPassLoadBracketDataToContainer(container, targetKey, sportLabel = '') {
    const normalizedTarget = norm(targetKey);
    const isResultOnly = normalizedTarget.startsWith(norm('대진_미션달리기'))
      || normalizedTarget.startsWith(norm('대진_8자 줄넘기'))
      || normalizedTarget.startsWith(norm('대진_단체줄넘기'));

    if (!isResultOnly) {
      return originalLoadBracketDataToContainer ? originalLoadBracketDataToContainer.apply(this, arguments) : undefined;
    }

    return renderResultOnly(container, targetKey, sportLabel || targetKey);
  };
  loadBracketDataToContainer = window.loadBracketDataToContainer;

  const originalHandleSportFilterClick = window.handleSportFilterClick;
  window.handleSportFilterClick = async function firstPassHandleSportFilterClick(btn, targetTab, sport, isPlayerGrid=false, isScheduleView=false, mode='default'){
    if (mode === 'bracket' && (sport === '미션달리기' || sport === '단체줄넘기')) {
      const container = document.getElementById('sport-common-detail');
      if (!container) return;
      const isAlreadyActive = !!(btn && btn.classList.contains('active'));
      document.querySelectorAll('#sport-filter-group .filter-btn').forEach((item) => item.classList.remove('active'));
      if (isAlreadyActive) {
        if (typeof window.resetSportDetailArea === 'function') {
          window.resetSportDetailArea(targetTab, isPlayerGrid, isScheduleView, mode);
        }
        return;
      }
      if (typeof window.updateSportSelectGuideVisibility === 'function') window.updateSportSelectGuideVisibility(false);
      if (btn) btn.classList.add('active');
      const bracketKey = sport === '단체줄넘기' ? '대진_단체줄넘기' : '대진_미션달리기';
      await renderResultOnly(container, bracketKey, sport);
      return;
    }
    return originalHandleSportFilterClick ? originalHandleSportFilterClick.apply(this, arguments) : undefined;
  };
  handleSportFilterClick = window.handleSportFilterClick;

  const originalLoadBracketByGrade = window.loadBracketByGrade;
  window.loadBracketByGrade = async function firstPassLoadBracketByGrade(sport, grade, btn=null){
    if (txt(sport) === '8자 줄넘기' || txt(sport) === '단체줄넘기') {
      if (btn) {
        document.querySelectorAll('#bracket-grade-tabs .grade-btn').forEach((item) => item.classList.remove('active'));
        btn.classList.add('active');
      }
      const container = document.getElementById('bracket-grade-container');
      if (!container) return;
      await renderResultOnly(container, `대진_${txt(sport)}_${txt(grade)}`, `${txt(sport)} ${txt(grade)}`);
      return;
    }
    return originalLoadBracketByGrade ? originalLoadBracketByGrade.apply(this, arguments) : undefined;
  };
  loadBracketByGrade = window.loadBracketByGrade;
})();
</script>

<script>
(function(){
  function rxText(v){ return String(v == null ? '' : v).replace(/\s+/g,' ').trim(); }
  function rxKey(v){ return rxText(v); }
  function rxEsc(v){
    const s = String(v == null ? '' : v);
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function rxStage(v){
    const t = rxText(v);
    if (/^결승$/u.test(t)) return '결승';
    if (/^(?:예선|준결승)$/u.test(t)) return '예선';
    return '';
  }
  function rxRank(v){
    const t = rxText(v);
    if (!t) return '';
    if (/^\d+$/.test(t)) return t + '위';
    const m = t.match(/(\d+)\s*위/u);
    if (m) return m[1] + '위';
    if (/^우승$/u.test(t)) return '1위';
    if (/^준우승$/u.test(t)) return '2위';
    return '';
  }
  function rxStatus(v){
    const t = rxText(v);
    if (/결승\s*진출/u.test(t)) return '결승 진출';
    if (/예선\s*종료/u.test(t)) return '예선 종료';
    return '';
  }
  function rxMeta(item){
    const parts = [item && item.col3, item && item.col4].map(rxText).filter(Boolean);
    let rankText = '';
    let statusText = '';
    const detail = [];
    parts.forEach((part) => {
      const r = rxRank(part);
      if (!rankText && r) { rankText = r; return; }
      const s = rxStatus(part);
      if (!statusText && s) { statusText = s; return; }
      detail.push(part);
    });
    return { rankText, statusText, detail: detail.join(' · ') };
  }
  function rxRankNum(item){
    const rankText = rxMeta(item).rankText;
    const m = rankText.match(/(\d+)/);
    return m ? parseInt(m[1],10) : 999;
  }
  function rxEmpty(title, desc){
    if (typeof window.createEmptyGuideHTML === 'function') return window.createEmptyGuideHTML(title, desc);
    return '<div class="loader">'+ rxEsc(title || '대진표 정보가 없습니다.') +'</div>';
  }
  function rxHeatCard(team, idx){
    const meta = rxMeta(team);
    const status = meta.statusText || '경기전';
    const isAdvance = status === '결승 진출';
    return `
      <div class="race-team-card ${isAdvance ? 'advance' : ''}">
        <div class="race-rank-chip">${idx + 1}</div>
        <div class="race-team-main">
          <div class="race-team-name">${rxEsc(rxText(team && team.col2) || `팀 ${idx + 1}`)}</div>
          ${meta.detail ? `<div class="race-team-note">${rxEsc(meta.detail)}</div>` : ''}
        </div>
        <div class="race-team-status-group">
          <div class="race-team-status ${isAdvance ? 'advance' : ''}">${rxEsc(status)}</div>
          ${meta.rankText ? `<div class="race-rank-side-badge">${rxEsc(meta.rankText)}</div>` : ''}
        </div>
      </div>`;
  }
  function rxFinalCard(team, idx){
    const meta = rxMeta(team);
    const rawRank = rxText(team && team.col4);
    const hasRank = /^\d+$/.test(rawRank);
    const labels = ['우승','준우승','3위','4위'];
    const status = hasRank ? (labels[idx] || `${idx+1}위`) : '경기전';
    const rankClass = hasRank && idx < 3 ? `final-rank-${idx+1}` : '';
    const statusClass = hasRank && idx === 0 ? 'champion' : '';
    return `
      <div class="race-team-card ${rankClass}">
        <div class="race-rank-chip">${idx + 1}</div>
        <div class="race-team-main">
          <div class="race-team-name">${rxEsc(rxText(team && team.col2) || `결승팀 ${idx+1}`)}</div>
          ${meta.detail ? `<div class="race-team-note">${rxEsc(meta.detail)}</div>` : ''}
        </div>
        <div class="race-team-status-group">
          <div class="race-team-status ${statusClass}">${rxEsc(status)}</div>
          ${hasRank && meta.rankText ? `<div class="race-rank-side-badge">${rxEsc(meta.rankText)}</div>` : ''}
        </div>
      </div>`;
  }
  function renderRelay(rows){
    const teamRows = (Array.isArray(rows) ? rows : []).filter(r => rxText(r && r.col2));
    const hasStage = teamRows.some(r => rxStage(r && r.col5));
    const prelimRows = hasStage ? teamRows.filter(r => rxStage(r && r.col5) === '예선') : teamRows;
    const manualFinalRows = hasStage ? teamRows.filter(r => rxStage(r && r.col5) === '결승') : [];
    const heat1 = prelimRows.slice(0, Math.min(4, prelimRows.length));
    const heat2 = prelimRows.slice(Math.min(4, prelimRows.length));
    const heats = [heat1, heat2].filter(arr => arr.length);
    let finalRows = manualFinalRows.filter(r => rxText(r && r.col2));
    if (!finalRows.length) {
      finalRows = prelimRows.filter(r => rxMeta(r).statusText === '결승 진출');
    }
    finalRows = finalRows.slice(0,4).sort((a,b) => rxRankNum(a) - rxRankNum(b));
    const champion = (finalRows.find(r => rxRankNum(r) === 1) || {}).col2 || '결과 입력 대기';
    const heatCards = heats.map((teams, heatIndex) => `
      <div class="race-stage-card">
        <div class="race-stage-head">
          <div>
            <div class="race-stage-kicker">HEAT ${heatIndex + 1}</div>
            <div class="race-stage-title"></div>
          </div>
          <span class="race-stage-badge">${teams.length}팀 경기</span>
        </div>
        <div class="race-team-stack">${teams.map((team, idx) => rxHeatCard(team, idx)).join('')}</div>
        <div class="race-advance-note">각 조 상위 2팀 결승 진출</div>
      </div>`).join('');
    return `
      <div class="bracket-panel">
        <div class="race-bracket-board">
          ${heatCards}
          <div class="race-stage-card final">
            <div class="race-stage-head">
              <div>
                <div class="race-stage-kicker">FINAL</div>
                <div class="race-stage-title">결승</div>
              </div>
              <span class="race-stage-badge">${finalRows.length}팀 결승</span>
            </div>
            <div class="race-team-stack">
              ${finalRows.length ? finalRows.map((team, idx) => rxFinalCard(team, idx)).join('') : '<div class="race-team-empty">결승 진출 팀이 아직 없습니다.</div>'}
            </div>
          </div>
          <div class="race-champion-banner">
            <div class="race-champion-copy">
              <div class="race-champion-label"><span class="trophy-icon" aria-hidden="true"></span>CHAMPION</div>
              <div class="race-champion-name">${rxEsc(rxText(champion))}</div>
              <div class="race-champion-desc">결승 1위 팀을 우승팀으로 표시합니다.</div>
            </div>
            <div class="race-team-status champion">우승</div>
          </div>
        </div>
      </div>`;
  }
  const originalLoad = window.loadBracketDataToContainer;
  window.loadBracketDataToContainer = async function(container, targetKey, sportLabel = '') {
    const relayKeys = new Set(['대진_이어달리기_학급','대진_이어달리기_학급_1학년','대진_이어달리기_학급_2학년','대진_이어달리기_학급_3학년','대진_이어달리기_연합'].map(rxKey));
    if (!relayKeys.has(rxKey(targetKey))) {
      return originalLoad ? originalLoad(container, targetKey, sportLabel) : undefined;
    }
    try {
      const fetcher = (typeof window.fetchTabDataCached === 'function') ? window.fetchTabDataCached : (typeof getTabData === 'function' ? getTabData : null);
      const data = fetcher ? await fetcher('대진표') : [];
      const rows = (Array.isArray(data) ? data : []).slice(1).filter((item) => rxKey(item && item.col1) === rxKey(targetKey));
      if (!rows.length) {
        container.innerHTML = rxEmpty('대진표 정보가 없습니다.', `${sportLabel || targetKey} 종목 대진표가 아직 등록되지 않았습니다.`);
        return;
      }
      container.innerHTML = renderRelay(rows);
    } catch (err) {
      console.error('relay bracket patch error', err);
      container.innerHTML = '<div class="loader">⚠️ 데이터 오류</div>';
    }
  };
})();
</script>

  /* Stabilize visibility during vertical scrolling on mobile */
  .hero-card, .schedule-card, .roster-card, .unified-info-card, .rule-section-card,
  .summary-mini-card, .menu-card, .quick-action-card, .teacher-section-card,

  .hero-card, .schedule-card, .roster-card, .unified-info-card, .rule-section-card,
  .summary-mini-card, .menu-card, .quick-action-card, .teacher-section-card,

    opacity: 1 !important;
    transform: none !important;
    backface-visibility: visible !important;
  }

  /* Reduce layer instability for frequently tapped controls */
  .header-icon-btn, .filter-btn, .inline-btn, .close-btn, .seat-layout-btn, .seat-link-btn,
  .schedule-day-btn, .grade-btn, .schedule-grade-btn, .relay-segment-btn, button,
  [role="button"] {

  }

  /* Keep active press animation subtle without forcing its own GPU layer at rest */
  .header-icon-btn:active, .filter-btn:active, .inline-btn:active, .close-btn:active,
  .seat-layout-btn:active, .seat-link-btn:active, .schedule-day-btn:active, .grade-btn:active,
  .schedule-grade-btn:active, .relay-segment-btn:active, button:active, [role="button"]:active,
  .is-pressing {

  }
</style>
